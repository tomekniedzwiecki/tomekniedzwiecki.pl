    ];

    function renderWidget(w) {
        removeChips();
        var div = document.createElement('div');
        div.className = 'widget';
        div.id = 'spar-widget';

        if (w.type === 'suwak') {
            var d = w.data;
            var krok = (typeof d.krok === 'number' && d.krok > 0) ? d.krok : 1;
            var jedn = typeof d.jednostka === 'string' ? d.jednostka.slice(0, 20) : '';
            var start = (typeof d.start === 'number' && d.start >= d.min && d.start <= d.max)
                ? d.start
                : Math.round((d.min + d.max) / 2 / krok) * krok;
            div.innerHTML =
                '<div class="wg-value"><span id="wg-val"></span><small>' + esc(jedn) + '</small></div>' +
                '<input type="range" class="wg-range" id="wg-range" min="' + d.min + '" max="' + d.max + '" step="' + krok + '" value="' + start + '" aria-label="Wybierz wartość">' +
                '<div class="wg-minmax"><span>' + esc(String(d.min)) + '</span><span>' + esc(String(d.max)) + '+</span></div>' +
                '<button type="button" class="wg-btn" id="wg-go"></button>';
            var range = div.querySelector('#wg-range');
            var valEl = div.querySelector('#wg-val');
            var goBtn = div.querySelector('#wg-go');
            function fmt(v) { return Number(v).toLocaleString('pl-PL'); }
            function paint() {
                var v = Number(range.value);
                valEl.textContent = fmt(v) + (v >= d.max ? '+' : '');
                goBtn.textContent = 'Zatwierdzam: ' + fmt(v) + (v >= d.max ? '+' : '') + (jedn ? ' ' + jedn : '') + ' →';
                range.style.setProperty('--fill', ((v - d.min) / (d.max - d.min) * 100) + '%');
            }
            range.addEventListener('input', paint);
            paint();
            goBtn.addEventListener('click', function () {
                var v = Number(range.value);
                widgetSend(fmt(v) + (v >= d.max ? '+' : '') + (jedn ? ' ' + jedn : ''));
            });
        } else if (w.type === 'ranking') {
            var order = []; // teksty w kolejności nadania numerów
            div.innerHTML = '<div class="wg-rank"><div class="wg-rank__hint">Klikaj od najważniejszej — numerki ułożą kolejność:</div></div>' +
                '<button type="button" class="wg-btn" id="wg-go" disabled>Ułóż wszystkie pozycje</button>';
            var list = div.querySelector('.wg-rank');
            var goBtn2 = div.querySelector('#wg-go');
            function refresh() {
                list.querySelectorAll('button').forEach(function (b) {
                    var i = order.indexOf(b.dataset.txt);
                    b.classList.toggle('is-ranked', i >= 0);
                    b.querySelector('.wg-rank__num').textContent = i >= 0 ? (i + 1) : '';
                });
                var done = order.length === w.data.length;
                goBtn2.disabled = !done;
                goBtn2.textContent = done ? 'Zatwierdzam kolejność →' : ('Ułóż wszystkie pozycje (' + order.length + '/' + w.data.length + ')');
            }
            w.data.forEach(function (txt) {
                var b = document.createElement('button');
                b.type = 'button';
                b.dataset.txt = txt;
                b.innerHTML = '<span class="wg-rank__num"></span>' + esc(txt);
                b.addEventListener('click', function () {
                    if (streaming || el('inline-gate')) return;
                    var i = order.indexOf(txt);
                    if (i >= 0) order.splice(i, 1); else order.push(txt);
                    refresh();
                });
                list.appendChild(b);
            });
            refresh();
            goBtn2.addEventListener('click', function () {
                if (order.length !== w.data.length) return;
                widgetSend(order.map(function (t, i) { return (i + 1) + '. ' + t; }).join(', '));
            });
        } else if (w.type === 'styl') {
            var grid = document.createElement('div');
            grid.className = 'wg-styles';
            STYLE_CARDS.forEach(function (c) {
                var b = document.createElement('button');
                b.type = 'button';
                b.className = 'wg-style ' + c[0];
                b.innerHTML = '<div class="wg-style__mock"><i></i><i></i><i></i></div>' +
                    '<div class="wg-style__name">' + esc(c[1]) + '</div>' +
                    '<div class="wg-style__desc">' + esc(c[2]) + '</div>';
                b.addEventListener('click', function () { widgetSend(c[3]); });
                grid.appendChild(b);
            });
            div.appendChild(grid);
        } else {
            return;
        }

        el('chat-msgs').appendChild(div);
        scrollToBottom(false);
    }

    function streamReply(text, isFirst) {
        streaming = true;
        setComposerEnabled(false);
        stickBottom = true;

        var bubble = document.createElement('div');
        bubble.className = 'msg msg--ai';
        bubble.innerHTML = '<span class="typing" aria-label="Sparing pisze"><i></i><i></i><i></i></span>';
        el('chat-msgs').appendChild(bubble);
        scrollToBottom(true);

        var raw = '';
        var meta = { verdict: null, leadId: null, projekt: null };
        var gotText = false;
        var failedBeforeText = false;

        var body = {
            sessionId: state.sessionId,
            profession: state.profession,
            email: state.email,
            name: state.name,
            phone: state.phone || null,
            authUserId: state.authUserId || null,
            authProvider: state.authProvider || null,
            message: text,
            tracking: isFirst ? getTracking() : null
        };

        fetch(SPAR_ENDPOINT, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SB_PUBLISHABLE
            },
            body: JSON.stringify(body)
        }).then(function (res) {
            if (!res.ok) {
                return res.json().catch(function () { return {}; }).then(function (err) {
                    var e = new Error('http');
                    e.status = res.status;
                    e.code = err && err.error;
                    throw e;
                });
            }
            var reader = res.body.getReader();
            var decoder = new TextDecoder();
            var buf = '';

            function handleEvent(rawEvent) {
                var ev = null;
                var dataLines = [];
                rawEvent.split('\n').forEach(function (line) {
                    if (line.indexOf('event:') === 0) ev = line.slice(6).trim();
                    else if (line.indexOf('data:') === 0) dataLines.push(line.slice(5).replace(/^ /, ''));
                });
                if (!dataLines.length) return;
                var obj;
                try { obj = JSON.parse(dataLines.join('\n')); } catch (e) { return; }
                if (ev === 'spar_meta') {
                    meta.verdict = obj.verdict || null;
                    meta.leadId = obj.leadId || null;
                    if (obj.emailKnown && !state.email && !state.emailKnown) {
                        // serwer zna maila tej sesji (powrót z ?id=) — bramka niepotrzebna
                        state.emailKnown = true;
                        persistSession();
                    }
                    return;
                }
                if (ev === 'spar_projekt') {
                    meta.projekt = obj || null;
                    if (obj) { state.lastBrief = obj; persistSession(); }
                    return;
                }
                if (obj.type === 'content_block_delta' && obj.delta && obj.delta.type === 'text_delta') {
                    raw += obj.delta.text;
                    if (!gotText) { gotText = true; }
                    bubble.innerHTML = renderRich(visibleText(raw)) || '<span class="typing"><i></i><i></i><i></i></span>';
                    // stream pracuje w ukrytym bloku — pokaż, że coś się dzieje
                    var work = workingLabel(raw);
                    if (work) {
                        bubble.insertAdjacentHTML('beforeend',
                            '<div class="msg__work"><span class="typing"><i></i><i></i><i></i></span>' + esc(work) + '</div>');
                    }
                    scrollToBottom(false);
                } else if (obj.type === 'error' || ev === 'error') {
                    var e2 = new Error('stream');
                    e2.streamError = true;
                    throw e2;
                }
            }

            function pump() {
                return reader.read().then(function (r) {
                    if (r.done) {
                        buf += decoder.decode();
                        if (buf.trim()) handleEvent(buf.replace(/\r\n/g, '\n'));
                        return;
                    }
                    buf += decoder.decode(r.value, { stream: true }).replace(/\r\n/g, '\n');
                    var idx;
                    while ((idx = buf.indexOf('\n\n')) >= 0) {
                        var rawEvent = buf.slice(0, idx);
                        buf = buf.slice(idx + 2);
                        handleEvent(rawEvent);
                    }
                    return pump();
                });
            }
            return pump();
        }).catch(function (err) {
            if (err && err.code === 'wymagany_email') {
                // server-side backstop bramki — pokaż formularz, przywróć wiadomość
                failedBeforeText = !gotText;
                restoreFailedMessage(text);
                renderInlineGate();
            } else if (err && err.status === 429 && err.code === 'limit_tur') {
                failedBeforeText = !gotText;
                sysMsg('Dobiliśmy do limitu 30 tur tej rozmowy. Sparing tyle nie potrzebuje — jeśli werdykt nie padł, zacznij nową rozmowę z węższym problemem.', true);
                lockComposer('Limit 30 tur osiągnięty — rozmowa zamknięta.');
            } else if (err && err.status === 429) {
                failedBeforeText = !gotText;
                restoreFailedMessage(text);
                sysMsg('Za dużo wiadomości w krótkim czasie (limit 60 na godzinę). Odczekaj chwilę i wyślij ponownie.', true);
            } else if (err && err.status) {
                failedBeforeText = !gotText;
                restoreFailedMessage(text);
                sysMsg('Coś poszło nie tak po stronie serwera (' + err.status + '). Spróbuj ponownie za chwilę — rozmowa jest zapisana.', true);
            } else {
                // sieć / przerwany stream
                if (!gotText) { failedBeforeText = true; restoreFailedMessage(text); }
                sysMsg('Połączenie przerwane. To, co już padło, jest zapisane — wyślij ponownie albo pisz dalej.', true);
            }
        }).then(function () {
            streaming = false;
            // bramka rejestracji blokuje composer — nie odblokowuj pod nią
            if (el('composer').hidden === false && !el('inline-gate')) setComposerEnabled(true);

            if (failedBeforeText && !raw) {
                bubble.remove();
                updateStages();
                return;
            }
            if (raw) {
                bubble.innerHTML = renderRich(visibleText(raw)) || '';
                messages.push({ role: 'assistant', content: raw });
                saveMessages();
                // Postęp kamieni z tej tury
                var kam = parseKamien(raw);
                if (kam > (state.kamien || 0)) { state.kamien = kam; persistSession(); }
                // Błysk + sekcje z tej tury — karty zaraz pod dymkiem (w tej kolejności)
                var anchor = bubble;
                var blysk = parseBlysk(raw);
                if (blysk) {
                    var blEl = renderBlyskEl(blysk);
                    anchor.insertAdjacentElement('afterend', blEl);
                    anchor = blEl;
                }
                var sekcje = parseSekcje(raw);
                if (sekcje) {
                    var skEl = renderSekcjeEl(sekcje);
                    anchor.insertAdjacentElement('afterend', skEl);
                    anchor = skEl;
                }
                var karuzela = parseKaruzela(raw);
                if (karuzela) {
                    var krEl = renderKaruzelaEl(karuzela);
                    anchor.insertAdjacentElement('afterend', krEl);
                    anchor = krEl;
                }
                if (hasMakieta(raw)) anchor.insertAdjacentElement('afterend', mkCardEl());
            } else {
                bubble.remove();
            }

            // Werdykt: spar_meta ma priorytet, fallback = parsowanie markera
            var parsed = parseWerdykt(raw);
            var verdict = meta.verdict || (parsed && parsed.kolor) || null;
            if (verdict) {
                state.verdict = verdict;
                state.karta = (parsed && parsed.karta) ? parsed.karta : state.karta;
                if (meta.leadId) state.leadId = meta.leadId;
                // Runda poprawki domknięta nowym werdyktem — zliczamy do limitu
                var wasEdit = false;
                if (verdict === 'zielony' && state.editPending) {
                    state.editsUsed = (state.editsUsed || 0) + 1;
                    state.editPending = false;
                    wasEdit = true;
                }
                persistSession();
                renderVerdict(verdict, state.karta);
                // Pigułka + plan przychodu: start zaraz po zielonym werdykcie
                // (po poprawce force — karta się zmieniła). Mały bufor, żeby
                // serwer zdążył domknąć zapis karty do DB.
                if (verdict === 'zielony' && state.karta) {
                    setTimeout(function () { ensureKartaExtras(wasEdit); }, 1500);
                }
            } else if (!meta.projekt && gatePending() && !el('inline-gate')) {
                renderInlineGate();
            }

            // Marker <projekt> → generowanie BLOKUJE rozmowę do pokazania efektu
            // (inaczej user klika dalej i nigdy nie widzi podglądu); dymki tej
            // tury renderują się dopiero POD obrazkiem.
            var sugg = (!el('inline-gate')) ? suggestionsFrom(raw) : null;
            var widget = (!el('inline-gate')) ? widgetFrom(raw) : null;
            if (meta.projekt) {
                setComposerEnabled(false);
                el('chat-input').placeholder = 'Generuję ekrany narzędzia — daj mi chwilę…';
                requestPreviews(null, meta.projekt, false, function () {
                    if (el('composer').hidden === false && !el('inline-gate')) setComposerEnabled(true);
                    updateHero(); // przywraca standardowy placeholder
                    if (sugg && !el('inline-gate')) renderSuggestions(sugg.opts, sugg.multi);
                    else if (gatePending() && !el('inline-gate')) renderInlineGate();
                });
            } else if (widget) {
                renderWidget(widget);
            } else if (sugg) {
                renderSuggestions(sugg.opts, sugg.multi);
            }
            updateStages();
            scrollToBottom(false);
        });
    }

    function restoreFailedMessage(text) {
        // cofnij ostatnią wiadomość usera z lokalnej historii i przywróć do pola
        var last = messages[messages.length - 1];
        if (last && last.role === 'user' && last.content === text) {
            messages.pop();
            saveMessages();
            var bubbles = el('chat-msgs').querySelectorAll('.msg--user');
            if (bubbles.length) bubbles[bubbles.length - 1].remove();
        }
        el('chat-input').value = text;
        autosize();
        updateCharCount();
    }

    function parseWerdykt(raw) {
        if (!raw) return null;
        var m = raw.match(/<werdykt>([\s\S]*?)<\/werdykt>/);
        if (!m) return null;
        try { return JSON.parse(m[1]); } catch (e) { return null; }
    }

    function parseProjektJson(raw) {
        if (!raw) return null;
        var ms = raw.match(/<projekt>([\s\S]*?)<\/projekt>/g);
        if (!ms || !ms.length) return null;
        var inner = ms[ms.length - 1].replace(/^<projekt>/, '').replace(/<\/projekt>$/, '');
        try {
            var o = JSON.parse(inner);
            return (o && typeof o === 'object') ? o : null;
        } catch (e) { return null; }
    }

    /* ============================================================
       BŁYSK — wyróżniona obserwacja branżowa (marker <blysk>)
       ============================================================ */
    // Marker postępu: <kamien>N</kamien> — najwyższy DOMKNIĘTY kamień (1-6)
    function parseKamien(raw) {
        if (!raw) return 0;
        var ms = raw.match(/<kamien>\s*(\d)\s*<\/kamien>/g);
        if (!ms || !ms.length) return 0;
        var n = parseInt(ms[ms.length - 1].replace(/\D/g, ''), 10);
        return (n >= 1 && n <= 6) ? n : 0;
    }

    function parseBlysk(raw) {
        if (!raw) return null;
        var m = raw.match(/<blysk>([\s\S]*?)<\/blysk>/);
        if (!m) return null;
        var t = m[1].trim().slice(0, 500);
        return t || null;
    }

    function renderBlyskEl(text) {
        var div = document.createElement('div');
        div.className = 'blysk';
        div.innerHTML = '<div class="blysk__eyebrow">Obserwacja</div>' +
            '<div class="blysk__text">' + esc(text) + '</div>';
        return div;
    }

    /* ============================================================
       SEKCJE ROZWIJANE — akordeon dla długich treści (marker <sekcje>)
       ============================================================ */
    function parseSekcje(raw) {
        if (!raw) return null;
        var ms = raw.match(/<sekcje>([\s\S]*?)<\/sekcje>/g);
        if (!ms || !ms.length) return null;
        var inner = ms[ms.length - 1].replace(/^<sekcje>/, '').replace(/<\/sekcje>$/, '');
        try {
            var arr = JSON.parse(inner);
            if (!Array.isArray(arr)) return null;
            arr = arr.filter(function (x) {
                return x && typeof x.tytul === 'string' && x.tytul.trim() &&
                       typeof x.tresc === 'string' && x.tresc.trim();
            }).slice(0, 10);
            return arr.length ? arr : null;
        } catch (e) { return null; }
    }

    /* ============================================================
       KARUZELA — porównanie wariantów (marker <karuzela>)
       ============================================================ */
    function parseKaruzela(raw) {
        if (!raw) return null;
        var ms = raw.match(/<karuzela>([\s\S]*?)<\/karuzela>/g);
        if (!ms || !ms.length) return null;
        var inner = ms[ms.length - 1].replace(/^<karuzela>/, '').replace(/<\/karuzela>$/, '');
        try {
            var arr = JSON.parse(inner);
            if (!Array.isArray(arr)) return null;
            arr = arr.filter(function (x) {
                return x && typeof x.tytul === 'string' && x.tytul.trim() &&
                       typeof x.tresc === 'string' && x.tresc.trim();
            }).slice(0, 4);
            return arr.length ? arr : null;
        } catch (e) { return null; }
    }

    function renderKaruzelaEl(arr) {
        var wrap = document.createElement('div');
        wrap.className = 'car';
        var track = document.createElement('div');
        track.className = 'car__track';
        arr.forEach(function (s) {
            var c = document.createElement('div');
            c.className = 'car__card';
            c.innerHTML = '<div class="car__title">' + esc(s.tytul.trim().slice(0, 90)) + '</div>' +
                '<div class="car__body">' + renderRich(s.tresc) + '</div>';
            track.appendChild(c);
        });
        wrap.appendChild(track);

        if (arr.length > 1) {
            var dots = document.createElement('div');
            dots.className = 'car__dots';
            arr.forEach(function (_, i) {
                var d = document.createElement('button');
                d.type = 'button';
                if (i === 0) d.className = 'is-on';
                d.setAttribute('aria-label', 'Karta ' + (i + 1) + ' z ' + arr.length);
                d.addEventListener('click', function () {
                    track.scrollTo({ left: track.children[i].offsetLeft - 8, behavior: 'smooth' });
                });
                dots.appendChild(d);
            });
            wrap.appendChild(dots);

            function mkArrow(dir) {
                var b = document.createElement('button');
                b.type = 'button';
                b.className = 'car__arr car__arr--' + (dir < 0 ? 'l' : 'r');
                b.setAttribute('aria-label', dir < 0 ? 'Poprzednia karta' : 'Następna karta');
                b.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="' + (dir < 0 ? 'M15 18l-6-6 6-6' : 'M9 18l6-6-6-6') + '"></path></svg>';
                b.addEventListener('click', function () {
                    track.scrollBy({ left: dir * track.clientWidth * 0.85, behavior: 'smooth' });
                });
                return b;
            }
            wrap.appendChild(mkArrow(-1));
            wrap.appendChild(mkArrow(1));

            track.addEventListener('scroll', function () {
                var w = track.children[0].offsetWidth + 10;
                var i = Math.max(0, Math.min(arr.length - 1, Math.round(track.scrollLeft / w)));
                dots.querySelectorAll('button').forEach(function (d, di) {
                    d.classList.toggle('is-on', di === i);
                });
            }, { passive: true });
        }
        return wrap;
    }

    function renderSekcjeEl(arr) {
        var wrap = document.createElement('div');
        wrap.className = 'acc';
        arr.forEach(function (s, i) {
            var item = document.createElement('div');
            item.className = 'acc__item' + (i === 0 ? ' is-open' : '');
            item.innerHTML =
                '<button type="button" class="acc__head">' +
                '<span>' + esc(s.tytul.trim().slice(0, 90)) + '</span>' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>' +
                '</button>' +
                '<div class="acc__body">' + renderRich(s.tresc) + '</div>';
            item.querySelector('.acc__head').addEventListener('click', function () {
                item.classList.toggle('is-open');
            });
            wrap.appendChild(item);
        });
        return wrap;
    }

    /* ============================================================
       PODGLĄD GRAFICZNY — marker <projekt> → spar-image → obraz w czacie
       ============================================================ */
    // v2: 4 widoki (panel/glowna/dodatkowa/landing) generowane RÓWNOLEGLE.
    //   known   — {view:url} z localStorage (resume bez kosztu) lub null
    //   projekt — brief z markera <projekt> (insighty, zmien[])
    function requestPreviews(known, projekt, demo, onSettle) {
        var wrap = document.createElement('div');
        wrap.className = 'msg msg--ai msg--preview';
        el('chat-msgs').appendChild(wrap);

        // Jednorazowe odblokowanie rozmowy po zakończeniu (sukces/limit/błąd)
        function settle() {
            if (onSettle) { var f = onSettle; onSettle = null; f(); }
        }

        if (!state.previews) state.previews = {};

        function noteText(remaining) {
            var base = 'Kliknij ekran, aby powiększyć.';
            if (typeof remaining === 'number' && remaining > 0) {
                var forma = remaining === 1 ? 'poprawkę' : (remaining < 5 ? 'poprawki' : 'poprawek');
                return base + ' Masz jeszcze ' + remaining + ' ' + forma + ' — opisz, co zmienić, a pokażę nowe wersje (każdy nowy ekran to jedna poprawka).';
            }
            if (remaining === 0) return base + ' Pula poprawek wyczerpana — kolejne uwagi opisz słowami, trafią do karty projektu.';
            return base + ' Pierwsza wersja narzędzia powstanie na bazie Twoich uwag.';
        }

        function tileSkeletonHTML(view) {
            return '<div class="pv-tile" data-view="' + view + '">' +
                '<span class="pv-tile__label">' + esc(viewLabel(view)) + '</span>' +
                '<div class="pv-tile__body">' +
                '<div class="pv-tile__skel"><i></i><i></i><i></i><i></i><i></i><i></i></div>' +
                '<i class="pv-tile__scan"></i>' +
                '</div></div>';
        }
        function tileToImage(view, url) {
            var tile = wrap.querySelector('.pv-tile[data-view="' + view + '"]');
            if (!tile) return;
            tile.classList.add('is-done');
            var body = tile.querySelector('.pv-tile__body');
            body.innerHTML = '<img src="' + esc(url) + '" alt="' + esc(viewLabel(view)) + ' — kliknij, aby powiększyć" loading="lazy">';
            body.querySelector('img').addEventListener('click', function () { openLightbox(view); });
        }
        function tileError(view, message, retryFn) {
            var tile = wrap.querySelector('.pv-tile[data-view="' + view + '"]');
            if (!tile) return;
            tile.querySelector('.pv-tile__body').innerHTML =
                '<div class="pv-tile__err"><span>' + esc(message) + '</span>' +
                (retryFn ? '<button type="button" class="preview-retry">Spróbuj ponownie</button>' : '') +
                '</div>';
            if (retryFn) tile.querySelector('.preview-retry').addEventListener('click', retryFn);
        }

        // Resume: widoki już wygenerowane — pokaż siatkę bez ponownego kosztu
        if (known && typeof known === 'object') {
            VIEW_META.forEach(function (vm) {
                if (typeof known[vm[0]] === 'string') state.previews[vm[0]] = known[vm[0]];
            });
            var haveAny = lightboxItems().length > 0;
            if (haveAny) {
                var gridHtml = '';
                VIEW_META.forEach(function (vm) {
                    if (state.previews[vm[0]]) gridHtml += tileSkeletonHTML(vm[0]);
                });
                wrap.innerHTML = '<div class="gen"><div class="pv-grid">' + gridHtml + '</div>' +
                    '<div class="preview-note">' + esc(noteText(null)) + '</div></div>';
                VIEW_META.forEach(function (vm) {
                    if (state.previews[vm[0]]) tileToImage(vm[0], state.previews[vm[0]]);
                });
                scrollToBottom(false);
                settle();
                return;
            }
        }

        // Które widoki generujemy: "zmien" z markera; pierwszy podgląd = wszystkie
        var ALL_VIEWS = VIEW_META.map(function (vm) { return vm[0]; });
        var views = [];
        if (projekt && Array.isArray(projekt.zmien)) {
            views = projekt.zmien.filter(function (v) { return ALL_VIEWS.indexOf(v) >= 0; });
        }
        var firstRun = !lightboxItems().length;
        if (!views.length || firstRun) views = ALL_VIEWS.slice();

        // Insighty z markera <projekt> — rotowane podczas generowania
        var insights = (projekt && Array.isArray(projekt.insighty))
            ? projekt.insighty.filter(function (x) { return typeof x === 'string' && x.trim(); })
                .map(function (x) { return x.trim().slice(0, 200); }).slice(0, 6)
            : [];
        if (!insights.length) {
            insights = [
                'Dobre narzędzie niszowe wygrywa językiem branży, nie liczbą funkcji.',
                'Najszybciej płacą ci, którym oszczędzasz czas w czymś, co robią co tydzień.',
                'Jedna dopracowana funkcja sprzedaje lepiej niż dziesięć obiecanych.'
            ];
        }
        var insTimer = null, insIdx = 0, stepTimer = null, barTimer = null;
        function stopInsights() {
            if (insTimer) { clearInterval(insTimer); insTimer = null; }
            if (stepTimer) { clearInterval(stepTimer); stepTimer = null; }
            if (barTimer) { clearInterval(barTimer); barTimer = null; }
        }

        var GEN_STEPS = [
            'Analizuję problem i odbiorców…',
            'Układam ekrany narzędzia…',
            'Dobieram polskie dane przykładowe…',
            'Rysuję interfejsy w wysokiej jakości…'
        ];

        function run() {
            stopInsights();
            var headTxt = views.length === 1
                ? 'Buduję nową wersję: ' + viewLabel(views[0])
                : 'Buduję podgląd Twojego narzędzia — ' + views.length + ' ekrany';
            var gridHtml = '';
            VIEW_META.forEach(function (vm) {
                // kafelki: generowane → szkielet; pozostałe z obrazem → istniejący widok
                if (views.indexOf(vm[0]) >= 0 || state.previews[vm[0]]) gridHtml += tileSkeletonHTML(vm[0]);
            });
            wrap.innerHTML =
                '<div class="gen">' +
                '<div class="gen__head"><span class="gen__spark" aria-hidden="true"></span>' + esc(headTxt) + '</div>' +
                '<div class="pv-grid">' + gridHtml + '</div>' +
                '<div class="preview-insight" aria-live="polite"></div>' +
                '<div class="gen__foot">' +
                '<div class="gen__bar"><i></i></div>' +
                '<div class="gen__step"></div>' +
                '</div>' +
                '</div>';
            // widoki nie objęte tą generacją od razu dostają swój obraz
            VIEW_META.forEach(function (vm) {
                if (views.indexOf(vm[0]) < 0 && state.previews[vm[0]]) tileToImage(vm[0], state.previews[vm[0]]);
            });
            var insEl = wrap.querySelector('.preview-insight');
            var stepEl = wrap.querySelector('.gen__step');
            var barEl = wrap.querySelector('.gen__bar i');

            function cycle() {
                insEl.classList.remove('is-in');
                setTimeout(function () {
                    insEl.textContent = insights[insIdx % insights.length];
                    insIdx++;
                    insEl.classList.add('is-in');
                }, 280);
            }
            cycle();
            insTimer = setInterval(cycle, 4800);

            // Etapy budowy — przeskok co ~9 s, ostatni zostaje
            var stepIdx = 0;
            stepEl.textContent = GEN_STEPS[0];
            stepTimer = setInterval(function () {
                if (stepIdx < GEN_STEPS.length - 1) {
                    stepIdx++;
                    stepEl.textContent = GEN_STEPS[stepIdx];
                } else {
                    clearInterval(stepTimer);
                    stepTimer = null;
                }
            }, 9000);

            // Pasek postępu — asymptotycznie do ~92% (kończy się przy obrazach)
            var t = 0;
            barTimer = setInterval(function () {
                t += 0.3;
                var pct = 92 * (1 - Math.exp(-t / 20));
                barEl.style.width = pct.toFixed(1) + '%';
            }, 300);
            scrollToBottom(false);

            var lastRemaining = null;
            var anyLimit = false;

            function persistPreviews() {
                saveJSON(previewKey(state.sessionId), { images: state.previews, history: state.previewHistory });
                updateSideBadges();
                updateConvoMeta(); // miniatura projektu na liście rozmów
            }

            function finishAll() {
                stopInsights();
                if (barEl) barEl.style.width = '100%';
                var foot = wrap.querySelector('.gen__foot');
                var ins = wrap.querySelector('.preview-insight');
                setTimeout(function () {
                    if (ins) ins.remove();
                    if (foot) foot.outerHTML = '<div class="preview-note">' +
                        esc(anyLimit ? noteText(0) : noteText(lastRemaining)) + '</div>';
                    scrollToBottom(false);
                }, 420);
                settle();
            }

            function fetchView(view) {
                return fetch(SPAR_IMAGE_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SB_PUBLISHABLE },
                    body: JSON.stringify({ sessionId: state.sessionId, view: view })
                }).then(function (res) {
                    if (!res.ok) {
                        return res.json().catch(function () { return {}; }).then(function (err) {
                            var e = new Error('img'); e.code = err && err.error; throw e;
                        });
                    }
                    return res.json();
                }).then(function (d) {
                    // poprzednia wersja tego widoku NIE przepada — ląduje w archiwum
                    // (lokalnie znany URL albo `archived` z serwera, np. po powrocie z linku)
                    var replaced = (state.previews[view] && state.previews[view] !== d.url)
                        ? state.previews[view]
                        : (typeof d.archived === 'string' ? d.archived : null);
                    if (replaced) {
                        if (!state.previewHistory[view]) state.previewHistory[view] = [];
                        if (state.previewHistory[view].indexOf(replaced) < 0) state.previewHistory[view].push(replaced);
                    }
                    state.previews[view] = d.url;
                    // równoległe odpowiedzi wracają w dowolnej kolejności — liczy się najniższy stan puli
                    if (typeof d.remaining === 'number') {
                        lastRemaining = (lastRemaining === null) ? d.remaining : Math.min(lastRemaining, d.remaining);
                    }
                    persistPreviews();
                    tileToImage(view, d.url);
                    scrollToBottom(false);
                }).catch(function (e) {
                    if (e && e.code === 'limit_podgladow') {
                        anyLimit = true;
                        tileError(view, 'Pula poprawek wyczerpana', null);
                    } else if (e && e.code === 'limit_podgladow_dzienny') {
                        anyLimit = true;
                        tileError(view, 'Dzienny limit podglądów osiągnięty — wróć jutro', null);
                    } else {
                        tileError(view, 'Nie udało się wygenerować', function () {
                            var tile = wrap.querySelector('.pv-tile[data-view="' + view + '"]');
                            if (tile) tile.querySelector('.pv-tile__body').innerHTML =
                                '<div class="pv-tile__skel"><i></i><i></i><i></i><i></i><i></i><i></i></div><i class="pv-tile__scan"></i>';
                            fetchView(view);
                        });
                    }
                });
            }

            if (demo) {
                // Tryb demo (?demo=podglad): pełny cykl bez kosztu API
                views.forEach(function (v, i) {
                    setTimeout(function () {
                        state.previews[v] = DEMO_PREVIEW_URL;
                        tileToImage(v, DEMO_PREVIEW_URL);
                        if (i === views.length - 1) { lastRemaining = 4; finishAll(); }
                    }, 7000 + i * 4500);
                });
                return;
            }

            Promise.all(views.map(function (v) { return fetchView(v); })).then(finishAll);
        }
        run();
    }

    /* ============================================================
       WERDYKT — render
       ============================================================ */
    // ID sesji w pasku adresu — link z przeglądarki jest zawsze „pełny"
    // (można go zapisać/wysłać i wrócić do tej rozmowy)
    function syncUrlId() {
        if (!state.sessionId || !window.history || !history.replaceState) return;
        try {
            var u = new URLSearchParams(location.search);
            if (u.get('id') === state.sessionId) return;
            u.set('id', state.sessionId);
            // hash zakładki (#projekt itd.) musi przetrwać podmianę ?id=
            history.replaceState(null, '', location.pathname + '?' + u.toString() + (location.hash || ''));
        } catch (e) {}
    }

                '<div class="karta__label">' + label + '</div>' +

            return '<div class="karta__item karta__item--wide">' +
                '<div class="karta__label">' + label + '</div>' +
                '<div class="chips">' + arr.map(function (x) { return '<span>' + esc(x) + '</span>'; }).join('') + '</div></div>';
        }
        return '<div class="karta">' +
            '<div><div class="karta__eyebrow">Karta Problemu</div>' +
            '<div class="karta__problem">' + esc(k.problem || '') + '</div></div>' +
            '<div class="karta__grid">' +
            item('Profesja', k.profesja) +
            item('Kto płaci', k.kto_placi) +

            chipsItem('Ekrany narzędzia', k.ekrany) +
            chipsItem('Kanały dystrybucji', k.kanaly_dystrybucji) +
            item('Sygnał budżetu', k.sygnal_budzetu) +
            item('Konkurencja', k.konkurencja) +
            chipsItem('Ryzyka', k.ryzyka) +
            chipsItem('Na później (poza pierwszą wersją)', k.poza_zakresem) +

    // „Inni właśnie budują" — 3 ostatnie cudze projekty z publicznego feedu,
    // doklejane pod zielonym werdyktem (social proof w momencie decyzji)
    var othersCache = null;
    function renderOthersBar() {
        if (el('spar-others') || state.verdict !== 'zielony') return;
        function paint(list) {
            if (el('spar-others')) return;
            var own = ((state.lastBrief && state.lastBrief.nazwa) || '').toLowerCase();
            var items = (list || []).filter(function (p) {
                return p && p.nazwa && p.img && p.nazwa.toLowerCase() !== own;
            }).slice(0, 4);
            if (items.length < 2) return; // bez fejków — pasek dopiero przy realnych projektach
            var div = document.createElement('div');
            div.className = 'others';
            div.id = 'spar-others';
            // jeden DUŻY, pełny ekran z rotacją — miniatury były nieczytelne
            div.innerHTML = '<div class="others__t">W tym samym czasie inni budują swoje narzędzia:</div>' +
                '<div class="others__frame">' + items.map(function (p, i) {
                    var img = String(p.img).replace('/object/public/', '/render/image/public/') + '?format=webp&width=900&quality=72';
                    return '<img src="' + esc(img) + '" alt="' + esc(p.nazwa) + '"' + (i ? ' loading="lazy"' : '') + ' decoding="async">';
                }).join('') +
                '<span class="others__cap"><i></i><span data-others-cap></span></span></div>' +
                (items.length > 1
                    ? '<div class="others__dots">' + items.map(function (_, i) {
                        return '<button type="button" class="others__dot" data-i="' + i + '" aria-label="Projekt ' + (i + 1) + '"></button>';
                    }).join('') + '</div>'
                    : '') +
                '<div class="others__sub">Po starcie współpracy dołączasz do społeczności, która buduje razem z Tomkiem — spotkania online i na żywo.</div>';
            el('chat-msgs').appendChild(div);

            var imgs = div.querySelectorAll('.others__frame img');
            var dots = div.querySelectorAll('.others__dot');
            var cap = div.querySelector('[data-others-cap]');
            var oi = -1;
            function go(i) {
                oi = (i + items.length) % items.length;
                imgs.forEach(function (im, j) { im.classList.toggle('is-on', j === oi); });
                dots.forEach(function (d, j) { d.classList.toggle('is-on', j === oi); });
                cap.textContent = items[oi].nazwa;
            }
            go(0);
            if (items.length > 1 && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                var timer = setInterval(function () {
                    // czat bywa przerysowywany (nowa rozmowa) — nie kręć zombie
                    if (!document.body.contains(div)) { clearInterval(timer); return; }
                    go(oi + 1);
                }, 4000);
                dots.forEach(function (d) {
                    d.addEventListener('click', function () { go(parseInt(d.getAttribute('data-i'), 10)); });
                });
            }
        }
        if (othersCache) { paint(othersCache); return; }
        fetch(SPAR_FEED_ENDPOINT).then(function (r) { return r.ok ? r.json() : null; }).then(function (d) {
            if (d && d.projekty) { othersCache = d.projekty; paint(d.projekty); }
        }).catch(function () { });
    }

    function renderVerdict(color, karta) {
        var wrap = document.createElement('div');
        wrap.className = 'verdict';

        if (color === 'zielony') {
            // Rozmowa zostaje OTWARTA — user może dopracowywać projekt dalej.
            // Karta żyje w zakładce „Karta projektu"; kolejne werdykty tylko ją
            // aktualizują (bez dublowania boxa).
            if (el('panel-box')) {
                wrap.remove();
                sysMsg('Karta projektu zaktualizowana — zakładka obok ma już nową wersję.');
            } else {
                wrap.innerHTML = cardBoxHTML();
                el('chat-msgs').appendChild(wrap);
                var tabBtn = wrap.querySelector('#btn-collab-tab');
                if (tabBtn) tabBtn.addEventListener('click', function () {
                    switchTab('wspolpraca');
                });
            }
            if (activeTab === 'projekt' || activeTab === 'wspolpraca') switchTab(activeTab); // odśwież otwartą zakładkę
            updateSideBadges();
            unlockComposer();
            renderOthersBar();
        } else if (color === 'zolty') {
            wrap.innerHTML =
                '<div class="vbanner vbanner--yellow">' +
                '<div class="vbanner__title">Werdykt: <em>żółty.</em> Jeszcze za mgliste.</div>' +
                '<div class="vbanner__sub">Czego brakuje, masz w odpowiedzi powyżej. <strong>Doprecyzuj i pisz dalej</strong> — werdykt może się zmienić.</div>' +
                '</div>';
            el('chat-msgs').appendChild(wrap);
            unlockComposer();
        } else if (color === 'czerwony') {
            wrap.innerHTML =
                '<div class="vbanner vbanner--red">' +
                '<div class="vbanner__title">Werdykt: <em>czerwony.</em></div>' +
                '<div class="vbanner__sub">Ten problem nie obroni się jako płatne narzędzie — powody masz powyżej. To nie porażka. <strong>To zaoszczędzone minimum 14 000 zł.</strong> Masz inny problem z praktyki? Sprawdźmy go.</div>' +
                '<button type="button" class="btn" id="btn-new-problem">Wybieram inny problem <span class="btn__arrow">→</span></button>' +
                '</div>';
            el('chat-msgs').appendChild(wrap);
            lockComposer('Werdykt czerwony — wybierz inny problem powyżej.');
            var b = wrap.querySelector('#btn-new-problem');
            if (b) b.addEventListener('click', resetToNewProblem);
        }
        scrollToBottom(true);
    }

    // „Nowa rozmowa" = nowa pozycja na liście projektów (poprzednie zostają;

    /* ============================================================
       WEJŚCIE DO CZATU (nowa rozmowa lub resume)
       ============================================================ */
    function enterChat(isResume) {
        showView('chat');
        el('chat-msgs').innerHTML = '';
        unlockComposer();

        if (isResume && messages.length === 0) {
            addOpener();
            saveMessages();
        }
        messages.forEach(function (m) { appendMessage(m.role, m.content); });

        // Resume podglądu: jeśli w historii był marker <projekt>, odtwórz obrazek
        // z localStorage (bez kosztu) albo wznow generowanie przerwane refreshem
        var projektContent = null;
        for (var pi = messages.length - 1; pi >= 0; pi--) {
            if (messages[pi].role === 'assistant' && messages[pi].content.indexOf('<projekt>') >= 0) { projektContent = messages[pi].content; break; }
        }
        var regenerating = false;
        if (projektContent) {
            var savedPrev = loadJSON(previewKey(state.sessionId));
            // stary format {url} czytamy jako {panel: url}
            var knownPrev = null;
            if (savedPrev) {
                if (savedPrev.images && typeof savedPrev.images === 'object') knownPrev = savedPrev.images;
                else if (typeof savedPrev.url === 'string') knownPrev = { panel: savedPrev.url };
            }
            regenerating = !knownPrev;
            if (regenerating) {
                setComposerEnabled(false);
                el('chat-input').placeholder = 'Generuję ekrany narzędzia — daj mi chwilę…';
            }
            var resumedBrief = parseProjektJson(projektContent);
            if (resumedBrief && !state.lastBrief) { state.lastBrief = resumedBrief; persistSession(); }
            requestPreviews(knownPrev, resumedBrief, false, regenerating ? function () {
                if (el('composer').hidden === false && !el('inline-gate')) setComposerEnabled(true);
                updateHero();
                if (!state.verdict && !el('inline-gate') && !el('qr-chips') && messages.length) {
                    var lm = messages[messages.length - 1];
                    if (lm.role === 'assistant' && !lm.local) {
                        var rw = widgetFrom(lm.content);
                        if (rw) renderWidget(rw);
                        else {
                            var rs = suggestionsFrom(lm.content);
                            if (rs) renderSuggestions(rs.opts, rs.multi);
                        }
                    }
                }
            } : null);
        }

        var userCount = messages.filter(function (m) { return m.role === 'user'; }).length;

        if (state.verdict) {
            // odtwórz blok werdyktu po historii
            renderVerdict(state.verdict, state.karta);
            if (isResume && state.verdict === 'zolty') {
                sysMsg('Wróciłeś do rozmowy. Werdykt na ten moment: żółty — doprecyzuj i pisz dalej.');
            }
        } else if (userCount === 0) {
            renderChips();
        } else if (gatePending()) {
            renderInlineGate();
        } else if (isResume && messages.length > 1) {
            sysMsg('Rozmowa przywrócona. Piszemy dalej.');
        }

        // Resume: odtwórz dymki odpowiedzi z ostatniej tury AI (jeśli user jeszcze nie odpowiedział)
        if (!regenerating && !el('inline-gate') && !el('qr-chips') && messages.length) {
            var lastMsg = messages[messages.length - 1];
            if (lastMsg.role === 'assistant' && !lastMsg.local) {
                var resumeWidget = widgetFrom(lastMsg.content);
                if (resumeWidget) renderWidget(resumeWidget);
                else {
                    var resumeSugg = suggestionsFrom(lastMsg.content);
                    if (resumeSugg) renderSuggestions(resumeSugg.opts, resumeSugg.multi);
                }
            }
        }

        updateStages();
        updateHero();
        syncUrlId();
        updateConvoMeta(); // odśwież listę projektów + tytuł karty przeglądarki
        syncProjectFromServer();
        scrollToBottom(true);
        // focus tylko na desktopie — na mobile klawiatura zasłoniłaby historię
        if (window.matchMedia('(hover: hover)').matches && !state.verdict && !el('inline-gate')) {
            el('chat-input').focus();
        }
    }

    /* ============================================================
       BIND + INIT
       ============================================================ */
    function bindChat() {
        var ta = el('chat-input');
        el('btn-send').addEventListener('click', sendMessage);
        ta.addEventListener('input', function () { autosize(); updateCharCount(); });
        ta.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey && window.matchMedia('(hover: hover)').matches) {
                e.preventDefault();
                sendMessage();
            }
        });
        el('chat-scroll').addEventListener('scroll', function () {
            var sc = el('chat-scroll');
            stickBottom = (sc.scrollHeight - sc.scrollTop - sc.clientHeight) < 140;
        }, { passive: true });
        el('btn-restart').addEventListener('click', newConvo);

        // Sidebar: zakładki + mobile off-canvas
        document.querySelectorAll('.side__item').forEach(function (b) {
            b.addEventListener('click', function () { switchTab(b.dataset.tab); });
        });
        el('btn-side').addEventListener('click', openSide);
        el('side-backdrop').addEventListener('click', closeSide);

        // Klawiatura ekranowa (iOS/Android): layout kurczy się do realnie
        // widocznego viewportu, composer nie znika pod klawiaturą
        if (window.visualViewport) {
            var vv = window.visualViewport;
            var onVV = function () {
                document.documentElement.style.setProperty('--vvh', vv.height + 'px');
                scrollToBottom(false);
            };
            vv.addEventListener('resize', onVV);
            onVV();
        }
        ta.addEventListener('focus', function () {
            setTimeout(function () { scrollToBottom(true); }, 300);
        });
    }

    // Migracja starych pojedynczych kluczy LS na format listy rozmów
    function migrateConvos() {
        if (loadJSON(LS_INDEX)) return;
        var old = loadJSON('spar_session');
        if (!old || !old.sessionId) return;
        saveJSON(sessionKey(old.sessionId), old);
        var om = loadJSON('spar_messages');
        if (om) saveJSON(messagesKey(old.sessionId), om);
        var op = loadJSON('spar_preview');
        if (op && op.sessionId === old.sessionId) saveJSON(previewKey(old.sessionId), op);
        saveJSON(LS_INDEX, [{
            id: old.sessionId,
            title: (old.lastBrief && old.lastBrief.nazwa) || old.profession || 'Rozmowa',
            verdict: old.verdict || null,
            ts: Date.now()
        }]);
        saveJSON(LS_ACTIVE, old.sessionId);
        try {
            localStorage.removeItem('spar_session');
            localStorage.removeItem('spar_messages');
            localStorage.removeItem('spar_preview');
        } catch (e) { }
    }

    function init() {
        // Powrót z OAuth (Google/Facebook): #access_token w hashu — obsłuż
        // i wyczyść ZANIM hash-routing zakładek cokolwiek zinterpretuje
        handleOAuthReturn();

        // ?projekt=<uuid> — publiczny podgląd udostępnionego projektu;
        // zastępuje całą appkę widokiem read-only, więc sprawdzamy pierwszy
        var qs = new URLSearchParams(window.location.search);
        var shareId = (qs.get('projekt') || '').trim();
        if (shareId && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(shareId)) {
            renderShareView(shareId);
            return;
        }

        captureTracking();
        bindChat();
        migrateConvos();

        // ?p=profesja z reklamy — otwarcie skrojone pod branżę
        var p = qs.get('p');
        if (p && P_OPENERS[p]) state.pSlug = p;

        // ?id=<uuid> — powrót do konkretnej rozmowy z linka; jeśli mamy ją
        // lokalnie — przełączamy się na nią, jeśli nie — adoptujemy (powrót
        // do własnej rozmowy NIE liczy się do limitu nowych)
        var urlId = (qs.get('id') || '').trim();
        var UUID_RE_URL = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
        if (urlId && UUID_RE_URL.test(urlId)) {
            if (loadJSON(sessionKey(urlId))) {
                loadConvo(urlId);
                applyHashTab();
                return;
            }
            state.sessionId = urlId;
            state.pSlug = state.pSlug || null;
            messages = [];
            addOpener();
            persistSession();
            saveMessages();
            enterChat(false);
            sysMsg('Wróciłeś do zapisanej rozmowy — wcześniejsze wiadomości mam zapisane po swojej stronie. Pisz dalej.');
            applyHashTab();
            return;
        }

        // Resume ostatniej aktywnej rozmowy
        var activeSid = loadJSON(LS_ACTIVE);
        var saved = activeSid ? loadJSON(sessionKey(activeSid)) : null;
        if (saved && saved.sessionId) {
            applySavedState(saved);
            enterChat(true);
            renderConvoList();
            applyHashTab();
            return;
        }
        // Brak aktywnej, ale są rozmowy na liście — wróć do najnowszej
        var idx = convoIndex();
        if (idx.length) {
            loadConvo(idx[idx.length - 1].id);
            applyHashTab();
            return;
        }

        if (state.pSlug) state.profession = P_OPENERS[state.pSlug].apiName;
        startFresh(false);

        // Tryb demo widoku generowania (?demo=podglad) — UI bez kosztu API
        if (new URLSearchParams(window.location.search).get('demo') === 'podglad') {
            requestPreviews(null, {
                insighty: [
                    'Pracownie nie płacą za „kolejny program" — płacą za koniec sporów z inwestorem o to, kto co zatwierdził.',
                    'Decyzję zakupową podejmuje właściciel pracowni, ale narzędzie sprzedaje się przez ulgę jego zespołu.',
                    'Najtańszy kanał dotarcia to społeczności branżowe — narzędzie poleca się samo, gdy widzi je inwestor.',
                    'Jedna funkcja używana co tydzień utrzymuje abonament lepiej niż dziesięć „na kiedyś".'
                ]
            }, true);
        }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>

</body>
</html>
