<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#000000">
    <title>Sparing — sprawdź swój pomysł na narzędzie | Tomek Niedźwiecki</title>
    <meta name="description" content="Zamień problem ze swojej branży w narzędzie, za które nisza płaci. Kilkanaście minut sparingu z AI, uczciwy werdykt, potem klikalna makieta w 7 dni roboczych.">
    <meta name="robots" content="noindex, follow">

    <link rel="icon" type="image/svg+xml" href="https://tomekniedzwiecki.pl/img/favicon.svg">
    <link rel="canonical" href="https://tomekniedzwiecki.pl/stworze/sparing/">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tomekniedzwiecki.pl/stworze/sparing/">
    <meta property="og:title" content="Sparing — sprawdź swój pomysł na narzędzie">
    <meta property="og:description" content="Kilkanaście minut rozmowy. Uczciwy werdykt. Jeśli problem się broni — klikalna makieta w 7 dni roboczych.">
    <meta property="og:image" content="https://tomekniedzwiecki.pl/img/tn_kwadrat.png">
    <meta property="og:locale" content="pl_PL">

    <!-- Preconnect: Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap">

    <style>
    /* ============================================================
       TOMEK NIEDŹWIECKI / STWORZĘ — Sparing (app-flow krokowy)
       DNA rodziny: Inter 700-900 + Instrument Serif italic, dark.
       Persona "stworzę" = NIEBIESKI #4d9fff
       (zbuduje=zielony #00d97e, zwolnie=czerwony #ff4b3e).
       ============================================================ */
    :root {
        --bg: #000;
        --bg-elev: #0a0a0a;
        --bg-card: #0d0d0d;

        --border: #1f1f1f;
        --border-strong: #2d2d2d;
        --border-hover: #404040;

        --text: #ededed;
        --text-strong: #ffffff;
        --text-muted: #8a8a8a;
        --text-faint: #5a5a5a;

        --accent: #4d9fff;
        --accent-soft: rgba(77, 159, 255, 0.12);
        --accent-dim: rgba(77, 159, 255, 0.05);
        --accent-ink: #061320;

        --green: #00d97e;
        --green-soft: rgba(0, 217, 126, 0.12);
        --red: #ff4b3e;
        --red-soft: rgba(255, 75, 62, 0.12);
        --yellow: #ffc53d;
        --yellow-soft: rgba(255, 197, 61, 0.12);

        --serif: 'Instrument Serif', Georgia, 'Times New Roman', serif;
        --sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

        --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        min-height: 100vh;
        min-height: 100dvh;
    }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
    ::selection { background: var(--accent); color: var(--accent-ink); }
    [hidden] { display: none !important; }

    /* ============================================================
       AURORA — niebieska, fixed za całością
       ============================================================ */
    .bg-aurora {
        position: fixed;
        top: -12%;
        left: 50%;
        width: clamp(480px, 80vw, 1100px);
        aspect-ratio: 1;
        background: radial-gradient(
            circle at center,
            rgba(77, 159, 255, 0.11) 0%,
            rgba(77, 159, 255, 0.03) 40%,
            transparent 70%
        );
        filter: blur(100px);
        transform: translateX(-50%);
        pointer-events: none;
        z-index: 0;
        animation: auroraDrift 26s ease-in-out infinite;
    }
    @keyframes auroraDrift {
        0%, 100% { transform: translateX(-52%) scale(1); }
        50%      { transform: translateX(-48%) scale(1.06) translateY(3%); }
    }
    @media (max-width: 820px) {
        .bg-aurora { animation: none; filter: blur(60px); opacity: 0.85; }
    }
    @media (prefers-reduced-motion: reduce) {
        .bg-aurora { animation: none; }
    }

    /* ============================================================
       NAV (kroki przed czatem)
       ============================================================ */
    .nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.55);
        -webkit-backdrop-filter: blur(20px);
                backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
    }
    .nav__inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
    }
    .nav__brand { display: inline-flex; align-items: center; height: 28px; transition: opacity 0.25s var(--ease); }
    .nav__brand:hover { opacity: 0.78; }
    .nav__logo { height: 100%; width: auto; display: block; user-select: none; }
    .nav__tag {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        white-space: nowrap;
    }
    body.is-chat .nav { display: none; }
    @media (max-width: 820px) {
        .nav { background: rgba(0, 0, 0, 0.88); -webkit-backdrop-filter: none; backdrop-filter: none; }
        .nav__tag { font-size: 11px; }
    }

    /* ============================================================
       VIEWS — app-flow krokowy
       ============================================================ */
    .app { position: relative; z-index: 1; }
    .view { display: none; }
    .view.is-active { display: flex; }

    .view--shell {
        min-height: 100vh;
        min-height: 100dvh;
        align-items: center;
        justify-content: center;
        padding: 96px 20px 56px;
    }
    .shell {
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        gap: 22px;
    }

    /* Fade-in elementów po aktywacji widoku */
    .view.is-active [data-fade] {
        animation: fadeUp 0.7s var(--ease) both;
        animation-delay: var(--d, 0ms);
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
        .view.is-active [data-fade] { animation: none; }
    }

    /* ============================================================
       TYPOGRAFIA kroków
       ============================================================ */
    .eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--text-muted);
        font-weight: 600;
    }
    .eyebrow b { color: var(--accent); font-weight: 700; }
    .h1 {
        font-family: var(--sans);
        font-weight: 800;
        font-size: clamp(30px, 6vw, 46px);
        line-height: 1.08;
        letter-spacing: -0.03em;
        color: var(--text-strong);
    }
    .h1 em {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 400;
        letter-spacing: -0.01em;
        color: var(--accent);
    }
    .lead {
        font-size: 16px;
        color: var(--text-muted);
        line-height: 1.55;
        max-width: 560px;
    }
    .lead strong { color: var(--text); font-weight: 600; }

    /* ============================================================
       KAFELKI (profesje + problemy)
       ============================================================ */
    .tiles { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 580px) {
        .tiles--cols { grid-template-columns: 1fr 1fr; }
    }
    .tile {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 16px 44px 16px 18px;
        background: rgba(255, 255, 255, 0.025);
        border: 1px solid var(--border);
        border-radius: 14px;
        text-align: left;
        width: 100%;
        transition: border-color 0.2s var(--ease), background 0.2s var(--ease), transform 0.2s var(--ease);
    }
    .tile:hover {
        border-color: rgba(77, 159, 255, 0.55);
        background: var(--accent-dim);
        transform: translateY(-1px);
    }
    .tile:active { transform: translateY(0); }
    .tile.is-selected {
        border-color: var(--accent);
        background: var(--accent-soft);
    }
    .tile__title { font-weight: 700; font-size: 16px; color: var(--text-strong); letter-spacing: -0.01em; }
    .tile__desc { font-size: 13px; color: var(--text-muted); line-height: 1.45; }
    .tile__arrow {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translate(-4px, -50%);
        color: var(--accent);
        font-weight: 700;
        opacity: 0;
        transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
    }
    .tile:hover .tile__arrow { opacity: 1; transform: translate(0, -50%); }
    .tile--ghost { border-style: dashed; border-color: var(--border-strong); }
    .tile--ghost .tile__title { color: var(--text); }

    /* Quick-reply chipy pod otwarciem rozmowy */
    .qr { display: flex; flex-wrap: wrap; gap: 8px; margin: 2px 0 10px; }
    .qr button {
        padding: 9px 14px;
        border-radius: 999px;
        border: 1px solid var(--border-strong);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-strong);
        font-size: 13.5px;
        transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
    }
    .qr button:hover { border-color: var(--accent); background: var(--accent-dim); }

    /* Bramka inline w rozmowie (imię + mail) */
    .msg--gate { width: 100%; max-width: 560px; }
    .msg--gate .f-row { margin: 12px 0; }
    .msg--gate .btn { margin-top: 2px; }
    .gate-msg__note { margin-top: 10px; font-size: 12.5px; color: var(--text-muted); }

    /* Pole "Robię coś innego" */
    .other-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 18px;
        border: 1px solid rgba(77, 159, 255, 0.4);
        border-radius: 14px;
        background: var(--accent-dim);
        animation: fadeUp 0.4s var(--ease) both;
    }
    .other-box label { font-size: 13px; font-weight: 500; color: var(--text); }

    /* ============================================================
       FORM (bramka) — wzorzec bw-* z /zwolnie, akcent niebieski
       ============================================================ */
    .f-label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .f-input {
        width: 100%;
        display: block;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-strong);
        border-radius: 12px;
        padding: 15px 17px;
        color: var(--text-strong);
        font-family: var(--sans);
        font-size: 16px;
        line-height: 1.5;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .f-input::placeholder { color: var(--text-faint); }
    .f-input:hover { border-color: var(--border-hover); }
    .f-input:focus {
        outline: none;
        border-color: var(--accent);
        background: rgba(77, 159, 255, 0.04);
        box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .f-error { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }
    .f-error.is-shown { display: block; }
    .f-row { display: flex; flex-direction: column; gap: 16px; }
    @media (min-width: 640px) {
        .f-row--two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    }

    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        height: 56px;
        padding: 0 28px;
        background: var(--text-strong);
        color: var(--bg);
        border-radius: 12px;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: -0.01em;
        transition: background 0.2s, transform 0.2s, color 0.2s;
        width: 100%;
        text-decoration: none;
    }
    .btn:hover { background: var(--accent); color: var(--accent-ink); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; background: var(--bg-card); color: var(--text-muted); }
    .btn__arrow { display: inline-block; font-weight: 700; transition: transform 0.2s var(--ease); }
    .btn:hover .btn__arrow { transform: translateX(3px); }

    .btn-back {
        background: transparent;
        color: var(--text-muted);
        font-size: 14px;
        padding: 8px 12px 8px 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: color 0.2s;
        width: fit-content;
        min-height: 40px;
    }
    .btn-back:hover { color: var(--text-strong); }

    .footer-note { color: var(--text-faint); font-size: 12px; }

    /* Chip kontekstu na bramce */
    .ctx-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        max-width: 100%;
        padding: 8px 14px;
        border: 1px solid rgba(77, 159, 255, 0.4);
        border-radius: 999px;
        background: var(--accent-dim);
        font-size: 13px;
        color: var(--text);
    }
    .ctx-chip b { color: var(--accent); font-weight: 700; }
    .ctx-chip span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ============================================================
       CZAT — fixed app, 100dvh, sticky composer
       ============================================================ */
    .view--chat {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: var(--bg);
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
    }

    .chat-top {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-elev);
    }
    .chat-top__brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-weight: 800;
        font-size: 14px;
        letter-spacing: -0.01em;
        color: var(--text-strong);
        flex-shrink: 0;
    }
    .chat-top__brand img { height: 22px; width: auto; }
    .chat-top__restart {
        flex-shrink: 0;
        font-size: 12px;
        color: var(--text-faint);
        padding: 8px 0 8px 8px;
        transition: color 0.2s;
        white-space: nowrap;
    }
    .chat-top__restart:hover { color: var(--text); }

    /* Pasek etapów 1-4 */
    .stages {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        list-style: none;
        min-width: 0;
    }
    .stage {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--text-faint);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        white-space: nowrap;
    }
    .stage + .stage::before {
        content: '';
        width: 14px;
        height: 1px;
        background: var(--border-strong);
        margin-right: 7px;
        flex-shrink: 0;
    }
    .stage__dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 1.5px solid var(--border-strong);
        display: grid;
        place-items: center;
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        flex-shrink: 0;
        transition: all 0.3s var(--ease);
    }
    .stage.is-active { color: var(--text-strong); }
    .stage.is-active .stage__dot {
        border-color: var(--accent);
        color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .stage.is-done .stage__dot {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-ink);
    }
    .stage.is-done { color: var(--text-muted); }
    @media (max-width: 720px) {
        .stage__label { display: none; }
        .stage.is-active .stage__label { display: inline; }
        .stage + .stage::before { width: 8px; margin-right: 4px; }
        .stages { gap: 2px; }
        .chat-top { gap: 10px; padding: 10px 12px; }
        .chat-top__brand span { display: none; }
    }

    .chat-scroll {
        flex: 1 1 auto;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        padding: 22px 16px 28px;
    }
    .chat-msgs {
        max-width: 760px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    /* Wiadomości */
    .msg { max-width: 86%; font-size: 15px; line-height: 1.6; animation: msgIn 0.3s var(--ease) both; }
    @keyframes msgIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    .msg p + p { margin-top: 10px; }
    .msg strong { color: var(--text-strong); }
    .msg--user {
        align-self: flex-end;
        background: rgba(77, 159, 255, 0.10);
        border: 1px solid rgba(77, 159, 255, 0.35);
        border-radius: 16px 16px 4px 16px;
        padding: 12px 16px;
        color: var(--text-strong);
        white-space: pre-wrap;
        word-wrap: break-word;
    }
    .msg--ai {
        align-self: flex-start;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px 16px 16px 4px;
        padding: 14px 18px;
    }
    .msg--sys {
        align-self: center;
        max-width: 100%;
        color: var(--text-muted);
        font-size: 13px;
        text-align: center;
        border: 1px dashed var(--border-strong);
        border-radius: 10px;
        padding: 8px 14px;
    }
    .msg--err { color: #ff9d96; border-color: rgba(255, 75, 62, 0.45); }

    /* Wskaźnik "pisze..." */
    .typing { display: inline-flex; align-items: center; gap: 5px; padding: 5px 2px; }
    .typing i {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--text-muted);
        animation: blink 1.2s ease-in-out infinite;
    }
    .typing i:nth-child(2) { animation-delay: 0.18s; }
    .typing i:nth-child(3) { animation-delay: 0.36s; }
    @keyframes blink {
        0%, 70%, 100% { opacity: 0.25; transform: translateY(0); }
        35%           { opacity: 1; transform: translateY(-2px); }
    }

    /* Composer (sticky dół) */
    .chat-composer {
        flex: 0 0 auto;
        border-top: 1px solid var(--border);
        background: var(--bg-elev);
        padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    }
    .composer__inner { max-width: 760px; margin: 0 auto; }
    .composer__bar { display: flex; align-items: flex-end; gap: 10px; }
    .composer__bar textarea {
        flex: 1;
        resize: none;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-strong);
        border-radius: 14px;
        padding: 14px 16px;
        color: var(--text-strong);
        font-family: var(--sans);
        font-size: 16px;
        line-height: 1.45;
        max-height: 140px;
        min-height: 50px;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .composer__bar textarea::placeholder { color: var(--text-faint); }
    .composer__bar textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .composer__bar textarea:disabled { opacity: 0.5; }
    .composer__send {
        flex-shrink: 0;
        width: 50px;
        height: 50px;
        border-radius: 14px;
        background: var(--accent);
        color: var(--accent-ink);
        font-size: 20px;
        font-weight: 800;
        display: grid;
        place-items: center;
        transition: transform 0.2s var(--ease), opacity 0.2s, background 0.2s;
    }
    .composer__send:hover { transform: translateY(-1px); background: #6cb0ff; }
    .composer__send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .composer__meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 6px;
        font-size: 11px;
        color: var(--text-faint);
        min-height: 14px;
    }
    @media (hover: none) { .composer__hint { display: none; } }

    /* Composer zablokowany (werdykt zielony/czerwony/limit) */
    .chat-locked {
        flex: 0 0 auto;
        border-top: 1px solid var(--border);
        background: var(--bg-elev);
        padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
        text-align: center;
        font-size: 13px;
        color: var(--text-muted);
    }

    /* ============================================================
       WERDYKT — banery, Karta Problemu, paybox
       ============================================================ */
    .verdict {
        align-self: stretch;
        max-width: 100%;
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-top: 8px;
        animation: msgIn 0.4s var(--ease) both;
    }
    .vbanner { border-radius: 16px; padding: 20px 22px; border: 1px solid; }
    .vbanner__title {
        font-family: var(--serif);
        font-style: italic;
        font-size: clamp(24px, 4vw, 32px);
        line-height: 1.15;
        letter-spacing: -0.01em;
        color: var(--text-strong);
        margin-bottom: 6px;
    }
    .vbanner__sub { font-size: 14px; color: var(--text-muted); line-height: 1.55; }
    .vbanner__sub strong { color: var(--text); }
    .vbanner--green  { background: rgba(0, 217, 126, 0.07);  border-color: rgba(0, 217, 126, 0.45); }
    .vbanner--green .vbanner__title em  { color: var(--green); font-style: italic; }
    .vbanner--yellow { background: rgba(255, 197, 61, 0.06); border-color: rgba(255, 197, 61, 0.4); }
    .vbanner--yellow .vbanner__title em { color: var(--yellow); font-style: italic; }
    .vbanner--red    { background: rgba(255, 75, 62, 0.06);  border-color: rgba(255, 75, 62, 0.4); }
    .vbanner--red .vbanner__title em    { color: var(--red); font-style: italic; }
    .vbanner .btn { margin-top: 16px; height: 50px; }

    /* Karta Problemu */
    .karta {
        border: 1px solid var(--border-strong);
        border-radius: 16px;
        background: var(--bg-card);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 18px;
    }
    .karta__eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--accent);
        font-weight: 700;
    }
    .karta__problem {
        font-family: var(--serif);
        font-style: italic;
        font-size: clamp(20px, 3.6vw, 27px);
        line-height: 1.25;
        color: var(--text-strong);
    }
    .karta__grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 580px) { .karta__grid { grid-template-columns: 1fr 1fr; } }
    .karta__item--wide { grid-column: 1 / -1; }
    .karta__label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-faint);
        font-weight: 600;
        margin-bottom: 4px;
    }
    .karta__value { font-size: 14px; color: var(--text); line-height: 1.55; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .chips span {
        font-size: 12.5px;
        padding: 5px 11px;
        border-radius: 999px;
        border: 1px solid rgba(77, 159, 255, 0.35);
        background: var(--accent-dim);
        color: var(--text);
        line-height: 1.4;
    }

    /* Paybox — Pierwsza Makieta 500 zł */
    .paybox {
        border: 1px solid rgba(77, 159, 255, 0.5);
        border-radius: 16px;
        padding: 26px 24px;
        background: linear-gradient(180deg, rgba(77, 159, 255, 0.09), rgba(77, 159, 255, 0.02));
        display: flex;
        flex-direction: column;
        gap: 14px;
    }
    .paybox__eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--accent);
        font-weight: 700;
    }
    .paybox__title {
        font-weight: 800;
        font-size: clamp(22px, 4vw, 30px);
        line-height: 1.15;
        letter-spacing: -0.025em;
        color: var(--text-strong);
    }
    .paybox__title em {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 400;
        color: var(--accent);
    }
    .paybox__list { list-style: none; display: flex; flex-direction: column; gap: 9px; }
    .paybox__list li {
        position: relative;
        padding-left: 24px;
        font-size: 14px;
        line-height: 1.55;
        color: var(--text-muted);
    }
    .paybox__list li strong { color: var(--text-strong); font-weight: 600; }
    .paybox__list li::before {
        content: '→';
        position: absolute;
        left: 0;
        color: var(--accent);
        font-weight: 700;
    }
    .paybox__credit {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.55;
        border-top: 1px solid var(--border);
        padding-top: 14px;
    }
    .paybox__credit strong { color: var(--text); }
    .paybox__btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        height: 58px;
        border-radius: 13px;
        background: var(--accent);
        color: var(--accent-ink);
        font-weight: 800;
        font-size: 16px;
        letter-spacing: -0.01em;
        transition: transform 0.2s var(--ease), background 0.2s, box-shadow 0.2s;
        box-shadow: 0 0 24px rgba(77, 159, 255, 0.25);
    }
    .paybox__btn:hover { background: #6cb0ff; transform: translateY(-1px); box-shadow: 0 0 34px rgba(77, 159, 255, 0.4); }
    .paybox__note { font-size: 12px; color: var(--text-faint); text-align: center; }

    /* noscript */
    .noscript-box {
        max-width: 560px;
        margin: 120px auto;
        padding: 24px;
        border: 1px solid var(--border-strong);
        border-radius: 14px;
        text-align: center;
        color: var(--text);
    }
    </style>
</head>
<body>

<div class="bg-aurora" aria-hidden="true"></div>

<noscript>
    <div class="noscript-box">Sparing to rozmowa na żywo — wymaga włączonego JavaScriptu. Włącz JS i odśwież stronę.</div>
</noscript>

<!-- ============================================================
     NAV — tylko kroki przed czatem
============================================================ -->
<nav class="nav" id="nav">
    <div class="nav__inner">
        <a href="https://tomekniedzwiecki.pl/stworze/" class="nav__brand" aria-label="Tomek Niedźwiecki — Stworzę">
            <img src="/img/logo/tn-logo-white-88.png" alt="Tomek Niedźwiecki" class="nav__logo" width="244" height="32">
        </a>
        <span class="nav__tag">Sparing · Pierwsza Makieta</span>
    </div>
</nav>

<main class="app">

    <!-- =====================================================
         KROK 4 — CZAT (sparing)
    ===================================================== -->
    <section class="view view--chat" id="view-chat">
        <header class="chat-top">
            <div class="chat-top__brand">
                <img src="/img/logo/tn-logo-icon-88.png" alt="" width="28" height="28" aria-hidden="true">
                <span>Sparing</span>
            </div>
            <ol class="stages" id="stages" aria-label="Etapy sparingu">
                <li class="stage" data-stage="1"><span class="stage__dot">1</span><span class="stage__label">Grunt</span></li>
                <li class="stage" data-stage="2"><span class="stage__dot">2</span><span class="stage__label">Ból</span></li>
                <li class="stage" data-stage="3"><span class="stage__dot">3</span><span class="stage__label">Stress&#8209;test</span></li>
                <li class="stage" data-stage="4"><span class="stage__dot">4</span><span class="stage__label">Werdykt</span></li>
            </ol>
            <button type="button" class="chat-top__restart" id="btn-restart">Nowa rozmowa</button>
        </header>

        <div class="chat-scroll" id="chat-scroll">
            <div class="chat-msgs" id="chat-msgs" aria-live="polite"></div>
        </div>

        <div class="chat-composer" id="composer">
            <div class="composer__inner">
                <div class="composer__bar">
                    <textarea id="chat-input" rows="1" maxlength="2000" placeholder="Napisz odpowiedź…" aria-label="Twoja wiadomość"></textarea>
                    <button type="button" class="composer__send" id="btn-send" aria-label="Wyślij wiadomość">→</button>
                </div>
                <div class="composer__meta">
                    <span class="composer__hint">Enter — wyślij · Shift+Enter — nowa linia</span>
                    <span id="char-count"></span>
                </div>
            </div>
        </div>
        <div class="chat-locked" id="chat-locked" hidden><span id="chat-locked-text"></span></div>
    </section>

</main>

<script>
(function () {
    'use strict';

    /* ============================================================
       KONFIG
       ============================================================ */
    var SPAR_ENDPOINT = 'https://yxmavwkwnfuphjqbelws.supabase.co/functions/v1/spar-chat';
    var CHECKOUT_BASE = 'https://crm.tomekniedzwiecki.pl/checkout/v2/';
    var OFFER_ID = 'a1656695-db0d-4ae7-b107-230832042076'; // oferta "Pierwsza Makieta — Stworzę" (500 zł)
    var SB_PUBLISHABLE = 'sb_publishable_vT94u2GI4gzYl8gCV5sHbQ_Q94YidaI';

    var LS_SESSION = 'spar_session';
    var LS_MESSAGES = 'spar_messages';
    var LS_TRACKING = 'spar_tracking';
    var MAX_MSG_LEN = 2000;
    var WERDYKT_MARK = '<werdykt';

    /* ============================================================
       DANE — chipy profesji + otwarcia rozmowy (?p= z reklam)
       ============================================================ */
    var GATE_AFTER_USER_MSGS = 4; // po tylu wiadomościach rozmówcy pojawia się bramka (imię + mail)

    var PROF_CHIPS = [
        { apiName: 'Księgowi / biuro rachunkowe',      label: 'Prowadzę biuro rachunkowe' },
        { apiName: 'Architekci / projektanci wnętrz',  label: 'Projektuję wnętrza albo budynki' },
        { apiName: 'Agenci nieruchomości',             label: 'Sprzedaję nieruchomości' },
        { apiName: 'Fizjoterapeuci',                   label: 'Prowadzę gabinet fizjoterapii' },
        { apiName: 'Szkoleniowcy / firmy szkoleniowe', label: 'Szkolę ludzi i firmy' },
        { apiName: 'Marketingowcy / agencje',          label: 'Robię marketing klientom' }
    ];

    var OPENER_INTRO = 'Cześć. Jestem sparingiem wytrenowanym przez Tomka Niedźwieckiego — sprawdzam, czy problem z Twojej codziennej roboty nadaje się na narzędzie, za które Twoja branża zapłaci. I umiem powiedzieć „nie".';

    var OPENER_GENERIC = OPENER_INTRO + '\n\nCzym się zajmujesz na co dzień? Wybierz niżej albo napisz po swojemu.';

    var P_OPENERS = {
        ksiegowosc: {
            apiName: 'Księgowi / biuro rachunkowe',
            opener: OPENER_INTRO + '\n\nProwadzisz biuro rachunkowe, tak? To zacznijmy od najgorszego momentu miesiąca: **co się u Ciebie dzieje między 15. a 20.?**'
        },
        architektura: {
            apiName: 'Architekci / projektanci wnętrz',
            opener: OPENER_INTRO + '\n\nProjektujesz wnętrza albo budynki, tak? Zacznijmy od inwestorów: **co w pracy z nimi kosztuje Cię najwięcej godzin albo nerwów?**'
        },
        nieruchomosci: {
            apiName: 'Agenci nieruchomości',
            opener: OPENER_INTRO + '\n\nDziałasz w nieruchomościach, tak? Zacznijmy od procesu: **gdzie między pozyskaniem oferty a aktem tracisz najwięcej czasu?**'
        },
        fizjoterapia: {
            apiName: 'Fizjoterapeuci',
            opener: OPENER_INTRO + '\n\nProwadzisz gabinet fizjoterapii, tak? Zacznijmy od pacjentów: **co dzieje się między wizytami, czego nie widzisz — a co psuje efekty terapii?**'
        },
        szkolenia: {
            apiName: 'Szkoleniowcy / firmy szkoleniowe',
            opener: OPENER_INTRO + '\n\nSzkolisz ludzi albo firmy, tak? Zacznijmy od zaplecza: **co przy każdym szkoleniu robisz ręcznie od nowa, choć zawsze wygląda tak samo?**'
        },
        marketing: {
            apiName: 'Marketingowcy / agencje',
            opener: OPENER_INTRO + '\n\nRobisz marketing klientom, tak? Zacznijmy od obsługi: **co przy każdym kliencie pożera czas, choć nie jest robotą kreatywną?**'
        }
    };

    /* ============================================================
       STAN
       ============================================================ */
    var state = {
        pSlug: null,            // slug z ?p= (otwarcie skrojone pod branżę z reklamy)
        profession: null,       // string wysyłany do API (chip / ?p=) lub null — AI ustala w rozmowie
        email: null,            // podawany w bramce INLINE po GATE_AFTER_USER_MSGS wiadomościach
        name: null,
        sessionId: null,
        verdict: null,          // 'zielony'|'zolty'|'czerwony'|null
        karta: null,            // obiekt karty z markera
        leadId: null
    };
    var messages = [];          // {role:'user'|'assistant', content, local?:true}
    var streaming = false;
    var stickBottom = true;

    /* ============================================================
       HELPERS
       ============================================================ */
    function el(id) { return document.getElementById(id); }
    function loadJSON(key) {
        try { return JSON.parse(localStorage.getItem(key)); } catch (e) { return null; }
    }
    function saveJSON(key, val) {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
    }
    function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function getCookie(name) {
        var v = '; ' + document.cookie;
        var parts = v.split('; ' + name + '=');
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }
    function persistSession() {
        saveJSON(LS_SESSION, {
            pSlug: state.pSlug,
            profession: state.profession,
            email: state.email,
            name: state.name,
            sessionId: state.sessionId,
            verdict: state.verdict,
            karta: state.karta,
            leadId: state.leadId
        });
    }
    function saveMessages() { saveJSON(LS_MESSAGES, messages); }

    /* ============================================================
       TRACKING — capture do localStorage (wzorzec /zbuduje),
       klucze ściśle wg kontraktu spar-chat
       ============================================================ */
    function captureTracking() {
        try {
            var KEYS = ['gclid', 'fbclid', 'ttclid', 'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
            var u = new URLSearchParams(window.location.search);
            var stored = loadJSON(LS_TRACKING) || {};
            KEYS.forEach(function (k) { var val = u.get(k); if (val) stored[k] = val; });
            var fbp = getCookie('_fbp'); if (fbp) stored.fbp = fbp;
            if (!stored.landing_page) stored.landing_page = window.location.href;
            if (!stored.referrer && document.referrer) stored.referrer = document.referrer;
            saveJSON(LS_TRACKING, stored);
        } catch (e) {}
    }
    function getTracking() {
        var t = loadJSON(LS_TRACKING);
        return (t && Object.keys(t).length) ? t : null;
    }

    /* ============================================================
       WIDOKI
       ============================================================ */
    function showView(name) {
        // Czat jest jedynym widokiem — strona startuje prosto w rozmowie
        el('view-chat').classList.add('is-active');
        document.body.classList.add('is-chat');
        window.scrollTo(0, 0);
    }

    /* ============================================================
       OTWARCIE ROZMOWY, CHIPY, BRAMKA INLINE
       ============================================================ */
    function uuid4() {
        return (window.crypto && crypto.randomUUID)
            ? crypto.randomUUID()
            : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
    }

    // Otwarcie rozmowy — lokalne (zero API), dopasowane do ?p= z reklamy
    function addOpener() {
        var o = state.pSlug && P_OPENERS[state.pSlug] ? P_OPENERS[state.pSlug] : null;
        messages.push({ role: 'assistant', content: o ? o.opener : OPENER_GENERIC, local: true });
    }

    // Chipy szybkich odpowiedzi pod otwarciem (tylko wejście ogólne, bez ?p=)
    function renderChips() {
        if (el('qr-chips')) return;
        var div = document.createElement('div');
        div.className = 'qr';
        div.id = 'qr-chips';
        PROF_CHIPS.forEach(function (c) {
            var b = document.createElement('button');
            b.type = 'button';
            b.textContent = c.label;
            b.addEventListener('click', function () {
                if (streaming) return;
                state.profession = c.apiName;
                persistSession();
                removeChips();
                sendOpening(c.label);
            });
            div.appendChild(b);
        });
        el('chat-msgs').appendChild(div);
    }
    function removeChips() {
        var c = el('qr-chips');
        if (c) c.remove();
    }

    /* ============================================================
       BRAMKA INLINE — w rozmowie, po GATE_AFTER_USER_MSGS
       wiadomościach rozmówcy (server-side backstop: wymagany_email)
       ============================================================ */
    var GATE_EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    function gatePending() {
        if (state.email || state.verdict) return false;
        var userCount = messages.filter(function (m) { return m.role === 'user'; }).length;
        return userCount >= GATE_AFTER_USER_MSGS;
    }

    function renderInlineGate() {
        if (el('inline-gate') || state.email) return;
        setComposerEnabled(false);
        var div = document.createElement('div');
        div.className = 'msg msg--ai msg--gate';
        div.id = 'inline-gate';
        div.innerHTML =
            '<p>Mamy grunt. Zanim wejdziemy głębiej — zostaw imię i mail. Dostaniesz podsumowanie i Kartę Problemu, a rozmowa nie zginie, gdyby coś przerwało.</p>' +
            '<form id="gate-form" novalidate>' +
            '<div class="f-row f-row--two">' +
            '<div><label class="f-label" for="gate-name">Imię</label>' +
            '<input class="f-input" type="text" id="gate-name" placeholder="Jan" autocomplete="given-name" maxlength="80" required>' +
            '<div class="f-error" id="gate-name-error">Podaj imię.</div></div>' +
            '<div><label class="f-label" for="gate-email">E-mail</label>' +
            '<input class="f-input" type="email" id="gate-email" placeholder="ty@firma.pl" autocomplete="email" required>' +
            '<div class="f-error" id="gate-email-error">Podaj poprawny adres e-mail.</div></div>' +
            '</div>' +
            '<button type="submit" class="btn" id="gate-submit">Gramy dalej <span class="btn__arrow">→</span></button>' +
            '</form>' +
            '<p class="gate-msg__note">Zero newslettera. Mail służy tej jednej rozmowie i podsumowaniu, które z niej wyjdzie.</p>';
        el('chat-msgs').appendChild(div);
        scrollToBottom(true);

        el('gate-form').addEventListener('submit', function (e) {
            e.preventDefault();
            var name = el('gate-name').value.trim();
            var email = el('gate-email').value.trim();
            var ok = true;
            el('gate-name-error').classList.toggle('is-shown', !name);
            if (!name) ok = false;
            var emailOk = GATE_EMAIL_RE.test(email);
            el('gate-email-error').classList.toggle('is-shown', !emailOk);
            if (!emailOk) ok = false;
            if (!ok) return;
            state.name = name;
            state.email = email;
            persistSession();
            div.remove();
            sysMsg('Dzięki, ' + name.split(' ')[0] + '. Gramy dalej — pisz.');
            setComposerEnabled(true);
            if (window.matchMedia('(hover: hover)').matches) el('chat-input').focus();
        });
    }

    // Świeża rozmowa (nowy sessionId); keepContact=true zachowuje imię i mail
    function startFresh(keepContact) {
        if (!keepContact) { state.email = null; state.name = null; }
        state.sessionId = uuid4();
        state.verdict = null; state.karta = null; state.leadId = null;
        if (!state.pSlug) state.profession = null;
        messages = [];
        el('chat-msgs').innerHTML = '';
        addOpener();
        persistSession();
        saveMessages();
        enterChat(false);
    }

    /* ============================================================
       CZAT — render
       ============================================================ */
    function visibleText(raw) {
        var t = raw;
        var i = t.indexOf(WERDYKT_MARK);
        if (i >= 0) {
            var close = t.indexOf('</werdykt>');
            t = (close >= 0) ? (t.slice(0, i) + t.slice(close + 10)) : t.slice(0, i);
        } else {
            // częściowy marker na końcu streamu — buforuj ('<', '<w', '<we'…)
            for (var k = WERDYKT_MARK.length - 1; k > 0; k--) {
                if (t.slice(-k) === WERDYKT_MARK.slice(0, k)) { t = t.slice(0, t.length - k); break; }
            }
        }
        return t.replace(/\s+$/, '');
    }

    function renderRich(s) {
        var h = esc(s);
        h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        return h.split(/\n{2,}/).map(function (p) {
            return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
        }).join('');
    }

    function appendMessage(role, content) {
        var div = document.createElement('div');
        div.className = 'msg msg--' + (role === 'user' ? 'user' : 'ai');
        if (role === 'user') div.textContent = content;
        else div.innerHTML = renderRich(visibleText(content));
        el('chat-msgs').appendChild(div);
        scrollToBottom(false);
        return div;
    }

    function sysMsg(text, isErr) {
        var div = document.createElement('div');
        div.className = 'msg msg--sys' + (isErr ? ' msg--err' : '');
        div.textContent = text;
        el('chat-msgs').appendChild(div);
        scrollToBottom(true);
    }

    function scrollToBottom(force) {
        var sc = el('chat-scroll');
        if (force || stickBottom) sc.scrollTop = sc.scrollHeight;
    }

    /* ============================================================
       PASEK ETAPÓW — heurystyka: liczba tur + spar_meta
       ============================================================ */
    function updateStages() {
        var userCount = messages.filter(function (m) { return m.role === 'user'; }).length;
        var stage;
        if (state.verdict) stage = 4;
        else if (userCount <= 3) stage = 1;
        else if (userCount <= 6) stage = 2;
        else stage = 3;
        document.querySelectorAll('#stages .stage').forEach(function (li) {
            var n = parseInt(li.dataset.stage, 10);
            li.classList.toggle('is-done', n < stage || (state.verdict && n === 4));
            li.classList.toggle('is-active', n === stage && !(state.verdict && n === 4));
        });
    }

    /* ============================================================
       COMPOSER
       ============================================================ */
    function setComposerEnabled(on) {
        el('chat-input').disabled = !on;
        el('btn-send').disabled = !on;
    }
    function lockComposer(text) {
        el('composer').hidden = true;
        el('chat-locked').hidden = false;
        el('chat-locked-text').textContent = text;
    }
    function unlockComposer() {
        el('composer').hidden = false;
        el('chat-locked').hidden = true;
        setComposerEnabled(true);
    }
    function autosize() {
        var ta = el('chat-input');
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
    }
    function updateCharCount() {
        var len = el('chat-input').value.length;
        el('char-count').textContent = (len >= 1600) ? (len + ' / ' + MAX_MSG_LEN) : '';
    }

    /* ============================================================
       WYSYŁKA + STREAMING SSE
       ============================================================ */
    function sendMessage() {
        var ta = el('chat-input');
        var text = ta.value.trim();
        if (!text || streaming) return;
        if (el('inline-gate')) return; // bramka czeka na imię i mail
        removeChips();
        if (text.length > MAX_MSG_LEN) {
            sysMsg('Maksymalnie ' + MAX_MSG_LEN + ' znaków na wiadomość. Skróć i wyślij ponownie.', true);
            return;
        }
        var priorUser = messages.filter(function (m) { return m.role === 'user'; }).length;
        messages.push({ role: 'user', content: text });
        saveMessages();
        appendMessage('user', text);
        ta.value = '';
        autosize();
        updateCharCount();
        updateStages();
        streamReply(text, priorUser === 0);
    }

    // Auto-wysyłka problemu wpisanego w kroku 2 jako otwarcie rozmowy
    function sendOpening(text) {
        if (streaming) return;
        messages.push({ role: 'user', content: text });
        saveMessages();
        appendMessage('user', text);
        updateStages();
        streamReply(text, true);
    }

    function streamReply(text, isFirst) {
        streaming = true;
        setComposerEnabled(false);
        stickBottom = true;

        var bubble = document.createElement('div');
        bubble.className = 'msg msg--ai';
        bubble.innerHTML = '<span class="typing" aria-label="Sparing pisze"><i></i><i></i><i></i></span>';
        el('chat-msgs').appendChild(bubble);
        scrollToBottom(true);

        var raw = '';
        var meta = { verdict: null, leadId: null };
        var gotText = false;
        var failedBeforeText = false;

        var body = {
            sessionId: state.sessionId,
            profession: state.profession,
            email: state.email,
            name: state.name,
            message: text,
            tracking: isFirst ? getTracking() : null
        };

        fetch(SPAR_ENDPOINT, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SB_PUBLISHABLE
            },
            body: JSON.stringify(body)
        }).then(function (res) {
            if (!res.ok) {
                return res.json().catch(function () { return {}; }).then(function (err) {
                    var e = new Error('http');
                    e.status = res.status;
                    e.code = err && err.error;
                    throw e;
                });
            }
            var reader = res.body.getReader();
            var decoder = new TextDecoder();
            var buf = '';

            function handleEvent(rawEvent) {
                var ev = null;
                var dataLines = [];
                rawEvent.split('\n').forEach(function (line) {
                    if (line.indexOf('event:') === 0) ev = line.slice(6).trim();
                    else if (line.indexOf('data:') === 0) dataLines.push(line.slice(5).replace(/^ /, ''));
                });
                if (!dataLines.length) return;
                var obj;
                try { obj = JSON.parse(dataLines.join('\n')); } catch (e) { return; }
                if (ev === 'spar_meta') {
                    meta.verdict = obj.verdict || null;
                    meta.leadId = obj.leadId || null;
                    return;
                }
                if (obj.type === 'content_block_delta' && obj.delta && obj.delta.type === 'text_delta') {
                    raw += obj.delta.text;
                    if (!gotText) { gotText = true; }
                    bubble.innerHTML = renderRich(visibleText(raw)) || '<span class="typing"><i></i><i></i><i></i></span>';
                    scrollToBottom(false);
                } else if (obj.type === 'error' || ev === 'error') {
                    var e2 = new Error('stream');
                    e2.streamError = true;
                    throw e2;
                }
            }

            function pump() {
                return reader.read().then(function (r) {
                    if (r.done) {
                        buf += decoder.decode();
                        if (buf.trim()) handleEvent(buf.replace(/\r\n/g, '\n'));
                        return;
                    }
                    buf += decoder.decode(r.value, { stream: true }).replace(/\r\n/g, '\n');
                    var idx;
                    while ((idx = buf.indexOf('\n\n')) >= 0) {
                        var rawEvent = buf.slice(0, idx);
                        buf = buf.slice(idx + 2);
                        handleEvent(rawEvent);
                    }
                    return pump();
                });
            }
            return pump();
        }).catch(function (err) {
            if (err && err.code === 'wymagany_email') {
                // server-side backstop bramki — pokaż formularz, przywróć wiadomość
                failedBeforeText = !gotText;
                restoreFailedMessage(text);
                renderInlineGate();
            } else if (err && err.status === 429 && err.code === 'limit_tur') {
                failedBeforeText = !gotText;
                sysMsg('Dobiliśmy do limitu 30 tur tej rozmowy. Sparing tyle nie potrzebuje — jeśli werdykt nie padł, zacznij nową rozmowę z węższym problemem.', true);
                lockComposer('Limit 30 tur osiągnięty — rozmowa zamknięta.');
            } else if (err && err.status === 429) {
                failedBeforeText = !gotText;
                restoreFailedMessage(text);
                sysMsg('Za dużo wiadomości w krótkim czasie (limit 60 na godzinę). Odczekaj chwilę i wyślij ponownie.', true);
            } else if (err && err.status) {
                failedBeforeText = !gotText;
                restoreFailedMessage(text);
                sysMsg('Coś poszło nie tak po stronie serwera (' + err.status + '). Spróbuj ponownie za chwilę — rozmowa jest zapisana.', true);
            } else {
                // sieć / przerwany stream
                if (!gotText) { failedBeforeText = true; restoreFailedMessage(text); }
                sysMsg('Połączenie przerwane. To, co już padło, jest zapisane — wyślij ponownie albo pisz dalej.', true);
            }
        }).then(function () {
            streaming = false;
            if (el('composer').hidden === false) setComposerEnabled(true);

            if (failedBeforeText && !raw) {
                bubble.remove();
                updateStages();
                return;
            }
            if (raw) {
                bubble.innerHTML = renderRich(visibleText(raw)) || '';
                messages.push({ role: 'assistant', content: raw });
                saveMessages();
            } else {
                bubble.remove();
            }

            // Werdykt: spar_meta ma priorytet, fallback = parsowanie markera
            var parsed = parseWerdykt(raw);
            var verdict = meta.verdict || (parsed && parsed.kolor) || null;
            if (verdict) {
                state.verdict = verdict;
                state.karta = (parsed && parsed.karta) ? parsed.karta : state.karta;
                if (meta.leadId) state.leadId = meta.leadId;
                persistSession();
                renderVerdict(verdict, state.karta);
            } else if (gatePending() && !el('inline-gate')) {
                renderInlineGate();
            }
            updateStages();
            scrollToBottom(false);
        });
    }

    function restoreFailedMessage(text) {
        // cofnij ostatnią wiadomość usera z lokalnej historii i przywróć do pola
        var last = messages[messages.length - 1];
        if (last && last.role === 'user' && last.content === text) {
            messages.pop();
            saveMessages();
            var bubbles = el('chat-msgs').querySelectorAll('.msg--user');
            if (bubbles.length) bubbles[bubbles.length - 1].remove();
        }
        el('chat-input').value = text;
        autosize();
        updateCharCount();
    }

    function parseWerdykt(raw) {
        if (!raw) return null;
        var m = raw.match(/<werdykt>([\s\S]*?)<\/werdykt>/);
        if (!m) return null;
        try { return JSON.parse(m[1]); } catch (e) { return null; }
    }

    /* ============================================================
       WERDYKT — render
       ============================================================ */
    function checkoutURL() {
        var u = CHECKOUT_BASE + '?offer=' + encodeURIComponent(OFFER_ID);
        if (state.leadId) u += '&lead=' + encodeURIComponent(state.leadId);
        return u;
    }

    function kartaHTML(k) {
        if (!k) return '';
        function item(label, val, wide) {
            if (!val) return '';
            return '<div class="karta__item' + (wide ? ' karta__item--wide' : '') + '">' +
                '<div class="karta__label">' + label + '</div>' +
                '<div class="karta__value">' + esc(val) + '</div></div>';
        }
        function chipsItem(label, arr) {
            if (!arr || !arr.length) return '';
            return '<div class="karta__item karta__item--wide">' +
                '<div class="karta__label">' + label + '</div>' +
                '<div class="chips">' + arr.map(function (x) { return '<span>' + esc(x) + '</span>'; }).join('') + '</div></div>';
        }
        return '<div class="karta">' +
            '<div><div class="karta__eyebrow">Karta Problemu</div>' +
            '<div class="karta__problem">' + esc(k.problem || '') + '</div></div>' +
            '<div class="karta__grid">' +
            item('Profesja', k.profesja) +
            item('Kto płaci', k.kto_placi) +
            item('Dzisiejsze obejście', k.dzisiejsze_obejscie, true) +
            chipsItem('Ekrany narzędzia', k.ekrany) +
            chipsItem('Kanały dystrybucji', k.kanaly_dystrybucji) +
            item('Sygnał budżetu', k.sygnal_budzetu) +
            item('Konkurencja', k.konkurencja) +
            chipsItem('Ryzyka', k.ryzyka) +
            '</div></div>';
    }

    function payboxHTML() {
        return '<div class="paybox">' +
            '<div class="paybox__eyebrow">Następny krok</div>' +
            '<h3 class="paybox__title">Pierwsza Makieta — <em>500 zł</em></h3>' +
            '<ul class="paybox__list">' +
            '<li><strong>Klikalna makieta 5–7 ekranów</strong> Twojego narzędzia. W 7 dni roboczych.</li>' +
            '<li><strong>Plan Niszy</strong> — kto płaci, ile i którym kanałem do nich dotrzeć.</li>' +
            '<li><strong>Wideo-walkthrough</strong> — przechodzę przez makietę ekran po ekranie i tłumaczę decyzje.</li>' +
            '<li><strong>Wycena budowy</strong> działającej wersji. Konkretna kwota, nie widełki z sufitu.</li>' +
            '</ul>' +
            '<p class="paybox__credit"><strong>500 zł odliczam w 100% od ceny budowy.</strong> Jeśli wchodzisz dalej: budowa od 14 000 zł brutto + 20% udziałów — zarabiam wtedy, gdy narzędzie zarabia.</p>' +
            '<a class="paybox__btn" href="' + checkoutURL() + '">Zamawiam Pierwszą Makietę → 500 zł</a>' +
            '<p class="paybox__note">Płatność online: BLIK, karta lub przelew.</p>' +
            '</div>';
    }

    function renderVerdict(color, karta) {
        var wrap = document.createElement('div');
        wrap.className = 'verdict';

        if (color === 'zielony') {
            wrap.innerHTML =
                '<div class="vbanner vbanner--green">' +
                '<div class="vbanner__title">Werdykt: <em>zielony.</em></div>' +
                '<div class="vbanner__sub">Problem się broni: jest ból, jest płacący i jest droga dotarcia. Karta Problemu poniżej — <strong>na jej podstawie powstanie makieta</strong>.</div>' +
                '</div>' +
                kartaHTML(karta) +
                payboxHTML();
            el('chat-msgs').appendChild(wrap);
            lockComposer('Werdykt zielony — rozmowa zakończona. Podsumowanie dostaniesz na ' + (state.email || 'maila') + '.');
        } else if (color === 'zolty') {
            wrap.innerHTML =
                '<div class="vbanner vbanner--yellow">' +
                '<div class="vbanner__title">Werdykt: <em>żółty.</em> Jeszcze za mgliste.</div>' +
                '<div class="vbanner__sub">Czego brakuje, masz w odpowiedzi powyżej. <strong>Doprecyzuj i pisz dalej</strong> — werdykt może się zmienić.</div>' +
                '</div>';
            el('chat-msgs').appendChild(wrap);
            unlockComposer();
        } else if (color === 'czerwony') {
            wrap.innerHTML =
                '<div class="vbanner vbanner--red">' +
                '<div class="vbanner__title">Werdykt: <em>czerwony.</em></div>' +
                '<div class="vbanner__sub">Ten problem nie obroni się jako płatne narzędzie — powody masz powyżej. To nie porażka. <strong>To zaoszczędzone minimum 14 000 zł.</strong> Masz inny problem z praktyki? Sprawdźmy go.</div>' +
                '<button type="button" class="btn" id="btn-new-problem">Wybieram inny problem <span class="btn__arrow">→</span></button>' +
                '</div>';
            el('chat-msgs').appendChild(wrap);
            lockComposer('Werdykt czerwony — wybierz inny problem powyżej.');
            var b = wrap.querySelector('#btn-new-problem');
            if (b) b.addEventListener('click', resetToNewProblem);
        }
        scrollToBottom(true);
    }

    /* ============================================================
       RESETY
       ============================================================ */
    function resetToNewProblem() {
        unlockComposer();
        startFresh(true);
    }

    function restartAll() {
        if (!window.confirm('Zacząć od nowa? Obecna rozmowa zostanie zamknięta.')) return;
        try {
            localStorage.removeItem(LS_SESSION);
            localStorage.removeItem(LS_MESSAGES);
        } catch (e) {}
        unlockComposer();
        startFresh(false);
    }

    /* ============================================================
       WEJŚCIE DO CZATU (nowa rozmowa lub resume)
       ============================================================ */
    function enterChat(isResume) {
        showView('chat');
        el('chat-msgs').innerHTML = '';
        unlockComposer();

        if (isResume && messages.length === 0) {
            addOpener();
            saveMessages();
        }
        messages.forEach(function (m) { appendMessage(m.role, m.content); });

        var userCount = messages.filter(function (m) { return m.role === 'user'; }).length;

        if (state.verdict) {
            // odtwórz blok werdyktu po historii
            renderVerdict(state.verdict, state.karta);
            if (isResume && state.verdict === 'zolty') {
                sysMsg('Wróciłeś do rozmowy. Werdykt na ten moment: żółty — doprecyzuj i pisz dalej.');
            }
        } else if (userCount === 0 && !state.profession) {
            renderChips();
        } else if (gatePending()) {
            renderInlineGate();
        } else if (isResume && messages.length > 1) {
            sysMsg('Rozmowa przywrócona. Piszemy dalej.');
        }

        updateStages();
        scrollToBottom(true);
        // focus tylko na desktopie — na mobile klawiatura zasłoniłaby historię
        if (window.matchMedia('(hover: hover)').matches && !state.verdict && !el('inline-gate')) {
            el('chat-input').focus();
        }
    }

    /* ============================================================
       BIND + INIT
       ============================================================ */
    function bindChat() {
        var ta = el('chat-input');
        el('btn-send').addEventListener('click', sendMessage);
        ta.addEventListener('input', function () { autosize(); updateCharCount(); });
        ta.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey && window.matchMedia('(hover: hover)').matches) {
                e.preventDefault();
                sendMessage();
            }
        });
        el('chat-scroll').addEventListener('scroll', function () {
            var sc = el('chat-scroll');
            stickBottom = (sc.scrollHeight - sc.scrollTop - sc.clientHeight) < 140;
        }, { passive: true });
        el('btn-restart').addEventListener('click', restartAll);
    }

    function init() {
        captureTracking();
        bindChat();

        // ?p=profesja z reklamy — otwarcie skrojone pod branżę
        var p = new URLSearchParams(window.location.search).get('p');
        if (p && P_OPENERS[p]) state.pSlug = p;

        // Resume sesji (mail może jeszcze nie być podany — bramka jest w rozmowie)
        var saved = loadJSON(LS_SESSION);
        if (saved && saved.sessionId) {
            state.pSlug = saved.pSlug || state.pSlug;
            state.profession = saved.profession || (state.pSlug ? P_OPENERS[state.pSlug].apiName : null);
            state.email = saved.email || null;
            state.name = saved.name || null;
            state.sessionId = saved.sessionId;
            state.verdict = saved.verdict || null;
            state.karta = saved.karta || null;
            state.leadId = saved.leadId || null;
            messages = loadJSON(LS_MESSAGES) || [];
            enterChat(true);
            return;
        }

        if (state.pSlug) state.profession = P_OPENERS[state.pSlug].apiName;
        startFresh(false);
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>
