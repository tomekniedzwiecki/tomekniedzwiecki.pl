</main>

<script>
(function () {
    'use strict';

    /* ============================================================
       KONFIG
       ============================================================ */
    var SPAR_ENDPOINT = 'https://yxmavwkwnfuphjqbelws.supabase.co/functions/v1/spar-chat';
    var SPAR_IMAGE_ENDPOINT = 'https://yxmavwkwnfuphjqbelws.supabase.co/functions/v1/spar-image';
    var PANEL_URL = 'https://crm.tomekniedzwiecki.pl/stworze-projekt.html'; // panel projektu po rozmowie
    var SB_PUBLISHABLE = 'sb_publishable_vT94u2GI4gzYl8gCV5sHbQ_Q94YidaI';

    var LS_SESSION = 'spar_session';
    var LS_MESSAGES = 'spar_messages';
    var LS_TRACKING = 'spar_tracking';
    var LS_PREVIEW = 'spar_preview'; // {sessionId, url} — ostatni wygenerowany podgląd (resume po refreshu)
    var DEMO_PREVIEW_URL = '/stworze/sparing/demo-podglad.png'; // ?demo=podglad (statyczny asset w repo)
    var MAX_MSG_LEN = 2000;

    /* ============================================================
       DANE — chipy profesji + otwarcia rozmowy (?p= z reklam)
       ============================================================ */
    var GATE_AFTER_USER_MSGS = 4; // po tylu wiadomościach rozmówcy pojawia się bramka (imię + mail)

    // Otwarcie: lekkie, z obietnicą (podgląd narzędzia za parę minut), zero progów
    var OPENER_HI = 'Cześć! Tu AI Tomka Niedźwieckiego.';
    var OPENER_PROMISE = 'Kilka pytań — głównie klikasz, nie piszesz — i za parę minut zobaczysz pierwszy **podgląd swojego narzędzia**.\n\nOd czego zaczynamy?';

    var OPENER_GENERIC = OPENER_HI + ' Pomagam zamienić to, co znasz, w Twój własny produkt cyfrowy — narzędzie, za które inni płacą co miesiąc.\n\n' + OPENER_PROMISE;

    // Chipy startowe = trzy drogi wejścia (pomysł / problem / szukamy)
    var START_CHIPS = [
        'Mam już pomysł na narzędzie',
        'Znam problem, który warto rozwiązać',
        'Nie mam pomysłu — poszukajmy razem'
    ];

    var P_OPENERS = {
        ksiegowosc: {
            apiName: 'Księgowi / biuro rachunkowe',
            opener: OPENER_HI + ' Prowadzisz biuro rachunkowe? Świetnie — znasz od środka branżę, w której aż prosi się o dobre narzędzia. Zamieńmy Twoją wiedzę w produkt, za który inne biura będą płacić co miesiąc.\n\n' + OPENER_PROMISE
        },
        architektura: {
            apiName: 'Architekci / projektanci wnętrz',
            opener: OPENER_HI + ' Projektujesz wnętrza albo budynki? Świetnie — wiesz lepiej niż ktokolwiek, czego brakuje pracowniom. Zamieńmy to w produkt, za który inne pracownie będą płacić co miesiąc.\n\n' + OPENER_PROMISE
        },
        nieruchomosci: {
            apiName: 'Agenci nieruchomości',
            opener: OPENER_HI + ' Działasz w nieruchomościach? Świetnie — znasz tę branżę od kuchni. Zamieńmy to w narzędzie, za które inni agenci będą płacić co miesiąc.\n\n' + OPENER_PROMISE
        },
        fizjoterapia: {
            apiName: 'Fizjoterapeuci',
            opener: OPENER_HI + ' Prowadzisz gabinet fizjoterapii? Świetnie — wiesz, czego gabinetom naprawdę brakuje. Zamieńmy to w produkt, za który inne gabinety będą płacić co miesiąc.\n\n' + OPENER_PROMISE
        },
        szkolenia: {
            apiName: 'Szkoleniowcy / firmy szkoleniowe',
            opener: OPENER_HI + ' Szkolisz ludzi i firmy? Świetnie — znasz ten rynek od środka. Zamieńmy Twoją wiedzę w produkt, za który inni szkoleniowcy będą płacić co miesiąc.\n\n' + OPENER_PROMISE
        },
        marketing: {
            apiName: 'Marketingowcy / agencje',
            opener: OPENER_HI + ' Robisz marketing klientom? Świetnie — wiesz, co w tej robocie zżera czas. Zamieńmy to w narzędzie, za które inne agencje będą płacić co miesiąc.\n\n' + OPENER_PROMISE
        }
    };

    /* ============================================================
       STAN
       ============================================================ */
    var state = {
        pSlug: null,            // slug z ?p= (otwarcie skrojone pod branżę z reklamy)
        profession: null,       // string wysyłany do API (chip / ?p=) lub null — AI ustala w rozmowie
        email: null,            // podawany w bramce INLINE po GATE_AFTER_USER_MSGS wiadomościach
        name: null,
        sessionId: null,
        verdict: null,          // 'zielony'|'zolty'|'czerwony'|null
        karta: null,            // obiekt karty z markera
        leadId: null,
        kamien: 0               // najwyższy domknięty kamień rozmowy (marker <kamien>)
    };
    var messages = [];          // {role:'user'|'assistant', content, local?:true}
    var streaming = false;
    var stickBottom = true;

    /* ============================================================
       HELPERS
       ============================================================ */
    function el(id) { return document.getElementById(id); }
    function loadJSON(key) {
        try { return JSON.parse(localStorage.getItem(key)); } catch (e) { return null; }
    }
    function saveJSON(key, val) {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
    }
    function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function getCookie(name) {
        var v = '; ' + document.cookie;
        var parts = v.split('; ' + name + '=');
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }
    function persistSession() {
        saveJSON(LS_SESSION, {
            pSlug: state.pSlug,
            profession: state.profession,
            email: state.email,
            name: state.name,
            sessionId: state.sessionId,
            verdict: state.verdict,
            karta: state.karta,
            leadId: state.leadId,
            kamien: state.kamien || 0
        });
    }
    function saveMessages() { saveJSON(LS_MESSAGES, messages); }

    /* ============================================================
       TRACKING — capture do localStorage (wzorzec /zbuduje),
       klucze ściśle wg kontraktu spar-chat
       ============================================================ */
    function captureTracking() {
        try {
            var KEYS = ['gclid', 'fbclid', 'ttclid', 'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
            var u = new URLSearchParams(window.location.search);
            var stored = loadJSON(LS_TRACKING) || {};
            KEYS.forEach(function (k) { var val = u.get(k); if (val) stored[k] = val; });
            var fbp = getCookie('_fbp'); if (fbp) stored.fbp = fbp;
            if (!stored.landing_page) stored.landing_page = window.location.href;
            if (!stored.referrer && document.referrer) stored.referrer = document.referrer;
            saveJSON(LS_TRACKING, stored);
        } catch (e) {}
    }
    function getTracking() {
        var t = loadJSON(LS_TRACKING);
        return (t && Object.keys(t).length) ? t : null;
    }

    /* ============================================================
       WIDOKI
       ============================================================ */
    function showView(name) {
        // Czat jest jedynym widokiem — strona startuje prosto w rozmowie
        el('view-chat').classList.add('is-active');
        document.body.classList.add('is-chat');
        window.scrollTo(0, 0);
    }

    // Hero state: przed pierwszą wiadomością usera wszystko (powitanie + pasek)
    // jest wycentrowane na środku ekranu; potem pasek dokuje na dół.
    function updateHero() {
        var userCount = messages.filter(function (m) { return m.role === 'user'; }).length;
        var hero = userCount === 0 && !state.verdict;
        el('view-chat').classList.toggle('is-hero', hero);
        el('chat-input').placeholder = hero ? 'Opowiedz o swoim pomyśle…' : 'Napisz odpowiedź…';
    }

    /* ============================================================
       OTWARCIE ROZMOWY, CHIPY, BRAMKA INLINE
       ============================================================ */
    function uuid4() {
        return (window.crypto && crypto.randomUUID)
            ? crypto.randomUUID()
            : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
    }

    // Otwarcie rozmowy — lokalne (zero API), dopasowane do ?p= z reklamy
    function addOpener() {
        var o = state.pSlug && P_OPENERS[state.pSlug] ? P_OPENERS[state.pSlug] : null;
        messages.push({ role: 'assistant', content: o ? o.opener : OPENER_GENERIC, local: true });
    }

    // Chipy startowe pod otwarciem — trzy drogi wejścia (renderSuggestions robi resztę)
    function renderChips() {
        if (el('qr-chips')) return;
        renderSuggestions(START_CHIPS);
    }
    function removeChips() {
        var c = el('qr-chips');
        if (c) c.remove();
    }

    // Lightbox — powiększenie podglądu (Esc / klik tła / przycisk zamyka)
    function openLightbox(url) {
        if (el('spar-lightbox')) return;
        var lb = document.createElement('div');
        lb.className = 'lightbox';
        lb.id = 'spar-lightbox';
        lb.setAttribute('role', 'dialog');
        lb.setAttribute('aria-label', 'Podgląd narzędzia — pełny rozmiar');
        lb.innerHTML =
            '<div class="lightbox__bar">' +
            '<a class="lightbox__btn" href="' + esc(url) + '" target="_blank" rel="noopener">Otwórz w nowej karcie</a>' +
            '<button type="button" class="lightbox__btn" id="lb-close">Zamknij</button>' +
            '</div>' +
            '<img src="' + esc(url) + '" alt="Podgląd narzędzia — pełny rozmiar">';
        document.body.appendChild(lb);

        function close() {
            lb.remove();
            document.removeEventListener('keydown', onKey);
        }
        function onKey(e) { if (e.key === 'Escape') close(); }
        lb.addEventListener('click', function (e) {
            if (e.target === lb) close();
        });
        lb.querySelector('#lb-close').addEventListener('click', close);
        document.addEventListener('keydown', onKey);
        lb.querySelector('#lb-close').focus();
    }

    /* ============================================================
       BRAMKA INLINE — w rozmowie, po GATE_AFTER_USER_MSGS
       wiadomościach rozmówcy (server-side backstop: wymagany_email)
       ============================================================ */
    var GATE_EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    function gatePending() {
        if (state.email || state.verdict) return false;
        var userCount = messages.filter(function (m) { return m.role === 'user'; }).length;
        return userCount >= GATE_AFTER_USER_MSGS;
    }

    function renderInlineGate() {
        if (el('inline-gate') || state.email) return;
        removeChips();
        setComposerEnabled(false);
        var div = document.createElement('div');
        div.className = 'msg msg--ai msg--gate';
        div.id = 'inline-gate';
        div.innerHTML =
            '<p>Dobrze nam idzie. Zanim wejdziemy głębiej — zostaw imię i mail, żebym wiedział, dla kogo powstanie makieta, i mógł się odezwać w sprawie Twojego narzędzia.</p>' +
            '<form id="gate-form" novalidate>' +
            '<div class="f-row f-row--two">' +
            '<div><label class="f-label" for="gate-name">Imię</label>' +
            '<input class="f-input" type="text" id="gate-name" placeholder="Jan" autocomplete="given-name" maxlength="80" required>' +
            '<div class="f-error" id="gate-name-error">Podaj imię.</div></div>' +
            '<div><label class="f-label" for="gate-email">E-mail</label>' +
            '<input class="f-input" type="email" id="gate-email" placeholder="ty@firma.pl" autocomplete="email" required>' +
            '<div class="f-error" id="gate-email-error">Podaj poprawny adres e-mail.</div></div>' +
            '</div>' +
            '<button type="submit" class="btn" id="gate-submit">Idziemy dalej <span class="btn__arrow">→</span></button>' +
            '</form>' +
            '<p class="gate-msg__note">Zero newslettera. Mail służy tej jednej rozmowie i podsumowaniu, które z niej wyjdzie.</p>';
        el('chat-msgs').appendChild(div);
        scrollToBottom(true);

        el('gate-form').addEventListener('submit', function (e) {
            e.preventDefault();
            var name = el('gate-name').value.trim();
            var email = el('gate-email').value.trim();
            var ok = true;
            el('gate-name-error').classList.toggle('is-shown', !name);
            if (!name) ok = false;
            var emailOk = GATE_EMAIL_RE.test(email);
            el('gate-email-error').classList.toggle('is-shown', !emailOk);
            if (!emailOk) ok = false;
            if (!ok) return;
            state.name = name;
            state.email = email;
            persistSession();
            div.remove();
            sysMsg('Dzięki, ' + name.split(' ')[0] + '. Wracamy do rozmowy — pisz śmiało.');
            setComposerEnabled(true);
            // Przywróć dymki odpowiedzi z ostatniej tury AI (bramka je schowała)
            var lastMsg = messages[messages.length - 1];
            if (lastMsg && lastMsg.role === 'assistant' && !state.verdict) {
                var gateSugg = suggestionsFrom(lastMsg.content);
                if (gateSugg) renderSuggestions(gateSugg.opts, gateSugg.multi);
            }
            if (window.matchMedia('(hover: hover)').matches) el('chat-input').focus();
        });
    }

    // Świeża rozmowa (nowy sessionId); keepContact=true zachowuje imię i mail
    function startFresh(keepContact) {
        if (!keepContact) { state.email = null; state.name = null; }
        state.sessionId = uuid4();
        state.verdict = null; state.karta = null; state.leadId = null;
        state.kamien = 0;
        if (!state.pSlug) state.profession = null;
        messages = [];
        el('chat-msgs').innerHTML = '';
        addOpener();
        persistSession();
        saveMessages();
        enterChat(false);
    }

    /* ============================================================
       CZAT — render
       ============================================================ */
    var HIDDEN_MARKS = ['<werdykt', '<projekt', '<opcje', '<blysk', '<sekcje', '<karuzela', '<kamien']; // bloki techniczne ukrywane przed użytkownikiem

    function visibleText(raw) {
        var t = raw
            .replace(/<werdykt>[\s\S]*?<\/werdykt>/g, '')
            .replace(/<projekt>[\s\S]*?<\/projekt>/g, '')
            .replace(/<opcje_multi>[\s\S]*?<\/opcje_multi>/g, '')
            .replace(/<opcje>[\s\S]*?<\/opcje>/g, '')
            .replace(/<blysk>[\s\S]*?<\/blysk>/g, '')
            .replace(/<sekcje>[\s\S]*?<\/sekcje>/g, '')
            .replace(/<karuzela>[\s\S]*?<\/karuzela>/g, '')
            .replace(/<kamien>[\s\S]*?<\/kamien>/g, '');
        // otwarty, niedomknięty blok w trakcie streamu — utnij od markera
        for (var m = 0; m < HIDDEN_MARKS.length; m++) {
            var i = t.indexOf(HIDDEN_MARKS[m]);
            if (i >= 0) t = t.slice(0, i);
        }
        // częściowy marker na końcu streamu — buforuj ('<', '<w', '<pr'…)
        outer: for (var k = 8; k > 0; k--) {
            var tail = t.slice(-k);
            for (var m2 = 0; m2 < HIDDEN_MARKS.length; m2++) {
                if (tail === HIDDEN_MARKS[m2].slice(0, k)) { t = t.slice(0, t.length - k); break outer; }
            }
        }
        return t.replace(/\s+$/, '');
    }

    // Mini-markdown: **bold**, ### nagłówki, listy -/1., separator --- (po escapowaniu)
    function renderRich(s) {
        var h = esc(s).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        var lines = h.split('\n');
        var out = [], list = null;
        function closeList() { if (list) { out.push('</' + list + '>'); list = null; } }
        for (var i = 0; i < lines.length; i++) {
            var t = lines[i].trim();
            if (!t) { closeList(); continue; }
            var mH = t.match(/^#{1,4}\s+(.*)$/);
            if (mH) { closeList(); out.push('<h4 class="rich-h">' + mH[1] + '</h4>'); continue; }
            if (/^(-{3,}|\*{3,}|—{2,})$/.test(t)) { closeList(); out.push('<hr class="rich-hr">'); continue; }
            var mUl = t.match(/^[-•▪]\s+(.*)$/);
            if (mUl) {
                if (list !== 'ul') { closeList(); out.push('<ul class="rich-list">'); list = 'ul'; }
                out.push('<li>' + mUl[1] + '</li>');
                continue;
            }
            var mOl = t.match(/^\d{1,2}[.)]\s+(.*)$/);
            if (mOl) {
                if (list !== 'ol') { closeList(); out.push('<ol class="rich-list">'); list = 'ol'; }
                out.push('<li>' + mOl[1] + '</li>');
                continue;
            }
            closeList();
            out.push('<p>' + t + '</p>');
        }
        closeList();
        return out.join('');
    }

    function appendMessage(role, content) {
        var div = document.createElement('div');
        div.className = 'msg msg--' + (role === 'user' ? 'user' : 'ai');
        if (role === 'user') div.textContent = content;
        else div.innerHTML = renderRich(visibleText(content));
        el('chat-msgs').appendChild(div);
        if (role !== 'user') {
            var bl = parseBlysk(content);
            if (bl) el('chat-msgs').appendChild(renderBlyskEl(bl));
            var sk = parseSekcje(content);
            if (sk) el('chat-msgs').appendChild(renderSekcjeEl(sk));
            var kr = parseKaruzela(content);
            if (kr) el('chat-msgs').appendChild(renderKaruzelaEl(kr));
        }
        scrollToBottom(false);
        return div;
    }

    function sysMsg(text, isErr) {
        var div = document.createElement('div');
        div.className = 'msg msg--sys' + (isErr ? ' msg--err' : '');
        div.textContent = text;
        el('chat-msgs').appendChild(div);
        scrollToBottom(true);
    }

    function scrollToBottom(force) {
        var sc = el('chat-scroll');
        if (force || stickBottom) sc.scrollTop = sc.scrollHeight;
    }

    /* ============================================================
       PASEK ETAPÓW — heurystyka: liczba tur + spar_meta
       ============================================================ */
    function updateStages() {
        var stage;
        var k = state.kamien || 0;
        if (state.verdict) stage = 4;
        else if (k >= 6) stage = 4;
        else if (k === 5) stage = 3;
        else if (k >= 3) stage = 2;
        else if (k >= 1) stage = 1;
        else {
            // fallback (stare rozmowy bez markera): heurystyka po liczbie wiadomości
            var userCount = messages.filter(function (m) { return m.role === 'user'; }).length;
            stage = userCount <= 3 ? 1 : (userCount <= 6 ? 2 : 3);
        }
        document.querySelectorAll('#stages .stage').forEach(function (li) {
            var n = parseInt(li.dataset.stage, 10);
            li.classList.toggle('is-done', n < stage || (state.verdict && n === 4));
            li.classList.toggle('is-active', n === stage && !(state.verdict && n === 4));
        });
    }

    /* ============================================================
       COMPOSER
       ============================================================ */
    function setComposerEnabled(on) {
        el('chat-input').disabled = !on;
        el('btn-send').disabled = !on;
    }
    function lockComposer(text) {
        el('composer').hidden = true;
        el('chat-locked').hidden = false;
        el('chat-locked-text').textContent = text;
    }
    function unlockComposer() {
        el('composer').hidden = false;
        el('chat-locked').hidden = true;
        setComposerEnabled(true);
    }
    function autosize() {
        var ta = el('chat-input');
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
    }
    function updateCharCount() {
        var len = el('chat-input').value.length;
        el('char-count').textContent = (len >= 1600) ? (len + ' / ' + MAX_MSG_LEN) : '';
    }

    /* ============================================================
       WYSYŁKA + STREAMING SSE
       ============================================================ */
    function sendMessage() {
        var ta = el('chat-input');
        var text = ta.value.trim();
        if (!text || streaming) return;
        if (el('inline-gate')) return; // bramka czeka na imię i mail
        removeChips();
        if (text.length > MAX_MSG_LEN) {
            sysMsg('Maksymalnie ' + MAX_MSG_LEN + ' znaków na wiadomość. Skróć i wyślij ponownie.', true);
            return;
        }
        var priorUser = messages.filter(function (m) { return m.role === 'user'; }).length;
        chipStreak = 0; // własny tekst — zeruj licznik nudge'a
        messages.push({ role: 'user', content: text });
        saveMessages();
        appendMessage('user', text);
        ta.value = '';
        autosize();
        updateCharCount();
        updateStages();
        updateHero();
        streamReply(text, priorUser === 0);
    }

    // Wysyłka programowa (chip profesji / dymek odpowiedzi) — jak sendMessage, bez composera
    function sendOpening(text) {
        if (streaming) return;
        var priorUser = messages.filter(function (m) { return m.role === 'user'; }).length;
        messages.push({ role: 'user', content: text });
        saveMessages();
        appendMessage('user', text);
        updateStages();
        updateHero();
        streamReply(text, priorUser === 0);
    }

    /* ============================================================
       DYMKI ODPOWIEDZI — marker <opcje> z każdej tury AI
       ============================================================ */
    function parseChipArray(raw, tag, max) {
        if (!raw) return null;
        var re = new RegExp('<' + tag + '>([\\s\\S]*?)<\\/' + tag + '>', 'g');
        var ms = raw.match(re);
        if (!ms || !ms.length) return null;
        var inner = ms[ms.length - 1].replace(new RegExp('^<' + tag + '>'), '').replace(new RegExp('<\\/' + tag + '>$'), '');
        try {
            var arr = JSON.parse(inner);
            if (!Array.isArray(arr)) return null;
            arr = arr.filter(function (x) { return typeof x === 'string' && x.trim(); })
                .map(function (x) { return x.trim().slice(0, 120); })
                .slice(0, max);
            return arr.length ? arr : null;
        } catch (e) { return null; }
    }
    function parseOpcje(raw) { return parseChipArray(raw, 'opcje', 4); }
    function parseOpcjeMulti(raw) { return parseChipArray(raw, 'opcje_multi', 6); }

    // Jedna bramka dla wszystkich miejsc renderowania: multi ma pierwszeństwo
    function suggestionsFrom(content) {
        var m = parseOpcjeMulti(content);
        if (m) return { opts: m, multi: true };
        var s = parseOpcje(content);
        return s ? { opts: s, multi: false } : null;
    }

    var chipStreak = 0;      // kliknięcia w dymki z rzędu (bez własnego tekstu)
    var nudgeShown = false;  // jednorazowy nudge „możesz też pisać"

    function maybeNudgeComposer() {
        if (nudgeShown || chipStreak < 3) return;
        nudgeShown = true;
        var bar = document.querySelector('.composer__bar');
        if (bar) {
            bar.classList.add('is-nudge');
            setTimeout(function () { bar.classList.remove('is-nudge'); }, 2700);
        }
        var ta = el('chat-input');
        ta.placeholder = 'Możesz też napisać własną odpowiedź…';
        setTimeout(updateHero, 7000); // updateHero przywraca standardowy placeholder
    }

    function renderSuggestions(opts, multi) {
        removeChips();
        var div = document.createElement('div');
        div.className = 'qr' + (multi ? ' qr--multi' : '');
        div.id = 'qr-chips';
        var selected = [];
        var goBtn = null;

        if (multi) {
            var hint = document.createElement('div');
            hint.className = 'qr__hint';
            hint.textContent = 'Zaznacz wszystko, co pasuje:';
            div.appendChild(hint);

            goBtn = document.createElement('button');
            goBtn.type = 'button';
            goBtn.className = 'qr-go';
            goBtn.disabled = true;
            goBtn.textContent = 'Zaznacz, co pasuje';
            goBtn.addEventListener('click', function () {
                if (streaming || el('inline-gate') || !selected.length) return;
                chipStreak++;
                maybeNudgeComposer();
                var msg = selected.join(', ');
                removeChips();
                sendOpening(msg);
            });
        }

        opts.forEach(function (label) {
            // Prefiks "~" = wyróżniona opcja AI (tylko w trybie pojedynczym)
            var isAi = !multi && label.charAt(0) === '~';
            var text = (label.charAt(0) === '~' ? label.slice(1) : label).trim();
            if (!text) return;
            var b = document.createElement('button');
            b.type = 'button';
            if (multi) {
                b.className = 'qr-tog';
                b.setAttribute('aria-pressed', 'false');
                b.innerHTML = '<span class="qr-check" aria-hidden="true">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' +
                    '</span>' + esc(text);
                b.addEventListener('click', function () {
                    if (streaming || el('inline-gate')) return;
                    var i = selected.indexOf(text);
                    var on = i < 0;
                    if (on) selected.push(text); else selected.splice(i, 1);
                    b.classList.toggle('is-sel', on);
                    b.setAttribute('aria-pressed', on ? 'true' : 'false');
                    goBtn.disabled = selected.length === 0;
                    goBtn.textContent = selected.length
                        ? 'Wybieram (' + selected.length + ') →'
                        : 'Zaznacz, co pasuje';
                });
            } else {
                if (isAi) b.className = 'qr-ai';
                b.textContent = text;
                b.addEventListener('click', function () {
                    if (streaming || el('inline-gate')) return;
                    chipStreak++;
                    maybeNudgeComposer();
                    removeChips();
                    sendOpening(text);
                });
            }
            div.appendChild(b);
        });
        // Afordancja: własna odpowiedź to zawsze pełnoprawna opcja
        var own = document.createElement('button');
        own.type = 'button';
        own.className = 'qr-own';
        own.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>albo napisz po swojemu';
        own.addEventListener('click', function () {
            if (el('inline-gate')) return;
            el('chat-input').focus();
        });
        div.appendChild(own);
        if (multi) div.appendChild(goBtn);
        el('chat-msgs').appendChild(div);
        scrollToBottom(false);
    }

    function streamReply(text, isFirst) {
        streaming = true;
        setComposerEnabled(false);
        stickBottom = true;

        var bubble = document.createElement('div');
        bubble.className = 'msg msg--ai';
        bubble.innerHTML = '<span class="typing" aria-label="Sparing pisze"><i></i><i></i><i></i></span>';
        el('chat-msgs').appendChild(bubble);
        scrollToBottom(true);

        var raw = '';
        var meta = { verdict: null, leadId: null, projekt: null };
        var gotText = false;
        var failedBeforeText = false;

        var body = {
            sessionId: state.sessionId,
            profession: state.profession,
            email: state.email,
            name: state.name,
            message: text,
            tracking: isFirst ? getTracking() : null
        };

        fetch(SPAR_ENDPOINT, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SB_PUBLISHABLE
            },
            body: JSON.stringify(body)
        }).then(function (res) {
            if (!res.ok) {
                return res.json().catch(function () { return {}; }).then(function (err) {
                    var e = new Error('http');
                    e.status = res.status;
                    e.code = err && err.error;
                    throw e;
                });
            }
            var reader = res.body.getReader();
            var decoder = new TextDecoder();
            var buf = '';

            function handleEvent(rawEvent) {
                var ev = null;
                var dataLines = [];
                rawEvent.split('\n').forEach(function (line) {
                    if (line.indexOf('event:') === 0) ev = line.slice(6).trim();
                    else if (line.indexOf('data:') === 0) dataLines.push(line.slice(5).replace(/^ /, ''));
                });
                if (!dataLines.length) return;
                var obj;
                try { obj = JSON.parse(dataLines.join('\n')); } catch (e) { return; }
                if (ev === 'spar_meta') {
                    meta.verdict = obj.verdict || null;
                    meta.leadId = obj.leadId || null;
                    return;
                }
                if (ev === 'spar_projekt') {
                    meta.projekt = obj || null;
                    return;
                }
                if (obj.type === 'content_block_delta' && obj.delta && obj.delta.type === 'text_delta') {
                    raw += obj.delta.text;
                    if (!gotText) { gotText = true; }
                    bubble.innerHTML = renderRich(visibleText(raw)) || '<span class="typing"><i></i><i></i><i></i></span>';
                    scrollToBottom(false);
                } else if (obj.type === 'error' || ev === 'error') {
                    var e2 = new Error('stream');
                    e2.streamError = true;
                    throw e2;
                }
            }

            function pump() {
                return reader.read().then(function (r) {
                    if (r.done) {
                        buf += decoder.decode();
                        if (buf.trim()) handleEvent(buf.replace(/\r\n/g, '\n'));
                        return;
                    }
                    buf += decoder.decode(r.value, { stream: true }).replace(/\r\n/g, '\n');
                    var idx;
                    while ((idx = buf.indexOf('\n\n')) >= 0) {
                        var rawEvent = buf.slice(0, idx);
                        buf = buf.slice(idx + 2);
                        handleEvent(rawEvent);
                    }
                    return pump();
                });
            }
            return pump();
        }).catch(function (err) {
            if (err && err.code === 'wymagany_email') {
                // server-side backstop bramki — pokaż formularz, przywróć wiadomość
                failedBeforeText = !gotText;
                restoreFailedMessage(text);
                renderInlineGate();
            } else if (err && err.status === 429 && err.code === 'limit_tur') {
                failedBeforeText = !gotText;
                sysMsg('Dobiliśmy do limitu 30 tur tej rozmowy. Sparing tyle nie potrzebuje — jeśli werdykt nie padł, zacznij nową rozmowę z węższym problemem.', true);
                lockComposer('Limit 30 tur osiągnięty — rozmowa zamknięta.');
            } else if (err && err.status === 429) {
                failedBeforeText = !gotText;
                restoreFailedMessage(text);
                sysMsg('Za dużo wiadomości w krótkim czasie (limit 60 na godzinę). Odczekaj chwilę i wyślij ponownie.', true);
            } else if (err && err.status) {
                failedBeforeText = !gotText;
                restoreFailedMessage(text);
                sysMsg('Coś poszło nie tak po stronie serwera (' + err.status + '). Spróbuj ponownie za chwilę — rozmowa jest zapisana.', true);
            } else {
                // sieć / przerwany stream
                if (!gotText) { failedBeforeText = true; restoreFailedMessage(text); }
                sysMsg('Połączenie przerwane. To, co już padło, jest zapisane — wyślij ponownie albo pisz dalej.', true);
            }
        }).then(function () {
            streaming = false;
            if (el('composer').hidden === false) setComposerEnabled(true);

            if (failedBeforeText && !raw) {
                bubble.remove();
                updateStages();
                return;
            }
            if (raw) {
                bubble.innerHTML = renderRich(visibleText(raw)) || '';
                messages.push({ role: 'assistant', content: raw });
                saveMessages();
                // Postęp kamieni z tej tury
                var kam = parseKamien(raw);
                if (kam > (state.kamien || 0)) { state.kamien = kam; persistSession(); }
                // Błysk + sekcje z tej tury — karty zaraz pod dymkiem (w tej kolejności)
                var anchor = bubble;
                var blysk = parseBlysk(raw);
                if (blysk) {
                    var blEl = renderBlyskEl(blysk);
                    anchor.insertAdjacentElement('afterend', blEl);
                    anchor = blEl;
                }
                var sekcje = parseSekcje(raw);
                if (sekcje) {
                    var skEl = renderSekcjeEl(sekcje);
                    anchor.insertAdjacentElement('afterend', skEl);
                    anchor = skEl;
                }
                var karuzela = parseKaruzela(raw);
                if (karuzela) anchor.insertAdjacentElement('afterend', renderKaruzelaEl(karuzela));
            } else {
                bubble.remove();
            }

            // Werdykt: spar_meta ma priorytet, fallback = parsowanie markera
            var parsed = parseWerdykt(raw);
            var verdict = meta.verdict || (parsed && parsed.kolor) || null;
            if (verdict) {
                state.verdict = verdict;
                state.karta = (parsed && parsed.karta) ? parsed.karta : state.karta;
                if (meta.leadId) state.leadId = meta.leadId;
                persistSession();
                renderVerdict(verdict, state.karta);
            } else if (!meta.projekt && gatePending() && !el('inline-gate')) {
                renderInlineGate();
            }

            // Marker <projekt> → generowanie BLOKUJE rozmowę do pokazania efektu
            // (inaczej user klika dalej i nigdy nie widzi podglądu); dymki tej
            // tury renderują się dopiero POD obrazkiem.
            var sugg = (!state.verdict && !el('inline-gate')) ? suggestionsFrom(raw) : null;
            if (meta.projekt) {
                setComposerEnabled(false);
                el('chat-input').placeholder = 'Generuję podgląd — daj mi chwilę…';
                requestPreview(null, meta.projekt, false, function () {
                    if (el('composer').hidden === false && !el('inline-gate')) setComposerEnabled(true);
                    updateHero(); // przywraca standardowy placeholder
                    if (sugg && !state.verdict && !el('inline-gate')) renderSuggestions(sugg.opts, sugg.multi);
                    else if (gatePending() && !el('inline-gate')) renderInlineGate();
                });
            } else if (sugg) {
                renderSuggestions(sugg.opts, sugg.multi);
            }
            updateStages();
            scrollToBottom(false);
        });
    }

    function restoreFailedMessage(text) {
        // cofnij ostatnią wiadomość usera z lokalnej historii i przywróć do pola
        var last = messages[messages.length - 1];
        if (last && last.role === 'user' && last.content === text) {
            messages.pop();
            saveMessages();
            var bubbles = el('chat-msgs').querySelectorAll('.msg--user');
            if (bubbles.length) bubbles[bubbles.length - 1].remove();
        }
        el('chat-input').value = text;
        autosize();
        updateCharCount();
    }

    function parseWerdykt(raw) {
        if (!raw) return null;
        var m = raw.match(/<werdykt>([\s\S]*?)<\/werdykt>/);
        if (!m) return null;
        try { return JSON.parse(m[1]); } catch (e) { return null; }
    }

    function parseProjektJson(raw) {
        if (!raw) return null;
        var ms = raw.match(/<projekt>([\s\S]*?)<\/projekt>/g);
        if (!ms || !ms.length) return null;
        var inner = ms[ms.length - 1].replace(/^<projekt>/, '').replace(/<\/projekt>$/, '');
        try {
            var o = JSON.parse(inner);
            return (o && typeof o === 'object') ? o : null;
        } catch (e) { return null; }
    }

    /* ============================================================
       BŁYSK — wyróżniona obserwacja branżowa (marker <blysk>)
       ============================================================ */
    // Marker postępu: <kamien>N</kamien> — najwyższy DOMKNIĘTY kamień (1-6)
    function parseKamien(raw) {
        if (!raw) return 0;
        var ms = raw.match(/<kamien>\s*(\d)\s*<\/kamien>/g);
        if (!ms || !ms.length) return 0;
        var n = parseInt(ms[ms.length - 1].replace(/\D/g, ''), 10);
        return (n >= 1 && n <= 6) ? n : 0;
    }

    function parseBlysk(raw) {
        if (!raw) return null;
        var m = raw.match(/<blysk>([\s\S]*?)<\/blysk>/);
        if (!m) return null;
        var t = m[1].trim().slice(0, 500);
        return t || null;
    }

    function renderBlyskEl(text) {
        var div = document.createElement('div');
        div.className = 'blysk';
        div.innerHTML = '<div class="blysk__eyebrow">Obserwacja</div>' +
            '<div class="blysk__text">' + esc(text) + '</div>';
        return div;
    }

    /* ============================================================
       SEKCJE ROZWIJANE — akordeon dla długich treści (marker <sekcje>)
       ============================================================ */
    function parseSekcje(raw) {
        if (!raw) return null;
        var ms = raw.match(/<sekcje>([\s\S]*?)<\/sekcje>/g);
        if (!ms || !ms.length) return null;
        var inner = ms[ms.length - 1].replace(/^<sekcje>/, '').replace(/<\/sekcje>$/, '');
        try {
            var arr = JSON.parse(inner);
            if (!Array.isArray(arr)) return null;
            arr = arr.filter(function (x) {
                return x && typeof x.tytul === 'string' && x.tytul.trim() &&
                       typeof x.tresc === 'string' && x.tresc.trim();
            }).slice(0, 10);
            return arr.length ? arr : null;
        } catch (e) { return null; }
    }

    /* ============================================================
       KARUZELA — porównanie wariantów (marker <karuzela>)
       ============================================================ */
    function parseKaruzela(raw) {
        if (!raw) return null;
        var ms = raw.match(/<karuzela>([\s\S]*?)<\/karuzela>/g);
        if (!ms || !ms.length) return null;
        var inner = ms[ms.length - 1].replace(/^<karuzela>/, '').replace(/<\/karuzela>$/, '');
        try {
            var arr = JSON.parse(inner);
            if (!Array.isArray(arr)) return null;
            arr = arr.filter(function (x) {
                return x && typeof x.tytul === 'string' && x.tytul.trim() &&
                       typeof x.tresc === 'string' && x.tresc.trim();
            }).slice(0, 4);
            return arr.length ? arr : null;
        } catch (e) { return null; }
    }

    function renderKaruzelaEl(arr) {
        var wrap = document.createElement('div');
        wrap.className = 'car';
        var track = document.createElement('div');
        track.className = 'car__track';
        arr.forEach(function (s) {
            var c = document.createElement('div');
            c.className = 'car__card';
            c.innerHTML = '<div class="car__title">' + esc(s.tytul.trim().slice(0, 90)) + '</div>' +
                '<div class="car__body">' + renderRich(s.tresc) + '</div>';
            track.appendChild(c);
        });
        wrap.appendChild(track);

        if (arr.length > 1) {
            var dots = document.createElement('div');
            dots.className = 'car__dots';
            arr.forEach(function (_, i) {
                var d = document.createElement('button');
                d.type = 'button';
                if (i === 0) d.className = 'is-on';
                d.setAttribute('aria-label', 'Karta ' + (i + 1) + ' z ' + arr.length);
                d.addEventListener('click', function () {
                    track.scrollTo({ left: track.children[i].offsetLeft - 8, behavior: 'smooth' });
                });
                dots.appendChild(d);
            });
            wrap.appendChild(dots);

            function mkArrow(dir) {
                var b = document.createElement('button');
                b.type = 'button';
                b.className = 'car__arr car__arr--' + (dir < 0 ? 'l' : 'r');
                b.setAttribute('aria-label', dir < 0 ? 'Poprzednia karta' : 'Następna karta');
                b.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="' + (dir < 0 ? 'M15 18l-6-6 6-6' : 'M9 18l6-6-6-6') + '"></path></svg>';
                b.addEventListener('click', function () {
                    track.scrollBy({ left: dir * track.clientWidth * 0.85, behavior: 'smooth' });
                });
                return b;
            }
            wrap.appendChild(mkArrow(-1));
            wrap.appendChild(mkArrow(1));

            track.addEventListener('scroll', function () {
                var w = track.children[0].offsetWidth + 10;
                var i = Math.max(0, Math.min(arr.length - 1, Math.round(track.scrollLeft / w)));
                dots.querySelectorAll('button').forEach(function (d, di) {
                    d.classList.toggle('is-on', di === i);
                });
            }, { passive: true });
        }
        return wrap;
    }

    function renderSekcjeEl(arr) {
        var wrap = document.createElement('div');
        wrap.className = 'acc';
        arr.forEach(function (s, i) {
            var item = document.createElement('div');
            item.className = 'acc__item' + (i === 0 ? ' is-open' : '');
            item.innerHTML =
                '<button type="button" class="acc__head">' +
                '<span>' + esc(s.tytul.trim().slice(0, 90)) + '</span>' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>' +
                '</button>' +
                '<div class="acc__body">' + renderRich(s.tresc) + '</div>';
            item.querySelector('.acc__head').addEventListener('click', function () {
                item.classList.toggle('is-open');
            });
            wrap.appendChild(item);
        });
        return wrap;
    }

    /* ============================================================
       PODGLĄD GRAFICZNY — marker <projekt> → spar-image → obraz w czacie
       ============================================================ */
    function requestPreview(knownUrl, projekt, demo, onSettle) {
        var wrap = document.createElement('div');
        wrap.className = 'msg msg--ai msg--preview';
        el('chat-msgs').appendChild(wrap);

        // Jednorazowe odblokowanie rozmowy po zakończeniu (sukces/limit/błąd)
        function settle() {
            if (onSettle) { var f = onSettle; onSettle = null; f(); }
        }

        // Insighty z markera <projekt> — rotowane podczas generowania
        var insights = (projekt && Array.isArray(projekt.insighty))
            ? projekt.insighty.filter(function (x) { return typeof x === 'string' && x.trim(); })
                .map(function (x) { return x.trim().slice(0, 200); }).slice(0, 6)
            : [];
        if (!insights.length) {
            insights = [
                'Dobre narzędzie niszowe wygrywa językiem branży, nie liczbą funkcji.',
                'Najszybciej płacą ci, którym oszczędzasz czas w czymś, co robią co tydzień.',
                'Jedna dopracowana funkcja sprzedaje lepiej niż dziesięć obiecanych.'
            ];
        }
        var insTimer = null, insIdx = 0, stepTimer = null, barTimer = null;
        function stopInsights() {
            if (insTimer) { clearInterval(insTimer); insTimer = null; }
            if (stepTimer) { clearInterval(stepTimer); stepTimer = null; }
            if (barTimer) { clearInterval(barTimer); barTimer = null; }
        }

        function noteText(remaining) {
            var base = 'Kliknij obrazek, aby powiększyć.';
            if (typeof remaining === 'number' && remaining > 0) {
                var forma = remaining === 1 ? 'darmową poprawkę' : (remaining < 5 ? 'darmowe poprawki' : 'darmowych poprawek');
                return base + ' Masz jeszcze ' + remaining + ' ' + forma + ' — opisz uwagi, pokażę nową wersję.';
            }
            return base + ' Klikalna makieta powstanie na bazie Twoich uwag.';
        }

        function showImage(url, remaining) {
            stopInsights();
            wrap.innerHTML = '<img class="preview-img" src="' + esc(url) + '" alt="Podgląd narzędzia — kliknij, aby powiększyć" loading="lazy">' +
                '<div class="preview-note">' + esc(noteText(remaining)) + '</div>';
            wrap.querySelector('.preview-img').addEventListener('click', function () { openLightbox(url); });
            scrollToBottom(false);
            settle();
        }

        // Resume: obrazek już istnieje — pokaż bez ponownego generowania
        if (knownUrl) { showImage(knownUrl, null); return; }

        var GEN_STEPS = [
            'Analizuję problem i odbiorców…',
            'Układam ekrany narzędzia…',
            'Dobieram polskie dane przykładowe…',
            'Rysuję interfejs w wysokiej jakości…'
        ];

        function run() {
            stopInsights();
            wrap.innerHTML =
                '<div class="gen">' +
                '<div class="gen__head"><span class="gen__spark" aria-hidden="true"></span>Buduję podgląd Twojego narzędzia</div>' +
                '<div class="gen-mock" aria-hidden="true">' +
                '<i class="gm gm-side"></i><i class="gm gm-top"></i>' +
                '<i class="gm gm-kpi gm-k1"></i><i class="gm gm-kpi gm-k2"></i><i class="gm gm-kpi gm-k3"></i>' +
                '<span class="gm-chart"><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b></span>' +
                '<i class="gm gm-row gm-r1"></i><i class="gm gm-row gm-r2"></i><i class="gm gm-row gm-r3"></i>' +
                '<i class="gm-scan"></i>' +
                '</div>' +
                '<div class="preview-insight" aria-live="polite"></div>' +
                '<div class="gen__foot">' +
                '<div class="gen__bar"><i></i></div>' +
                '<div class="gen__step"></div>' +
                '</div>' +
                '</div>';
            var insEl = wrap.querySelector('.preview-insight');
            var stepEl = wrap.querySelector('.gen__step');
            var barEl = wrap.querySelector('.gen__bar i');

            function cycle() {
                insEl.classList.remove('is-in');
                setTimeout(function () {
                    insEl.textContent = insights[insIdx % insights.length];
                    insIdx++;
                    insEl.classList.add('is-in');
                }, 280);
            }
            cycle();
            insTimer = setInterval(cycle, 4800);

            // Etapy budowy — przeskok co ~9 s, ostatni zostaje
            var stepIdx = 0;
            stepEl.textContent = GEN_STEPS[0];
            stepTimer = setInterval(function () {
                if (stepIdx < GEN_STEPS.length - 1) {
                    stepIdx++;
                    stepEl.textContent = GEN_STEPS[stepIdx];
                } else {
                    clearInterval(stepTimer);
                    stepTimer = null;
                }
            }, 9000);

            // Pasek postępu — asymptotycznie do ~92% (kończy się przy obrazku)
            var t = 0;
            barTimer = setInterval(function () {
                t += 0.3;
                var pct = 92 * (1 - Math.exp(-t / 20));
                barEl.style.width = pct.toFixed(1) + '%';
            }, 300);
            scrollToBottom(false);
            if (demo) {
                // Tryb demo (?demo=podglad): pokaż pełny cykl bez kosztu API
                setTimeout(function () { showImage(DEMO_PREVIEW_URL, 4); }, 20000);
                return;
            }
            fetch(SPAR_IMAGE_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': SB_PUBLISHABLE },
                body: JSON.stringify({ sessionId: state.sessionId })
            }).then(function (res) {
                if (!res.ok) {
                    return res.json().catch(function () { return {}; }).then(function (err) {
                        var e = new Error('img'); e.code = err && err.error; throw e;
                    });
                }
                return res.json();
            }).then(function (d) {
                saveJSON(LS_PREVIEW, { sessionId: state.sessionId, url: d.url });
                showImage(d.url, (typeof d.remaining === 'number') ? d.remaining : null);
            }).catch(function (e) {
                stopInsights();
                settle();
                if (e && e.code === 'limit_podgladow') {
                    wrap.innerHTML = '<div class="preview-loading">Limit podglądów w tej rozmowie osiągnięty — opisz uwagi słowami, uwzględnię je w makiecie.</div>';
                    return;
                }
                if (e && e.code === 'limit_podgladow_dzienny') {
                    wrap.innerHTML = '<div class="preview-loading">Dzienny limit podglądów osiągnięty — wróć jutro albo opisz uwagi słowami, uwzględnię je w makiecie.</div>';
                    return;
                }
                wrap.innerHTML = '<div class="preview-loading">Nie udało się wygenerować podglądu. ' +
                    '<button type="button" class="preview-retry">Spróbuj ponownie</button></div>';
                var btn = wrap.querySelector('.preview-retry');
                if (btn) btn.addEventListener('click', run);
            });
        }
        run();
    }

    /* ============================================================
       WERDYKT — render
       ============================================================ */
    function panelURL() {

    }

        }
        return '<div class="karta">' +

            item('Profesja', k.profesja) +

            chipsItem('Ekrany narzędzia', k.ekrany) +
            chipsItem('Kanały dystrybucji', k.kanaly_dystrybucji) +
            item('Sygnał budżetu', k.sygnal_budzetu) +
            item('Konkurencja', k.konkurencja) +
            chipsItem('Ryzyka', k.ryzyka) +

    function panelBoxHTML() {

    function renderVerdict(color, karta) {
        var wrap = document.createElement('div');
        wrap.className = 'verdict';

        if (color === 'zielony') {
            wrap.innerHTML =
                '<div class="vbanner vbanner--green">' +
                '<div class="vbanner__title">Projekt <em>zdefiniowany.</em></div>' +

                '</div>' +
                kartaHTML(karta) +
                panelBoxHTML();

        } else if (color === 'zolty') {
            wrap.innerHTML =
                '<div class="vbanner vbanner--yellow">' +

                '</div>';

            unlockComposer();

                '<div class="vbanner__sub">Ten problem nie obroni się jako płatne narzędzie — powody masz powyżej. To nie porażka. <strong>To zaoszczędzone minimum 14 000 zł.</strong> Masz inny problem z praktyki? Sprawdźmy go.</div>' +

                '</div>';

        scrollToBottom(true);
    }

    /* ============================================================
       RESETY
       ============================================================ */
    function resetToNewProblem() {
        unlockComposer();
        startFresh(true);
    }

    function restartAll() {
        if (!window.confirm('Zacząć od nowa? Obecna rozmowa zostanie zamknięta.')) return;
        try {
            localStorage.removeItem(LS_SESSION);
            localStorage.removeItem(LS_MESSAGES);
            localStorage.removeItem(LS_PREVIEW);
        } catch (e) {}
        unlockComposer();
        startFresh(false);
    }

    /* ============================================================
       WEJŚCIE DO CZATU (nowa rozmowa lub resume)
       ============================================================ */
    function enterChat(isResume) {
        showView('chat');
        el('chat-msgs').innerHTML = '';
        unlockComposer();

        if (isResume && messages.length === 0) {
            addOpener();
            saveMessages();
        }
        messages.forEach(function (m) { appendMessage(m.role, m.content); });

        // Resume podglądu: jeśli w historii był marker <projekt>, odtwórz obrazek
        // z localStorage (bez kosztu) albo wznow generowanie przerwane refreshem
        var projektContent = null;
        for (var pi = messages.length - 1; pi >= 0; pi--) {
            if (messages[pi].role === 'assistant' && messages[pi].content.indexOf('<projekt>') >= 0) { projektContent = messages[pi].content; break; }
        }
        var regenerating = false;
        if (projektContent) {
            var savedPrev = loadJSON(LS_PREVIEW);
            var knownPrev = (savedPrev && savedPrev.sessionId === state.sessionId) ? savedPrev.url : null;
            regenerating = !knownPrev;
            if (regenerating) {
                setComposerEnabled(false);
                el('chat-input').placeholder = 'Generuję podgląd — daj mi chwilę…';
            }
            requestPreview(knownPrev, parseProjektJson(projektContent), false, regenerating ? function () {
                if (el('composer').hidden === false && !el('inline-gate')) setComposerEnabled(true);
                updateHero();
                if (!state.verdict && !el('inline-gate') && !el('qr-chips') && messages.length) {
                    var lm = messages[messages.length - 1];
                    if (lm.role === 'assistant' && !lm.local) {
                        var rs = suggestionsFrom(lm.content);
                        if (rs) renderSuggestions(rs.opts, rs.multi);
                    }
                }
            } : null);
        }

        var userCount = messages.filter(function (m) { return m.role === 'user'; }).length;

        if (state.verdict) {
            // odtwórz blok werdyktu po historii
            renderVerdict(state.verdict, state.karta);
            if (isResume && state.verdict === 'zolty') {
                sysMsg('Wróciłeś do rozmowy. Werdykt na ten moment: żółty — doprecyzuj i pisz dalej.');
            }
        } else if (userCount === 0) {
            renderChips();
        } else if (gatePending()) {
            renderInlineGate();
        } else if (isResume && messages.length > 1) {
            sysMsg('Rozmowa przywrócona. Piszemy dalej.');
        }

        // Resume: odtwórz dymki odpowiedzi z ostatniej tury AI (jeśli user jeszcze nie odpowiedział)
        if (!regenerating && !state.verdict && !el('inline-gate') && !el('qr-chips') && messages.length) {
            var lastMsg = messages[messages.length - 1];
            if (lastMsg.role === 'assistant' && !lastMsg.local) {
                var resumeSugg = suggestionsFrom(lastMsg.content);
                if (resumeSugg) renderSuggestions(resumeSugg.opts, resumeSugg.multi);
            }
        }

        updateStages();
        updateHero();
        scrollToBottom(true);
        // focus tylko na desktopie — na mobile klawiatura zasłoniłaby historię
        if (window.matchMedia('(hover: hover)').matches && !state.verdict && !el('inline-gate')) {
            el('chat-input').focus();
        }
    }

    /* ============================================================
       BIND + INIT
       ============================================================ */
    function bindChat() {
        var ta = el('chat-input');
        el('btn-send').addEventListener('click', sendMessage);
        ta.addEventListener('input', function () { autosize(); updateCharCount(); });
        ta.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey && window.matchMedia('(hover: hover)').matches) {
                e.preventDefault();
                sendMessage();
            }
        });
        el('chat-scroll').addEventListener('scroll', function () {
            var sc = el('chat-scroll');
            stickBottom = (sc.scrollHeight - sc.scrollTop - sc.clientHeight) < 140;
        }, { passive: true });
        el('btn-restart').addEventListener('click', restartAll);
    }

    function init() {
        captureTracking();
        bindChat();

        // ?p=profesja z reklamy — otwarcie skrojone pod branżę
        var p = new URLSearchParams(window.location.search).get('p');
        if (p && P_OPENERS[p]) state.pSlug = p;

        // Resume sesji (mail może jeszcze nie być podany — bramka jest w rozmowie)
        var saved = loadJSON(LS_SESSION);
        if (saved && saved.sessionId) {
            state.pSlug = saved.pSlug || state.pSlug;
            state.profession = saved.profession || (state.pSlug ? P_OPENERS[state.pSlug].apiName : null);
            state.email = saved.email || null;
            state.name = saved.name || null;
            state.sessionId = saved.sessionId;
            state.verdict = saved.verdict || null;
            state.karta = saved.karta || null;
            state.leadId = saved.leadId || null;
            state.kamien = saved.kamien || 0;
            messages = loadJSON(LS_MESSAGES) || [];
            // Odtwórz postęp kamieni z historii (odporne na brak w LS)
            messages.forEach(function (m) {
                if (m.role === 'assistant') {
                    var mk = parseKamien(m.content);
                    if (mk > state.kamien) state.kamien = mk;
                }
            });
            enterChat(true);
            return;
        }

        if (state.pSlug) state.profession = P_OPENERS[state.pSlug].apiName;
        startFresh(false);

        // Tryb demo widoku generowania (?demo=podglad) — UI bez kosztu API
        if (new URLSearchParams(window.location.search).get('demo') === 'podglad') {
            requestPreview(null, {
                insighty: [
                    'Pracownie nie płacą za „kolejny program" — płacą za koniec sporów z inwestorem o to, kto co zatwierdził.',
                    'Decyzję zakupową podejmuje właściciel pracowni, ale narzędzie sprzedaje się przez ulgę jego zespołu.',
                    'Najtańszy kanał dotarcia to społeczności branżowe — narzędzie poleca się samo, gdy widzi je inwestor.',
                    'Jedna funkcja używana co tydzień utrzymuje abonament lepiej niż dziesięć „na kiedyś".'
                ]
            }, true);
        }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>
