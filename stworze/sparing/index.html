        bizplan: null,          // wstępny plan przychodu z spar-plan (JSON; liczony po zielonym werdykcie)
        phone: null,            // telefon z bramki rejestracji (Tomek dzwoni po rezerwacji)
        authUserId: null,       // Supabase Auth user id (rejestracja Google/Facebook)
        authProvider: null      // 'google' | 'facebook' | null
    };
    // Dane z powrotu OAuth (implicit flow) — czekają na bramkę z telefonem
    var pendingAuth = null; // {userId, provider, email, name}
    // Dogrywane elementy karty (pigułka graficzna + plan przychodu):
    // statusy per aktywna rozmowa — 'idle' | 'gen' | 'fail' (fail = przycisk retry)
    var extras = { summary: 'idle', plan: 'idle' };
    var activeTab = 'chat';
    // Kropka „nowość" na chipie Przychody, gdy plan policzył się w tle —
    // scroll-spy zdejmuje ją, gdy user doscrolluje do sekcji planu
    var pjNewPlan = false;
    var messages = [];          // {role:'user'|'assistant', content, local?:true}
    var streaming = false;
    var stickBottom = true;

    /* ============================================================
       HELPERS
       ============================================================ */
    function el(id) { return document.getElementById(id); }
    function loadJSON(key) {
        try { return JSON.parse(localStorage.getItem(key)); } catch (e) { return null; }
    }
    function saveJSON(key, val) {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
    }
    function esc(s) {
        // także " i ' — esc ląduje w atrybutach (value="...", url('...'))
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function getCookie(name) {
        var v = '; ' + document.cookie;
        var parts = v.split('; ' + name + '=');
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }
    function persistSession() {
        if (!state.sessionId) return;
        saveJSON(sessionKey(state.sessionId), {
            pSlug: state.pSlug,
            profession: state.profession,
            email: state.email,
            name: state.name,
            phone: state.phone || null,
            authUserId: state.authUserId || null,
            authProvider: state.authProvider || null,
            sessionId: state.sessionId,
            verdict: state.verdict,
            karta: state.karta,
            leadId: state.leadId,
            kamien: state.kamien || 0,
            emailKnown: !!state.emailKnown,
            lastBrief: state.lastBrief || null,
            editsUsed: state.editsUsed || 0,
            editPending: !!state.editPending,
            bizplan: state.bizplan || null
        });
        saveJSON(LS_ACTIVE, state.sessionId);
        updateConvoMeta();
    }
    function saveMessages() { if (state.sessionId) saveJSON(messagesKey(state.sessionId), messages); }

    /* ── Indeks rozmów (max CONVOS_MAX darmowych projektów) ────────── */
    function convoIndex() { return loadJSON(LS_INDEX) || []; }
    function convoTitle() {
        if (state.lastBrief && state.lastBrief.nazwa) return state.lastBrief.nazwa;
        // zanim padnie nazwa narzędzia — pierwsza wiadomość rozmówcy mówi najwięcej
        for (var i = 0; i < messages.length; i++) {
            if (messages[i].role === 'user') {
                var t = messages[i].content.trim();
                return t.length > 34 ? t.slice(0, 33).trim() + '…' : t;
            }
        }
        return state.profession || 'Nowy pomysł';
    }
    function updateConvoMeta() {
        var idx = convoIndex();
        var i = -1;
        for (var j = 0; j < idx.length; j++) if (idx[j].id === state.sessionId) { i = j; break; }
        var meta = {
            id: state.sessionId,
            title: convoTitle(),
            verdict: state.verdict || null,
            thumb: (state.previews && (state.previews.panel || state.previews.glowna)) || null,
            ts: i >= 0 ? idx[i].ts : Date.now()
        };
        if (i >= 0) idx[i] = meta; else idx.push(meta);
        saveJSON(LS_INDEX, idx);
        renderConvoList();
        // nazwa projektu w karcie przeglądarki — łatwiej znaleźć wśród kart
        document.title = (state.lastBrief && state.lastBrief.nazwa)
            ? state.lastBrief.nazwa + ' — Stworzę'
            : 'Stworzę — sparing pomysłu | Tomek Niedźwiecki';
    }
    function renderConvoList() {
        var idx = convoIndex();
        var wrap = el('side-convos');
        if (!wrap) return;
        if (idx.length < 2) { wrap.hidden = true; return; }
        wrap.hidden = false;
        var nav = el('side-convolist');
        nav.innerHTML = '';
        idx.slice().reverse().forEach(function (c) {
            var b = document.createElement('button');
            b.type = 'button';
            b.className = 'side__convo' + (c.id === state.sessionId ? ' is-active' : '');
            // monogram: litera + stały kolor z ID — czytelne w małej skali
            // (miniatura UI w 32px to nierozpoznawalna plamka)
            var hue = 0;
            for (var h = 0; h < c.id.length; h++) hue = (hue * 31 + c.id.charCodeAt(h)) % 360;
            var letter = (c.title || 'R').trim().charAt(0).toUpperCase();
            b.innerHTML = '<i class="side__convo-avatar' + (c.verdict === 'zielony' ? ' is-done' : '') + '" style="--h:' + hue + 'deg">' + esc(letter) + '</i>' +
                '<span>' + esc(c.title || 'Rozmowa') + '</span>';
            b.addEventListener('click', function () {
                if (c.id !== state.sessionId) loadConvo(c.id);
                else { switchTab('chat'); closeSide(); }
            });
            nav.appendChild(b);
        });
    }
    function applySavedState(saved) {
        state.pSlug = saved.pSlug || state.pSlug;
        state.profession = saved.profession || (state.pSlug && P_OPENERS[state.pSlug] ? P_OPENERS[state.pSlug].apiName : null);
        state.email = saved.email || null;
        state.name = saved.name || null;
        state.phone = saved.phone || null;
        state.authUserId = saved.authUserId || null;
        state.authProvider = saved.authProvider || null;
        pendingAuth = null; // dane OAuth nie przechodzą między rozmowami
        state.sessionId = saved.sessionId;
        state.verdict = saved.verdict || null;
        state.karta = saved.karta || null;
        state.leadId = saved.leadId || null;
        state.kamien = saved.kamien || 0;
        state.emailKnown = !!saved.emailKnown;
        state.lastBrief = saved.lastBrief || null;
        state.editsUsed = saved.editsUsed || 0;
        state.editPending = !!saved.editPending;
        state.bizplan = saved.bizplan || null;
        extras.summary = 'idle';
        extras.plan = 'idle';
        pjNewPlan = false;
        state.previews = {};
        state.previewHistory = {};
        var savedPrev = loadJSON(previewKey(saved.sessionId));
        if (savedPrev) {
            if (savedPrev.images && typeof savedPrev.images === 'object') state.previews = savedPrev.images;
            else if (typeof savedPrev.url === 'string') state.previews = { panel: savedPrev.url };
            if (savedPrev.history && typeof savedPrev.history === 'object') state.previewHistory = savedPrev.history;
        }
        messages = loadJSON(messagesKey(saved.sessionId)) || [];
        messages.forEach(function (m) {
            if (m.role === 'assistant') {
                var mk = parseKamien(m.content);
                if (mk > state.kamien) state.kamien = mk;
            }
        });
    }
    // Ekrany i archiwum z SERWERA (źródło prawdy) — localStorage bywa w tyle,
    // gdy generacje szły ze starszej karty albo z innego urządzenia
    function syncProjectFromServer() {
        if (!state.sessionId) return;
        var sid = state.sessionId;
        fetch(SPAR_PROJECT_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SB_PUBLISHABLE },
            body: JSON.stringify({ sessionId: sid, action: 'get' })
        }).then(function (r) { return r.ok ? r.json() : null; }).then(function (d) {
            if (!d || !d.projekt || state.sessionId !== sid) return;
            var p = d.projekt;
            var changed = false;
            function archive(view, u) {
                if (!u) return;
                if (!state.previewHistory[view]) state.previewHistory[view] = [];
                if (state.previews[view] !== u && state.previewHistory[view].indexOf(u) < 0) {
                    state.previewHistory[view].push(u);
                    changed = true;
                }
            }
            if (p.preview_images && typeof p.preview_images === 'object') {
                VIEW_META.concat([SUMMARY_META]).forEach(function (vm) {
                    var v = vm[0];
                    var su = p.preview_images[v];
                    if (typeof su === 'string' && state.previews[v] !== su) {
                        if (state.previews[v]) archive(v, state.previews[v]);
                        state.previews[v] = su;
                        changed = true;
                    }
                });
            }
            if (p.business_plan && typeof p.business_plan === 'object'
                && JSON.stringify(p.business_plan) !== JSON.stringify(state.bizplan)) {
                state.bizplan = p.business_plan;
                persistSession();
                pjNewPlan = true;
                changed = true;
            }
            if (p.preview_history && typeof p.preview_history === 'object') {
                Object.keys(p.preview_history).forEach(function (v) {
                    (Array.isArray(p.preview_history[v]) ? p.preview_history[v] : []).forEach(function (u) { archive(v, u); });
                });
            }
            if (changed) {
                saveJSON(previewKey(sid), { images: state.previews, history: state.previewHistory });
                updateSideBadges();
                updateConvoMeta();
                if (activeTab === 'projekt') renderPaneProjekt();
            }
        }).catch(function () { });
    }

    function loadConvo(sid) {
        var saved = loadJSON(sessionKey(sid));
        if (!saved || !saved.sessionId) return;
        applySavedState(saved);
        saveJSON(LS_ACTIVE, sid);
        if (activeTab !== 'chat') switchTab('chat');
        enterChat(true);
        renderConvoList();
    }
    function newConvo() {
        if (convoIndex().length >= CONVOS_MAX) {
            if (activeTab !== 'chat') switchTab('chat');
            sysMsg('Masz już ' + CONVOS_MAX + ' projekty — to limit darmowych rozmów. Wybierz z listy w menu ten, w który wierzysz najbardziej, i przejdźmy do ustalania szczegółów współpracy.', true);
            return;
        }
        startFresh(true);
    }

    /* ============================================================
       TRACKING — capture do localStorage (wzorzec /zbuduje),
       klucze ściśle wg kontraktu spar-chat
       ============================================================ */
    function captureTracking() {
        try {
            var KEYS = ['gclid', 'fbclid', 'ttclid', 'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
            var u = new URLSearchParams(window.location.search);
            var stored = loadJSON(LS_TRACKING) || {};
            KEYS.forEach(function (k) { var val = u.get(k); if (val) stored[k] = val; });
            var fbp = getCookie('_fbp'); if (fbp) stored.fbp = fbp;
            if (!stored.landing_page) stored.landing_page = window.location.href;
            if (!stored.referrer && document.referrer) stored.referrer = document.referrer;
            saveJSON(LS_TRACKING, stored);
        } catch (e) {}
    }
    function getTracking() {
        var t = loadJSON(LS_TRACKING);
        return (t && Object.keys(t).length) ? t : null;
    }

    /* ============================================================
       WIDOKI
       ============================================================ */
    function showView(name) {
        // Czat jest jedynym widokiem — strona startuje prosto w rozmowie
        el('view-chat').classList.add('is-active');
        document.body.classList.add('is-chat');
        window.scrollTo(0, 0);
    }

    /* ============================================================
       SIDEBAR + ZAKŁADKI PROJEKTU (Rozmowa / Karta / Ekrany / Współpraca)
       ============================================================ */
    function checkoutURL() {
        var u = CHECKOUT_BASE + '?offer=' + encodeURIComponent(OFFER_ID);
        if (state.leadId) u += '&lead=' + encodeURIComponent(state.leadId);
        return u;
    }

    function openSide() {
        el('side').classList.add('is-open');
        el('side-backdrop').hidden = false;
    }
    function closeSide() {
        el('side').classList.remove('is-open');
        el('side-backdrop').hidden = true;
    }

    function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.side__item').forEach(function (b) {
            b.classList.toggle('is-active', b.dataset.tab === tab);
        });
        var isPane = tab !== 'chat';
        el('view-chat').classList.toggle('is-pane', isPane);
        ['projekt', 'wspolpraca'].forEach(function (t) {
            el('pane-' + t).classList.toggle('is-active', tab === t);
        });
        if (tab === 'projekt') { renderPaneProjekt(); el('dot-projekt').hidden = true; }
        if (tab === 'wspolpraca') renderPaneWspolpraca();
        if (tab === 'chat') scrollToBottom(true);
        setTabHash(tab === 'chat' ? '' : tab);
        closeSide();
    }

    // Zakładka w hashu URL — odświeżenie strony wraca do tego samego widoku
    // (#projekt, #wspolpraca, opcjonalnie #projekt-plan = sekcja w projekcie)
    function setTabHash(h) {
        try {
            history.replaceState(null, '', location.pathname + location.search + (h ? '#' + h : ''));
        } catch (e) { }
    }
    function applyHashTab() {
        var m = (location.hash || '').slice(1).match(/^(projekt|wspolpraca)(?:-(ekrany|karta|plan))?$/);
        if (!m) return;
        switchTab(m[1]); // nadpisze hash samą zakładką…
        if (m[1] === 'projekt' && m[2]) {
            setTabHash(m[1] + '-' + m[2]); // …więc przywracamy pełny z sekcją
            setTimeout(function () {
                var sec = el('pjsec-' + m[2]);
                if (sec) sec.scrollIntoView({ block: 'start' });
            }, 80);
        }
    }

    function updateSideBadges() {
        // kropka = jest nowa zawartość, a user nie patrzy na tę zakładkę
        var hasProjekt = (state.verdict === 'zielony' && !!state.karta) || lightboxItems().length > 0;
        el('dot-projekt').hidden = !(hasProjekt && activeTab !== 'projekt');
        var cta = el('side-cta');
        var show = state.verdict === 'zielony';
        if (show && cta.hidden) cta.classList.add('is-in'); // animacja momentu odblokowania
        cta.hidden = !show;
        if (show) el('side-cta-btn').href = checkoutURL();
    }

    /* ── Zakładka PROJEKT: ekrany + karta w blokach + wersje + poprawki ── */
    var EDIT_ROUNDS_MAX = 2;

    // Wersje karty = wszystkie zielone <werdykt> z historii rozmowy
    function kartaVersions() {
        var vers = [];
        messages.forEach(function (m) {
            if (m.role !== 'assistant') return;
            var w = parseWerdykt(m.content);
            if (w && w.kolor === 'zielony' && w.karta) vers.push(w.karta);
        });
        if (!vers.length && state.karta) vers.push(state.karta);
        return vers;
    }

    // Toast — krótkie potwierdzenie akcji (np. skopiowano link)
    function showToast(text) {
        var old = el('spar-toast');
        if (old) old.remove();
        var t = document.createElement('div');
        t.className = 'toast';
        t.id = 'spar-toast';
        t.textContent = text;
        document.body.appendChild(t);
        setTimeout(function () { t.classList.add('is-out'); }, 2300);
        setTimeout(function () { t.remove(); }, 2800);
    }

    // Udostępnianie: link prowadzi do publicznego widoku ?projekt=<id> —
    // odbiorca widzi kartę i ekrany (read-only, dane z serwera), NIE rozmowę.
    // ?id= zostaje wyłącznie jako powrót właściciela do własnej sesji.
    function shareProject() {
        var nazwa = (state.lastBrief && state.lastBrief.nazwa) || 'Mój projekt';
        var url = location.origin + location.pathname + '?projekt=' + encodeURIComponent(state.sessionId);
        function copyIt() {
            function done() { showToast('Link skopiowany — odbiorca zobaczy kartę i ekrany projektu'); }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(done).catch(function () {
                    window.prompt('Skopiuj link do projektu:', url);
                });
            } else {
                window.prompt('Skopiuj link do projektu:', url);
            }
        }
        // Mobile: natywny share-sheet (Messenger/WhatsApp/SMS jednym tapem);
        // desktop: schowek — przewidywalnie, bez systemowych okien
        var mobile = window.matchMedia('(max-width: 1023.98px)').matches && 'ontouchstart' in window;
        if (mobile && navigator.share) {
            navigator.share({
                title: nazwa + ' — projekt narzędzia',
                text: 'Zobacz „' + nazwa + '” — kartę projektu i pierwsze ekrany narzędzia:',
                url: url
            }).catch(function (err) {
                // zamknięcie share-sheet to nie błąd — fallback tylko przy realnym
                if (!err || err.name !== 'AbortError') copyIt();
            });
            return;
        }
        copyIt();
    }

    // Publiczny widok udostępnionego projektu (?projekt=<sessionId>):
    // czysta wizytówka — ekrany + karta z serwera, zero czatu, na dole CTA
    // „stwórz własny”. Właściciel z tą sesją w LS dostaje link powrotny.
    function renderShareView(sid) {
        document.title = 'Projekt narzędzia — Stworzę';
        var app = document.querySelector('main.app');
        app.className = 'app app--share';
        var isOwner = !!loadJSON(sessionKey(sid));
        function topBar() {
            return '<div class="share__top">' +
                '<a class="share__brand" href="/stworze/"><img src="/img/logo/tn-logo-icon-88.png" alt="" width="26" height="26" aria-hidden="true">Stworzę</a>' +
                (isOwner ? '<a class="share__owner" href="' + location.pathname + '?id=' + encodeURIComponent(sid) + '">To Twój projekt — wróć do rozmowy</a>' : '') +
                '</div>';
        }
        app.innerHTML = '<div class="share"><div class="share__inner" id="share-body">' +
            topBar() +
            '<div class="share__loading"><span class="share__spin" aria-hidden="true"></span>Wczytuję projekt…</div>' +
            '</div></div>';
        var body = el('share-body');

        function fail(msg) {
            body.innerHTML = topBar() +
                '<div class="tabpane__empty" style="margin-top:8vh">' + msg + '<br>' +
                '<a class="preview-retry" href="/stworze/sparing/">Stwórz własny projekt</a></div>';
        }

        fetch(SPAR_PROJECT_ENDPOINT, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SB_PUBLISHABLE
            },
            body: JSON.stringify({ sessionId: sid, action: 'get' })
        }).then(function (r) {
            return r.json().then(function (d) { return { ok: r.ok, d: d }; });
        }).then(function (res) {
            if (!res.ok || !res.d || !res.d.projekt) {
                fail(res.d && res.d.error === 'brak_projektu'
                    ? 'Ten projekt nie jest jeszcze gotowy albo link jest nieaktualny.'
                    : 'Nie udało się wczytać projektu. Odśwież stronę i spróbuj jeszcze raz.');
                return;
            }
            var pr = res.d.projekt;
            var nazwa = pr.nazwa || 'Projekt narzędzia';
            document.title = nazwa + ' — Stworzę';
            // lightbox czyta state.previews — zasilamy z serwera
            state.previews = pr.preview_images || (pr.preview_image_url ? { panel: pr.preview_image_url } : {});
            var items = lightboxItems();
            var k = pr.karta || null;

            var html = topBar() +
                '<div class="tabpane__head"><div class="tabpane__eyebrow">Projekt narzędzia</div>' +
                '<h2 class="tabpane__title">' + esc(nazwa) + '</h2>' +
                (pr.opis ? '<p class="tabpane__sub">' + esc(pr.opis) + '</p>' : '') +
                '</div>';
            if (items.length) {
                html += '<div class="pj2-shots n' + items.length + '">' + items.map(function (it, i) {
                    return '<div class="pv-tile is-done' + (i === 0 ? ' pv-tile--main' : '') + '" data-view="' + it.view + '">' +
                        '<span class="pv-tile__label">' + esc(it.label) + '</span>' +
                        '<div class="pv-tile__body"><img src="' + esc(it.url) + '" alt="' + esc(it.label) + '" loading="lazy"></div></div>';
                }).join('') + '</div>';
            }
            if (k) html += kartaGridHTML(k, '');
            if (!items.length && !k) {
                fail('Ten projekt nie jest jeszcze gotowy albo link jest nieaktualny.');
                return;
            }
            // Plan przychodu + pigułka — jeśli już policzone (bez loaderów:
            // odbiorca dostaje gotową wizytówkę, generuje tylko właściciel)
            if (pr.business_plan) html += bizplanHTML(pr.business_plan);
            var pillUrl = state.previews[SUMMARY_META[0]];
            if (pillUrl) html += pillHTML(pillUrl);
            html += '<div class="share-cta">' +
                '<div class="share-cta__t">Ten projekt powstał w kilkanaście minut rozmowy z AI.</div>' +
                '<p>Opowiadasz o swojej branży albo pasji — AI razem z Tobą projektuje narzędzie, pokazuje pierwsze ekrany i mówi wprost, czy pomysł się spina. Za darmo.</p>' +
                '<a class="side-cta__btn" href="/stworze/sparing/">Stwórz projekt dla swojej branży</a>' +
                '<a class="share-cta__more" href="/stworze/">Zobacz, jak działa współpraca z Tomkiem →</a>' +
                '</div>';
            body.innerHTML = html;
            var pjDesktop = window.matchMedia('(min-width: 1024px)').matches;
            body.querySelectorAll('details.pj-sec').forEach(function (d, di) {
                d.open = pjDesktop || di === 0;
            });
            body.querySelectorAll('.pv-tile').forEach(function (t) {
                t.addEventListener('click', function () {
                    if (t.dataset.pill !== undefined) openLightbox({ url: t.dataset.pill, label: 'Projekt w pigułce' });
                    else openLightbox(t.dataset.view);
                });
            });
            bindPlanSim(body);
        }).catch(function () {
            fail('Nie udało się wczytać projektu. Sprawdź połączenie i odśwież stronę.');
        });
    }

    function pjChips(arr, dim) {
        return '<div class="chips' + (dim ? ' chips--dim' : '') + '">' +
            arr.map(function (x) { return '<span>' + esc(x) + '</span>'; }).join('') + '</div>';
    }

    function pjBlock(icon, title, inner) {
        if (!inner) return '';
        return '<div class="pj-block"><div class="pj-block__t">' + icon + title + '</div><div class="pj-block__d">' + inner + '</div></div>';
    }

    function pjRow(label, val) {
        if (!val) return '';
        return '<div class="pj-row"><span>' + label + '</span>' + esc(val) + '</div>';
    }

    // Karta — desktop: dwie kolumny otwartych sekcji; mobile: zwijane akordeony
    // (cytat problemu zawsze widoczny jako hook). Współdzielone przez zakładkę
    // „Twój projekt” i publiczny widok udostępnionego projektu (?projekt=).
    function pjSec(icon, title, inner) {
        if (!inner) return '';
        return '<details class="pj-sec"><summary><span class="pj-sec__t">' + icon + title + '</span>' +
            '<svg class="pj-sec__chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>' +
            '</summary><div class="pj-sec__b">' + inner + '</div></details>';
    }

    function pjIco(p) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + p + '</svg>';
    }

    function kartaGridHTML(k, extraRightHtml) {
        var html = '';
        if (k.problem) html += '<div class="pj-quote">' + esc(k.problem) + '</div>';
        var pierwsza = '';
        if (Array.isArray(k.ekrany) && k.ekrany.length) pierwsza += pjChips(k.ekrany);
        if (Array.isArray(k.poza_zakresem) && k.poza_zakresem.length) {
            pierwsza += '<div class="pj-later">Świadomie na później (żeby pierwsza wersja była prosta):</div>' + pjChips(k.poza_zakresem, true);
        }
        var rynek = '';
        if (Array.isArray(k.kanaly_dystrybucji) && k.kanaly_dystrybucji.length) rynek += '<div class="pj-later">Gdzie znajdziemy klientów:</div>' + pjChips(k.kanaly_dystrybucji);
        rynek += pjRow('Konkurencja', k.konkurencja);
        if (Array.isArray(k.ryzyka) && k.ryzyka.length) rynek += '<div class="pj-later">Na co uważać:</div>' + pjChips(k.ryzyka, true);

        html += '<div class="pj2-grid">' +
            '<div class="pj2-col">' +
            pjSec(pjIco('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>'), 'Dla kogo i kto płaci',
                pjRow('Dla kogo', k.dla_kogo || k.profesja) + pjRow('Kto płaci', k.kto_placi) + pjRow('Sygnał budżetu', k.sygnal_budzetu)) +
            pjSec(pjIco('<rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect>'), 'Pierwsza wersja narzędzia', pierwsza) +
            '</div>' +
            '<div class="pj2-col">' +
            pjSec(pjIco('<path d="M14.7 6.3a4.5 4.5 0 0 0-6.4 6.4l-4.8 4.8 1.4 1.4 1-1 1.6 1.6 1.4-1.4-1.6-1.6 1-1a4.5 4.5 0 0 0 6.4-6.4z"></path>'), 'Jak radzą sobie dziś',
                k.dzisiejsze_obejscie ? '<p>' + esc(k.dzisiejsze_obejscie) + '</p>' : '') +
            pjSec(pjIco('<circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>'), 'Rynek i otoczenie', rynek) +
            (extraRightHtml || '') +
            '</div></div>';
        return html;
    }

    /* ── Dogrywane elementy karty: pigułka graficzna + plan przychodu ──
       Generują się PO zielonym werdykcie (karta musi istnieć w DB); user
       często jest na karcie szybciej — wtedy widzi loadery. Po poprawce
       projektu (nowy werdykt) regenerujemy z force. */
    function pushPreviewHistory(view, url) {
        if (!url) return;
        if (!state.previewHistory[view]) state.previewHistory[view] = [];
        if (state.previewHistory[view].indexOf(url) < 0) state.previewHistory[view].push(url);
    }

    function ensureSummaryImage(force) {
        if (extras.summary === 'gen') return;
        if (!force && state.previews[SUMMARY_META[0]]) return;
        if (state.verdict !== 'zielony' || !state.karta || !state.sessionId) return;
        extras.summary = 'gen';
        var sid = state.sessionId;
        fetch(SPAR_IMAGE_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SB_PUBLISHABLE },
            body: JSON.stringify({ sessionId: sid, view: SUMMARY_META[0] })
        }).then(function (r) {
            return r.json().then(function (d) { return { ok: r.ok, d: d }; });
        }).then(function (res) {
            if (state.sessionId !== sid) return;
            if (res.ok && res.d && res.d.url) {
                var prev = state.previews[SUMMARY_META[0]];
                if (res.d.archived && res.d.archived !== res.d.url) pushPreviewHistory(SUMMARY_META[0], res.d.archived);
                if (prev && prev !== res.d.url) pushPreviewHistory(SUMMARY_META[0], prev);
                state.previews[SUMMARY_META[0]] = res.d.url;
                saveJSON(previewKey(sid), { images: state.previews, history: state.previewHistory });
                extras.summary = 'idle';
            } else {
                // limit wersji = pokazujemy ostatnią, bez komunikatu błędu
                extras.summary = (res.d && res.d.error === 'limit_podsumowan') ? 'idle' : 'fail';
            }
            if (activeTab === 'projekt') renderPaneProjekt();
        }).catch(function () {
            if (state.sessionId !== sid) return;
            extras.summary = 'fail';
            if (activeTab === 'projekt') renderPaneProjekt();
        });
    }

    function ensureBizplan(force) {
        if (extras.plan === 'gen') return;
        if (!force && state.bizplan) return;
        if (state.verdict !== 'zielony' || !state.karta || !state.sessionId) return;
        extras.plan = 'gen';
        var sid = state.sessionId;
        fetch(SPAR_PLAN_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SB_PUBLISHABLE },
            body: JSON.stringify({ sessionId: sid, force: !!force })
        }).then(function (r) {
            return r.json().then(function (d) { return { ok: r.ok, d: d }; });
        }).then(function (res) {
            if (state.sessionId !== sid) return;
            if (res.ok && res.d && res.d.plan) {
                state.bizplan = res.d.plan;
                persistSession();
                extras.plan = 'idle';
                pjNewPlan = true; // kropka na chipie Przychody — spy zdejmie przy sekcji
            } else {
                extras.plan = 'fail';
            }
            if (activeTab === 'projekt') renderPaneProjekt();
        }).catch(function () {
            if (state.sessionId !== sid) return;
            extras.plan = 'fail';
            if (activeTab === 'projekt') renderPaneProjekt();
        });
    }

    function ensureKartaExtras(force) {
        ensureSummaryImage(force);
        ensureBizplan(force);
    }

    function fmtZl(n) {
        return String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
    }

    function bizplanHTML(plan) {
        if (!plan || !Array.isArray(plan.kamienie) || !plan.kamienie.length) return '';
        var kamienie = plan.kamienie.slice(0, 3).filter(function (m) { return m && typeof m.mies === 'number'; });
        var maxMies = kamienie.reduce(function (mx, m) { return Math.max(mx, m.mies); }, 1);
        // słupki: wysokość proporcjonalna do MRR (min 26px, max 96px)
        var bars = kamienie.map(function (m, i) {
            var goal = i === kamienie.length - 1;
            var h = Math.round(26 + (m.mies / maxMies) * 70);
            return '<div class="pj-bar' + (goal ? ' pj-bar--goal' : '') + '">' +
                '<b>' + fmtZl(m.mies) + ' zł<small>/mies.</small></b>' +
                '<i style="height:' + h + 'px" aria-hidden="true"></i>' +
                '<span>' + esc(String(m.klienci)) + ' klientów</span>' +
                (m.etap ? '<em>' + esc(m.etap) + '</em>' : '') + '</div>';
        }).join('');
        function fact(icon, label, val) {
            if (!val) return '';
            return '<div class="pj-fact">' + pjIco(icon) + '<div><b>' + label + '</b><span>' + esc(val) + '</span></div></div>';
        }
        var zal = Array.isArray(plan.zalozenia) && plan.zalozenia.length
            ? '<details class="pj-assume"><summary>Założenia do tych liczb</summary><ul class="pj-zal">' +
              plan.zalozenia.map(function (z) { return '<li>' + esc(z) + '</li>'; }).join('') + '</ul></details>'
            : '';
        return '<div class="pj-plan">' +
            '<div class="pj-plan__top"><div>' +
            '<span class="pj-plan__badge">' + esc(plan.model_przychodu || 'Abonament miesięczny') + '</span>' +
            '<div class="pj-plan__price">' + esc(String(plan.cena || '')) + '<small>' + esc(plan.cena_jednostka || 'zł/mies.') + '</small></div>' +
            (plan.cena_uzasadnienie ? '<div class="pj-plan__why">' + esc(plan.cena_uzasadnienie) + '</div>' : '') +
            '</div><span class="pj-plan__tag">szacunki z rozmowy</span></div>' +
            '<div class="pj-chart">' + bars + '</div>' +
            planSimHTML(plan, kamienie) +
            '<div class="pj-facts">' +
            fact('<circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>', 'Rynek', plan.rynek) +
            fact('<polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>', 'Zwrot Twojego wkładu', plan.zwrot_wkladu) +
            fact('<polyline points="3 17 9 11 13 15 21 7"></polyline><polyline points="14 7 21 7 21 14"></polyline>', 'Rok 2', plan.rok2_potencjal) +
            '</div>' + zal +
            '<div class="pj-plan__note">Wstępne wyliczenia na podstawie rozmowy — szczegółowy plan przedsięwzięcia przygotowuje Tomek po rezerwacji.</div>' +
            '</div>';
    }

    // Symulator skali: suwak 10–150 klientów, kwota liczona ze stawki planu
    // (efektywna stawka = MRR celu / liczba klientów celu; fallback: cena).
    // Czysty frontend — klient „dotyka" skali swojego biznesu.
    function planSimHTML(plan, kamienie) {
        var goal = kamienie[kamienie.length - 1];
        var rate = (goal && typeof goal.mies === 'number' && typeof goal.klienci === 'number' && goal.klienci > 0)
            ? goal.mies / goal.klienci
            : (typeof plan.cena === 'number' ? plan.cena : 0);
        if (!rate) return '';
        var startN = (goal && typeof goal.klienci === 'number') ? goal.klienci : 50;
        return '<div class="pj-sim" data-rate="' + rate + '" data-goal="' + startN + '">' +
            '<div class="pj-sim__top"><span class="pj-sim__label">A gdyby klientów było więcej?</span>' +
            '<span class="pj-sim__val" data-sim-val>' + fmtZl(rate * startN) + ' zł<small>/mies.</small></span></div>' +
            '<input type="range" class="wg-range" data-sim-range min="10" max="150" step="5" value="' + startN + '" aria-label="Liczba klientów">' +
            '<div class="pj-sim__row"><b data-sim-n>' + startN + ' klientów</b><span data-sim-note></span></div>' +
            '</div>';
    }

    function bindPlanSim(root) {
        root.querySelectorAll('.pj-sim').forEach(function (sim) {
            var range = sim.querySelector('[data-sim-range]');
            if (!range || range.dataset.bound) return;
            range.dataset.bound = '1';
            var rate = parseFloat(sim.getAttribute('data-rate')) || 0;
            var goal = parseInt(sim.getAttribute('data-goal'), 10) || 50;
            var val = sim.querySelector('[data-sim-val]');
            var nEl = sim.querySelector('[data-sim-n]');
            var note = sim.querySelector('[data-sim-note]');
            function paint() {
                var n = parseInt(range.value, 10);
                var min = parseInt(range.min, 10), max = parseInt(range.max, 10);
                range.style.setProperty('--fill', ((n - min) / (max - min) * 100) + '%');
                val.innerHTML = fmtZl(rate * n) + ' zł<small>/mies.</small>';
                nEl.textContent = n + ' klientów';
                note.textContent = n < goal
                    ? ('pierwszych ' + goal + ' pozyskuje Tomek')
                    : (n === goal ? 'tu przejmujesz stery' : 'Twoja skala — rok 2 i dalej');
            }
            range.addEventListener('input', paint);
            paint();
        });
    }

    function pillHTML(url) {
        return '<div class="pj-pill">' +
            '<div class="pj-plan__head"><span class="pj-plan__t">' +
            pjIco('<rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="M3 9h18"></path><path d="M9 9v11"></path>') +
            'Projekt w pigułce</span><span class="pj-plan__tag">jedna grafika — cały projekt</span></div>' +
            '<div class="pv-tile is-done pj-pill__tile" data-pill="' + esc(url) + '">' +
            '<span class="pv-tile__label">Podsumowanie graficzne</span>' +
            '<div class="pv-tile__body"><img src="' + esc(url) + '" alt="Projekt w pigułce" loading="lazy"></div></div></div>';
    }

    function extrasWaitHTML(kind) {
        if (kind === 'plan') {
            return '<div class="pj-wait"><span class="share__spin" aria-hidden="true"></span>' +
                '<div class="pj-wait__txt"><b>Liczę wstępny plan przychodu…</b>' +
                '<span>model, cena i droga do 50 klientów — na podstawie rozmowy</span></div></div>';
        }
        return '<div class="pj-wait"><span class="share__spin" aria-hidden="true"></span>' +
            '<div class="pj-wait__txt"><b>Rysuję projekt w pigułce…</b>' +
            '<span>graficzne podsumowanie karty — około minuty</span></div></div>';
    }

    function extrasFailHTML(kind) {
        return '<div class="pj-wait pj-wait--fail"><div class="pj-wait__txt"><b>' +
            (kind === 'plan' ? 'Nie udało się policzyć planu przychodu.' : 'Nie udało się narysować pigułki.') +
            '</b><span>Spróbuj jeszcze raz — to chwila.</span></div>' +
            '<button type="button" class="preview-retry" data-retry="' + kind + '">Spróbuj ponownie</button></div>';
    }

    // Scroll-spy paska sekcji w zakładce Projekt: podświetla chip sekcji,
    // która jest aktualnie na ekranie; dotarcie do planu zdejmuje kropkę
    var pjSpyBound = false;
    function bindPjSpy() {
        if (pjSpyBound) return;
        pjSpyBound = true;
        var pane = el('pane-projekt');
        if (pane) pane.addEventListener('scroll', updatePjSpy, { passive: true });
    }
    function updatePjSpy() {
        var body = el('pane-projekt-body');
        var pane = el('pane-projekt');
        var dock = el('pj-dock');
        if (!body || !pane || !dock) return;
        var secs = body.querySelectorAll('.pj-section');
        if (!secs.length || !dock.children.length) {
            dock.classList.remove('is-visible');
            return;
        }
        // dock wjeżdża dopiero, gdy karty-zajawki zniknęły z ekranu
        dock.classList.toggle('is-visible', pane.scrollTop > 260);
        var paneTop = pane.getBoundingClientRect().top;
        var current = secs[0].getAttribute('data-spy');
        secs.forEach(function (s) {
            if (s.getBoundingClientRect().top - paneTop <= 110) current = s.getAttribute('data-spy');
        });
        dock.querySelectorAll('.pj-dock__btn').forEach(function (b) {
            var on = b.getAttribute('data-spy') === current;
            b.classList.toggle('is-on', on);
            if (on && current === 'plan' && pjNewPlan) {
                pjNewPlan = false;
                var d = b.querySelector('.pj-dock__dot');
                if (d) d.remove();
            }
        });
    }

    function renderPaneProjekt(verIdx) {
        var body = el('pane-projekt-body');
        var items = lightboxItems();
        var versions = kartaVersions();
        var hasKarta = versions.length > 0;
        var cur = (typeof verIdx === 'number' && verIdx >= 0 && verIdx < versions.length)
            ? verIdx : versions.length - 1;
        var k = hasKarta ? versions[cur] : null;
        var brief = state.lastBrief || {};
        var nazwa = (k && k.nazwa) || brief.nazwa || 'Twoje narzędzie';

        // Pusty stan: nic jeszcze nie powstało
        if (!hasKarta && !items.length) {
            body.innerHTML = '<div class="tabpane__head"><div class="tabpane__eyebrow">Twój projekt</div>' +
                '<h2 class="tabpane__title">Tu rośnie Twój projekt</h2>' +
                '<p class="tabpane__sub">Ekrany narzędzia i karta projektu pojawią się tu w trakcie rozmowy — kilka pytań i zobaczysz pierwsze efekty.</p></div>' +
                '<div class="tabpane__empty">Wszystko zaczyna się w rozmowie.<br>' +
                '<button type="button" class="preview-retry" data-go-chat>Wracam do rozmowy</button></div>';
            body.querySelector('[data-go-chat]').addEventListener('click', function () { switchTab('chat'); });
            return;
        }

        var html = '<div class="tabpane__head pj-head"><div class="pj-head__txt"><div class="tabpane__eyebrow">Twój projekt</div>' +
            '<h2 class="tabpane__title">' + esc(nazwa) + '</h2>' +
            (brief.opis ? '<p class="tabpane__sub">' + esc(brief.opis) + '</p>' : '') +
            '</div>' +
            '<button type="button" class="pj-share" id="pj-share" title="Skopiuj link do projektu">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"></path><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"></path></svg>' +
            'Udostępnij</button>' +
            '</div>';

        // Archiwum wersji ekranów (pigułka też) — potrzebne do taba Ekrany
        var oldShots = [];
        VIEW_META.concat([SUMMARY_META]).forEach(function (vm) {
            (state.previewHistory[vm[0]] || []).forEach(function (u, hi) {
                oldShots.push({ view: vm[0], label: vm[1] + ' — v' + (hi + 1), url: u });
            });
        });

        // Wszystkie sekcje w JEDNYM scrollu — nic nie chowa się za
        // przełącznikiem (taby ukrywające treść = słaba odkrywalność).
        // Pasek na górze to scroll-spy: pokazuje, gdzie jesteś, klik
        // płynnie przewija do sekcji.
        var hasShots = items.length > 0 || oldShots.length > 0;
        var hasPlanSec = hasKarta && state.verdict === 'zielony';

        // Generacje planu i pigułki startują od razu (niezależnie od scrolla)
        if (hasPlanSec) ensureKartaExtras(false);

        // Karty-zajawki: nawigacja, która wygląda jak treść — miniatura
        // ekranów w tle, kwota planu na wierzchu. Klik = płynny scroll.
        var NAV_ICONS = {
            ekrany: '<rect x="2" y="4" width="20" height="14" rx="2"></rect><path d="M8 21h8"></path><path d="M12 18v3"></path>',
            karta: '<rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="M7 9h6"></path><path d="M7 13h10"></path><path d="M7 17h4"></path>',
            plan: '<polyline points="3 17 9 11 13 15 21 7"></polyline><polyline points="14 7 21 7 21 14"></polyline>'
        };
        var GO_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"></path><path d="M19 12l-7 7-7-7"></path></svg>';
        var secCount = (hasShots ? 1 : 0) + 1 + (hasPlanSec ? 1 : 0);
        if (secCount > 1) {
            var cards = '';
            if (hasShots) {
                var thumb = items.length ? items[0].url : '';
                cards += '<button type="button" class="pj-card" data-anchor="pjsec-ekrany"' +
                    (thumb ? ' style="background-image:linear-gradient(180deg, rgba(5,5,7,0.55) 0%, rgba(5,5,7,0.93) 80%), url(\'' + esc(thumb) + '\')"' : '') + '>' +
                    '<span class="pj-card__ico">' + pjIco(NAV_ICONS.ekrany) + '</span>' +
                    '<span class="pj-card__go">' + GO_ICON + '</span>' +
                    '<b>Ekrany narzędzia</b><span>' + (items.length ? items.length + ' ' + (items.length === 1 ? 'widok' : 'widoki') : 'wcześniejsze wersje') + '</span></button>';
            }
            var kartaSub = hasKarta
                ? (versions.length > 1 ? 'Wersja ' + versions.length + ' · aktualna' : 'problem, klienci, zakres')
                : 'w przygotowaniu';
            cards += '<button type="button" class="pj-card" data-anchor="pjsec-karta">' +
                '<span class="pj-card__ico">' + pjIco(NAV_ICONS.karta) + '</span>' +
                '<span class="pj-card__go">' + GO_ICON + '</span>' +
                '<b>Karta projektu</b><span>' + kartaSub + '</span></button>';
            if (hasPlanSec) {
                var goalK = (state.bizplan && Array.isArray(state.bizplan.kamienie) && state.bizplan.kamienie.length)
                    ? state.bizplan.kamienie[state.bizplan.kamienie.length - 1] : null;
                cards += '<button type="button" class="pj-card pj-card--plan" data-anchor="pjsec-plan">' +
                    '<span class="pj-card__ico">' + pjIco(NAV_ICONS.plan) + '</span>' +
                    '<span class="pj-card__go">' + GO_ICON + '</span>' +
                    (goalK && typeof goalK.mies === 'number'
                        ? '<b>' + fmtZl(goalK.mies) + ' zł/mies.</b><span>' + (pjNewPlan ? '<i class="pj-card__dot" aria-hidden="true"></i>' : '') + 'przy ' + esc(String(goalK.klienci)) + ' klientach — zobacz plan</span>'
                        : (extras.plan === 'fail'
                            ? '<b>Plan przychodu</b><span>nie udało się policzyć — otwórz</span>'
                            : '<b>Plan przychodu</b><span><i class="pj-card__spin" aria-hidden="true"></i>liczę szacunki…</span>')) +
                    '</button>';
            }
            html += '<div class="pj-cards" role="navigation" aria-label="Sekcje projektu">' + cards + '</div>';
        }

        function sechead(icon, title, sub) {
            return '<div class="pj-sechead"><span class="pj-sechead__ico">' + pjIco(icon) + '</span>' +
                '<div><h3>' + title + '</h3>' + (sub ? '<span>' + sub + '</span>' : '') + '</div></div>';
        }

        // ── SEKCJA: Ekrany narzędzia ──
        if (hasShots) {

    function uuid4() {

            ? crypto.randomUUID()
            : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);

    // Lightbox v2 — podpis widoku, strzałki między ekranami, wyraźny X
    // (Esc / klik tła / X zamyka; ←/→ i strzałki przełączają widoki)
    function lightboxItems() {
        var items = [];
        VIEW_META.forEach(function (vm) {
            var url = state.previews && state.previews[vm[0]];
            if (url) items.push({ view: vm[0], label: vm[1], url: url });
        });
        return items;
    }

    function openLightbox(startView) {
        if (el('spar-lightbox')) return;
        var items;
        if (startView && typeof startView === 'object' && startView.url) {
            // pojedynczy obraz z własnym podpisem (np. pigułka projektu)
            items = [{ view: '_single', label: startView.label || 'Podgląd', url: startView.url }];
            startView = '_single';
        } else if (typeof startView === 'string' && /^https?:/.test(startView)) {
            // pojedynczy URL (np. wcześniejsza wersja ekranu z archiwum)
            items = [{ view: 'panel', label: 'Wcześniejsza wersja', url: startView }];
            startView = 'panel';
        } else {
            items = lightboxItems();
        }
        if (!items.length) return;
        var idx = 0;
        for (var i = 0; i < items.length; i++) if (items[i].view === startView) { idx = i; break; }

        var lb = document.createElement('div');
        lb.className = 'lightbox';
        lb.id = 'spar-lightbox';
        lb.setAttribute('role', 'dialog');
        lb.setAttribute('aria-label', 'Podgląd narzędzia — pełny rozmiar');
        var nav = items.length > 1;
        lb.innerHTML =
            '<button type="button" class="lightbox__x" id="lb-close" aria-label="Wróć do rozmowy">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"></path></svg>' +
            '</button>' +
            (nav
                ? '<button type="button" class="lightbox__nav lightbox__nav--l" id="lb-prev" aria-label="Poprzedni ekran">' +
                  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg></button>' +
                  '<button type="button" class="lightbox__nav lightbox__nav--r" id="lb-next" aria-label="Następny ekran">' +
                  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"></path></svg></button>'
                : '') +
            '<img src="" alt="">' +
            '<div class="lightbox__caption"><span id="lb-cap"></span>' + (nav ? '<small id="lb-count"></small>' : '') + '</div>';
        document.body.appendChild(lb);

        var img = lb.querySelector('img');
        img.style.transition = 'opacity 0.22s ease, transform 0.3s cubic-bezier(0.22,1,0.36,1)';
        // Zoom: klik powiększa 2.2x w miejscu kliknięcia, drugi klik wraca
        var zoomed = false;
        function unzoom() {
            zoomed = false;
            img.style.transform = '';
            img.style.cursor = 'zoom-in';
        }
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', function (e) {
            if (zoomed) { unzoom(); return; }
            var r = img.getBoundingClientRect();
            var ox = ((e.clientX - r.left) / r.width * 100).toFixed(1);
            var oy = ((e.clientY - r.top) / r.height * 100).toFixed(1);
            img.style.transformOrigin = ox + '% ' + oy + '%';
            img.style.transform = 'scale(2.2)';
            img.style.cursor = 'zoom-out';
            zoomed = true;
        });
        function paint() {
            var it = items[idx];
            unzoom();
            img.style.opacity = '0';
            img.onload = function () { img.style.opacity = '1'; };
            img.src = it.url;
            img.alt = it.label + ' — pełny rozmiar';
            lb.querySelector('#lb-cap').textContent = it.label;
            if (nav) lb.querySelector('#lb-count').textContent = (idx + 1) + ' / ' + items.length;
            // preload sąsiadów — strzałki bez czekania
            if (nav) {
                [idx - 1, idx + 1].forEach(function (i) {
                    var n = items[(i + items.length) % items.length];
                    if (n) { var pre = new Image(); pre.src = n.url; }
                });
            }
        }
        function step(d) {
            idx = (idx + d + items.length) % items.length;
            paint();
        }
        function close() {
            lb.remove();
            document.removeEventListener('keydown', onKey);
        }
        function onKey(e) {
            if (e.key === 'Escape') close();
            else if (nav && e.key === 'ArrowLeft') step(-1);
            else if (nav && e.key === 'ArrowRight') step(1);
        }
        lb.addEventListener('click', function (e) {
            if (e.target === lb) close();
        });
        lb.querySelector('#lb-close').addEventListener('click', close);
        if (nav) {
            lb.querySelector('#lb-prev').addEventListener('click', function () { step(-1); });
            lb.querySelector('#lb-next').addEventListener('click', function () { step(1); });
        }
        document.addEventListener('keydown', onKey);
        paint();
        lb.querySelector('#lb-close').focus();
    }

    /* ============================================================
       BRAMKA INLINE — w rozmowie, po GATE_AFTER_USER_MSGS
       wiadomościach rozmówcy (server-side backstop: wymagany_email)
       ============================================================ */
    var GATE_EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    function gatePending() {
        // emailKnown: serwer ma już maila tej sesji (powrót z linku ?id=) — nie pytamy drugi raz
        if (state.email || state.emailKnown || state.verdict) return false;
        var userCount = messages.filter(function (m) { return m.role === 'user'; }).length;
        return userCount >= GATE_AFTER_USER_MSGS;
    }

    // Rejestracja przez Google/Facebook (Supabase Auth, implicit flow):
    // redirect → powrót z #access_token → /auth/v1/user → prefill bramki.
    // Sesja sparingu przeżywa redirect w LS + ?id= w redirect_to.
    function startOAuth(provider) {
        persistSession();
        var redirect = location.origin + location.pathname + '?id=' + encodeURIComponent(state.sessionId);
        location.href = SB_URL + '/auth/v1/authorize?provider=' + provider +
            '&redirect_to=' + encodeURIComponent(redirect);
    }

    function handleOAuthReturn() {
        var h = location.hash || '';
        if (h.indexOf('access_token=') < 0) return;
        var params = new URLSearchParams(h.slice(1));
        var token = params.get('access_token');
        // hash z tokenami nie może zostać w URL (ani trafić do hash-routingu)
        try { history.replaceState(null, '', location.pathname + location.search); } catch (e) { }
        if (!token) return;
        fetch(SB_URL + '/auth/v1/user', {
            headers: { 'Authorization': 'Bearer ' + token, 'apikey': SB_PUBLISHABLE }
        }).then(function (r) { return r.ok ? r.json() : null; }).then(function (u) {
            if (!u || !u.email) return;
            var meta = u.user_metadata || {};
            pendingAuth = {
                userId: u.id,
                provider: (u.app_metadata && u.app_metadata.provider) || 'oauth',
                email: u.email,
                name: meta.full_name || meta.name || ''
            };
            state.authUserId = pendingAuth.userId;
            state.authProvider = pendingAuth.provider;
            persistSession();
            // bramka czeka na telefon — prefill, jeśli już widoczna
            var gn = el('gate-name'), ge = el('gate-email');
            if (gn && !gn.value) gn.value = pendingAuth.name;
            if (ge && !ge.value) { ge.value = pendingAuth.email; ge.readOnly = true; }
            var box = el('gate-oauth-row');
            if (box) box.outerHTML = oauthDoneHTML(pendingAuth);
            var ph = el('gate-phone');
            if (ph) ph.focus();
        }).catch(function () { });
    }

    function oauthDoneHTML(pa) {
        return '<div class="gate-oauth-done">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>' +
            'Połączono konto ' + (pa.provider === 'google' ? 'Google' : pa.provider === 'facebook' ? 'Facebook' : esc(pa.provider)) +
            ' — dorzuć jeszcze numer telefonu.</div>';
    }

    // telefon: min 9 cyfr + CAŁY string w dozwolonym formacie (kotwice ^$ —
    // bez nich przechodziło cokolwiek zawierającego 9 cyfr, np. PESEL w zdaniu)
    function phoneValid(s) {
        var digits = s.replace(/\D/g, '');
        return digits.length >= 9 && digits.length <= 15 && /^[+]?[\d\s\-().]{9,20}$/.test(s);
    }

    function renderInlineGate() {
        if (el('inline-gate') || state.email || state.emailKnown) return;
        removeChips();

    var HIDDEN_MARKS = ['<werdykt', '<projekt', '<opcje', '<blysk', '<sekcje', '<karuzela', '<kamien', '<makieta', '<suwak', '<ranking', '<styl_wybor']; // bloki techniczne ukrywane przed użytkownikiem

    function visibleText(raw) {
        var t = raw
            .replace(/<werdykt>[\s\S]*?<\/werdykt>/g, '')
            .replace(/<projekt>[\s\S]*?<\/projekt>/g, '')
            .replace(/<opcje_multi>[\s\S]*?<\/opcje_multi>/g, '')
            .replace(/<opcje>[\s\S]*?<\/opcje>/g, '')
            .replace(/<makieta>[\s\S]*?<\/makieta>/g, '')
            .replace(/<makieta\s*\/?>/g, '')
            .replace(/<suwak>[\s\S]*?<\/suwak>/g, '')
            .replace(/<ranking>[\s\S]*?<\/ranking>/g, '')
            .replace(/<styl_wybor>[\s\S]*?<\/styl_wybor>/g, '')
            .replace(/<styl_wybor\s*\/?>/g, '')
            .replace(/<blysk>[\s\S]*?<\/blysk>/g, '')
            .replace(/<sekcje>[\s\S]*?<\/sekcje>/g, '')
            .replace(/<karuzela>[\s\S]*?<\/karuzela>/g, '')
            .replace(/<kamien>[\s\S]*?<\/kamien>/g, '');
        // otwarty, niedomknięty blok w trakcie streamu — utnij od markera
        for (var m = 0; m < HIDDEN_MARKS.length; m++) {
            var i = t.indexOf(HIDDEN_MARKS[m]);
            if (i >= 0) t = t.slice(0, i);
        }
        // częściowy marker na końcu streamu — buforuj ('<', '<w', '<pr'…)
        outer: for (var k = 8; k > 0; k--) {
            var tail = t.slice(-k);
            for (var m2 = 0; m2 < HIDDEN_MARKS.length; m2++) {
                if (tail === HIDDEN_MARKS[m2].slice(0, k)) { t = t.slice(0, t.length - k); break outer; }
            }
        }
        return t.replace(/\s+$/, '');
    }

    // Mini-markdown: **bold**, ### nagłówki, listy -/1., separator --- (po escapowaniu)
    function renderRich(s) {
        var h = esc(s).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        var lines = h.split('\n');
        var out = [], list = null;
        function closeList() { if (list) { out.push('</' + list + '>'); list = null; } }
        for (var i = 0; i < lines.length; i++) {
            var t = lines[i].trim();
            if (!t) { closeList(); continue; }
            var mH = t.match(/^#{1,4}\s+(.*)$/);
            if (mH) { closeList(); out.push('<h4 class="rich-h">' + mH[1] + '</h4>'); continue; }
            if (/^(-{3,}|\*{3,}|—{2,})$/.test(t)) { closeList(); out.push('<hr class="rich-hr">'); continue; }
            var mUl = t.match(/^[-•▪]\s+(.*)$/);
            if (mUl) {
                if (list !== 'ul') { closeList(); out.push('<ul class="rich-list">'); list = 'ul'; }
                out.push('<li>' + mUl[1] + '</li>');
                continue;
            }
            var mOl = t.match(/^\d{1,2}[.)]\s+(.*)$/);
            if (mOl) {
                if (list !== 'ol') { closeList(); out.push('<ol class="rich-list">'); list = 'ol'; }
                out.push('<li>' + mOl[1] + '</li>');
                continue;
            }
            closeList();
            out.push('<p>' + t + '</p>');
        }
        closeList();
        return out.join('');
    }

    /* ============================================================
       DYMKI ODPOWIEDZI — marker <opcje> z każdej tury AI
       ============================================================ */
    function parseChipArray(raw, tag, max) {
        if (!raw) return null;
        var re = new RegExp('<' + tag + '>([\\s\\S]*?)<\\/' + tag + '>', 'g');
        var ms = raw.match(re);
        if (!ms || !ms.length) return null;
        var inner = ms[ms.length - 1].replace(new RegExp('^<' + tag + '>'), '').replace(new RegExp('<\\/' + tag + '>$'), '');
        try {
            var arr = JSON.parse(inner);
            if (!Array.isArray(arr)) return null;
            arr = arr.filter(function (x) { return typeof x === 'string' && x.trim(); })
                .map(function (x) { return x.trim().slice(0, 120); })
                .slice(0, max);
            return arr.length ? arr : null;
        } catch (e) { return null; }
    }
    function parseOpcje(raw) { return parseChipArray(raw, 'opcje', 4); }
    function parseOpcjeMulti(raw) { return parseChipArray(raw, 'opcje_multi', 6); }

    // Jedna bramka dla wszystkich miejsc renderowania: multi ma pierwszeństwo
    function suggestionsFrom(content) {
        var m = parseOpcjeMulti(content);
        if (m) return { opts: m, multi: true };
        var s = parseOpcje(content);
        return s ? { opts: s, multi: false } : null;
    }

    var chipStreak = 0;      // kliknięcia w dymki z rzędu (bez własnego tekstu)

    function maybeNudgeComposer() {
        if (nudgeShown || chipStreak < 3) return;

    }

    function renderSuggestions(opts, multi) {
        removeChips();
        var div = document.createElement('div');
        div.className = 'qr' + (multi ? ' qr--multi' : '');

                if (streaming || el('inline-gate') || !selected.length) return;
                chipStreak++;
                maybeNudgeComposer();
                var msg = selected.join(', ');
                removeChips();
                sendOpening(msg);

        }

        opts.forEach(function (label) {
            // Prefiks "~" = wyróżniona opcja AI (tylko w trybie pojedynczym)
            var isAi = !multi && label.charAt(0) === '~';
            var text = (label.charAt(0) === '~' ? label.slice(1) : label).trim();
            if (!text) return;
            var b = document.createElement('button');

    /* ============================================================
       WIDGETY INTERAKCJI — suwak / ranking / wybór stylu
       (markery zastępują <opcje> w turach, gdzie klikanie > pisanie)
       ============================================================ */
    function widgetFrom(raw) {
        if (!raw) return null;
        if (/<styl_wybor\s*>\s*<\/styl_wybor>|<styl_wybor\s*\/>/.test(raw)) return { type: 'styl' };
        var sm = raw.match(/<suwak>([\s\S]*?)<\/suwak>/);
        if (sm) {
            try {
                var d = JSON.parse(sm[1]);
                if (typeof d.min === 'number' && typeof d.max === 'number' && d.max > d.min) {
                    return { type: 'suwak', data: d };
                }
            } catch (e) { }
        }
        var rm = raw.match(/<ranking>([\s\S]*?)<\/ranking>/);
        if (rm) {
            try {
                var a = JSON.parse(rm[1]);
                if (Array.isArray(a)) {
                    a = a.filter(function (x) { return typeof x === 'string' && x.trim(); })
                        .map(function (x) { return x.trim().slice(0, 80); }).slice(0, 6);
                    if (a.length >= 2) return { type: 'ranking', data: a };
                }
            } catch (e) { }
        }
        return null;
    }
