<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podgląd narzędzia — Aplikacja</title>
<meta name="description" content="Interaktywny podgląd narzędzia zaprojektowanego w tomekniedzwiecki.pl/aplikacja.">
<meta name="robots" content="noindex">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#0b0d12;display:flex;flex-direction:column}
.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px;background:#0b0d12;color:#fff;flex-shrink:0}
.bar .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;text-decoration:none;color:#fff;min-width:0}
.bar .brand .dot{width:24px;height:24px;border-radius:7px;background:#4d9fff;display:grid;place-items:center;font-size:13px;flex-shrink:0}
.bar .brand span.lbl{color:#8b96a8;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .cta{font-size:13px;font-weight:700;color:#0b0d12;background:#4d9fff;border-radius:9px;padding:8px 14px;text-decoration:none;white-space:nowrap;transition:filter .15s}
.bar .cta:hover{filter:brightness(1.1)}
.bar__left{display:flex;align-items:center;gap:10px;min-width:0}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#fff;background:#15171d;border:1px solid #262a33;border-radius:9px;padding:7px 11px 7px 9px;text-decoration:none;white-space:nowrap;transition:background .15s,border-color .15s;flex-shrink:0}
.back:hover{background:#1c1f27;border-color:#333845}
.back svg{width:15px;height:15px}
.back.hidden{display:none}
.stage{flex:1;position:relative;background:#fff}
iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.msg{position:absolute;inset:0;display:grid;place-items:center;background:#fff;color:#0b0d12;text-align:center;padding:24px}
.msg .in{max-width:420px}
.msg h1{font-size:19px;margin-bottom:8px}
.msg p{font-size:15px;color:#4b5668;line-height:1.6}
.spin{width:34px;height:34px;border:3px solid #e6eaef;border-top-color:#4d9fff;border-radius:50%;margin:0 auto 18px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.hidden{display:none}
body.is-embed .bar{display:none}
@media(max-width:560px){.bar .brand span.lbl{display:none}}
</style>
</head>
<body>
<div class="bar">
  <div class="bar__left">
    <a class="back hidden" id="back" href="#" aria-label="Wróć do podglądu projektu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path></svg>
      <span>Podgląd projektu</span>
    </a>
    <a class="brand" href="https://tomekniedzwiecki.pl/aplikacja/">
      <span class="dot">⚡</span>Aplikacja<span class="lbl" id="lbl">&nbsp;· podgląd koncepcyjny</span>
    </a>
  </div>
  <a class="cta" href="https://tomekniedzwiecki.pl/aplikacja/sparing/">Stwórz swój projekt →</a>
</div>
<div class="stage">
  <div class="msg" id="loading"><div class="in"><div class="spin"></div><p>Wczytuję podgląd…</p></div></div>
  <div class="msg hidden" id="error"><div class="in">
    <h1>Nie znaleźliśmy tego podglądu</h1>
    <p>Strona mogła jeszcze się nie wygenerować — odśwież za chwilę. Jeśli link pochodzi z udostępnienia, poproś autora o aktualny adres.</p>
  </div></div>
</div>
<script>
(function () {
  var q = new URLSearchParams(location.search);
  var sid = (q.get('sid') || '').trim();
  var t = (q.get('t') || '').trim();
  // k = rodzaj podglądu: 'prototyp' (klikalne narzędzie) albo 'landing' (domyślnie)
  var k = (q.get('k') || 'landing').trim();
  var isProto = k === 'prototyp';
  // embed=1 → osadzenie w panelu (panel ma już własną ramkę okna): chowamy pasek
  if (q.get('embed') === '1') { document.body.classList.add('is-embed'); }
  // from=projekt → przyszliśmy z czytelnego pulpitu /aplikacja/projekt/: pokaż powrót
  if (q.get('from') === 'projekt' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(sid)) {
    var back = document.getElementById('back');
    if (back) { back.href = 'https://tomekniedzwiecki.pl/aplikacja/projekt/?sid=' + encodeURIComponent(sid); back.classList.remove('hidden'); }
  }
  var loading = document.getElementById('loading');
  var error = document.getElementById('error');
  var lbl = document.getElementById('lbl');
  if (lbl) lbl.innerHTML = isProto ? '&nbsp;· interaktywny prototyp narzędzia' : '&nbsp;· podgląd koncepcyjny strony';
  if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(sid) || !/^\d{10,16}$/.test(t)) {
    loading.classList.add('hidden');
    error.classList.remove('hidden');
    return;
  }
  var prefix = isProto ? 'prototyp-' : 'landing-';
  var src = 'https://yxmavwkwnfuphjqbelws.supabase.co/storage/v1/object/public/attachments/spar/'
    + sid + '/' + prefix + t + '.html';
  fetch(src)
    .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.text(); })
    .then(function (html) {
      var frame = document.createElement('iframe');
      // Bez allow-same-origin: HTML generuje model — pełna izolacja od domeny.
      frame.setAttribute('sandbox', 'allow-scripts');
      frame.setAttribute('title', 'Podgląd strony narzędzia');
      frame.srcdoc = html;
      frame.addEventListener('load', function () { loading.classList.add('hidden'); });
      document.querySelector('.stage').appendChild(frame);
    })
    .catch(function () {
      loading.classList.add('hidden');
      error.classList.remove('hidden');
    });
})();
</script>
</body>
</html>
