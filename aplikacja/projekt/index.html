    }
    return '<div class="eco-metrics">' +
      metric('ltvcac', 'Czy reklama się opłaca', econDec(c.ltvCac) + '×', c.ltvCac >= 3 ? 'tyle wraca z każdej 1 zł na zdobycie klienta (dobrze, gdy ≥3×)' : (c.ltvCac >= 1.5 ? 'tyle wraca z 1 zł — do poprawy' : 'za mało wraca z wydanej złotówki'), lvlCac) +
      metric('ltv', 'Ile zostawia jeden klient', fmtZl(Math.round(c.ltv)) + ' zł', 'średnio, zanim odejdzie', '') +
      metric('payback', 'Po ilu miesiącach klient się zwraca', econDec(c.payback) + ' mies.', 'tyle pracuje, żeby oddać koszt swojego zdobycia', c.payback <= 6 ? 'good' : (c.payback <= 12 ? 'ok' : 'bad')) +
      metric('m50', 'Do 50 klientów', c.miesiac50 ? ('miesiąc ' + c.miesiac50) : '> 18 mies.', c.miesiac50 ? ('+' + c.nowiMies + ' klientów/mies.') : 'zwiększ budżet albo potanij zdobycie klienta', c.miesiac50 && c.miesiac50 <= 9 ? 'good' : 'ok') +
      metric('breakeven', 'Zwrot kosztu budowy', c.breakeven ? ('miesiąc ' + c.breakeven) : '> 24 mies.', c.breakeven ? ('zysk po 10% Tomka > ' + fmtZl(c.kosztBud) + ' zł') : 'przy tych ustawieniach później', c.breakeven && c.breakeven <= 8 ? 'good' : 'ok') +
      metric('mrr50', 'Przychód przy 50', fmtZl(Math.round(50 * c.cena)) + ' zł', '/mies. — tu przejmujesz stery', '') +
      '</div>' +
      '<div class="pj-plan__note">Tomek bierze <strong>10% od przychodu</strong> (przy 50 klientach ≈ ' + fmtZl(Math.round(50 * c.cena * 0.10)) + ' zł/mies.) — już odjęte w „zwrot kosztu budowy". Zarabia, gdy Ty zarabiasz.</div>';
  }
  function econChartHTML(c){
    var sim = c.sim || [];
    var max = sim.reduce(function(mx,s){ return Math.max(mx, s.aktywni); }, 1);
    var bars = sim.map(function(s){
      var h = Math.max(6, Math.round(s.aktywni / max * 100));
      var hit = c.miesiac50 && s.m === c.miesiac50;
      return '<div class="eco-bar' + (hit ? ' eco-bar--hit' : '') + '" title="Miesiąc ' + s.m + ': ' + s.aktywni + ' klientów, ' + fmtZl(s.mrr) + ' zł/mies.">' +
        '<i style="height:' + h + '%"></i><span>' + s.m + '</span></div>';
    }).join('');
    return '<div class="eco-chart" data-eco="chart">' + bars + '</div>' +
      '<div class="eco-chart__cap" data-eco="chart-cap">' +
      (c.miesiac50 ? 'Aktywni klienci miesiąc po miesiącu — 50 osiągasz w miesiącu ' + c.miesiac50 + ' przy budżecie ' + fmtZl(c.budzet) + ' zł/mies.'
        : 'Przy tym budżecie i koszcie zdobycia klienta 50 klientów zajmuje ponad 18 miesięcy — pokręć suwakami.') + '</div>';
  }
  function economicsHTML(e){
    var c = econCalc(e, null);
    if (!c) return '';
    var cennik = e.cennik || {};
    var tiery = Array.isArray(cennik.tiery) ? cennik.tiery : [];
    var w = e.wejscia || {};

  function rkRefs(arr, srcMap){
    if (!Array.isArray(arr) || !arr.length) return '';
    var out = '';
    arr.slice(0, 4).forEach(function(n){
      var src = srcMap[n];
      if (!src || !src.url) return;
      out += '<a class="rk-ref" href="' + esc(src.url) + '" target="_blank" rel="noopener nofollow"' + (src.tytul ? ' title="' + esc(src.tytul) + '"' : '') + '>' + esc(String(n)) + '</a>';
    });
    return out ? '<span class="rk-refs">' + out + '</span>' : '';
  }
  function rkParseLow(liczba){
    if (typeof liczba !== 'string') return null;
    var s = liczba.toLowerCase();
    var m = s.replace(/\s/g, '').match(/(\d+(?:[.,]\d+)?)/);
    if (!m) return null;
    var v = parseFloat(m[1].replace(',', '.'));
    if (/tys/.test(s)) v *= 1000; else if (/mln|milion/.test(s)) v *= 1000000;
    return v >= 200 ? Math.round(v) : null;
  }

  function lightboxItems(){
    var items = [];

    return items;

  function openLightbox(startView){
    if (el('spar-lightbox')) return;
    gaEvent('app_preview_view', { view: (typeof startView === 'string' ? startView : (startView && startView.label) || 'podglad') });
    var items, idx = 0;
    if (startView && typeof startView === 'object' && Array.isArray(startView.items)){
      items = startView.items.filter(function(x){ return x && x.url; });
      idx = Math.min(Math.max(0, startView.index || 0), Math.max(0, items.length - 1));
      startView = null;
    } else if (startView && typeof startView === 'object' && startView.url){
      items = [{ view: '_single', label: startView.label || 'Podgląd', url: startView.url }];
      startView = '_single';
    } else if (typeof startView === 'string' && /^https?:/.test(startView)){
      items = [{ view: 'panel', label: 'Wcześniejsza wersja', url: startView }];
      startView = 'panel';
    } else {
      items = lightboxItems();
    }
    if (!items.length) return;
    if (startView){ for (var i = 0; i < items.length; i++) if (items[i].view === startView){ idx = i; break; } }
    var lb = document.createElement('div');
    lb.className = 'lightbox'; lb.id = 'spar-lightbox';
    lb.setAttribute('role', 'dialog'); lb.setAttribute('aria-label', 'Podgląd narzędzia — pełny rozmiar');
    var nav = items.length > 1;
    lb.innerHTML =
      '<button type="button" class="lightbox__x" id="lb-close" aria-label="Zamknij">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"></path></svg></button>' +
      (nav ? '<button type="button" class="lightbox__nav lightbox__nav--l" id="lb-prev" aria-label="Poprzedni ekran"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg></button>' +
        '<button type="button" class="lightbox__nav lightbox__nav--r" id="lb-next" aria-label="Następny ekran"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"></path></svg></button>' : '') +
      '<img src="" alt="">' +
      '<div class="lightbox__caption"><span id="lb-cap"></span>' + (nav ? '<small id="lb-count"></small>' : '') + '</div>';
    document.body.appendChild(lb);
    var img = lb.querySelector('img');
    img.style.transition = 'opacity 0.22s ease, transform 0.3s cubic-bezier(0.22,1,0.36,1)';
    var zoomed = false;
    function unzoom(){ zoomed = false; img.style.transform = ''; img.style.cursor = 'zoom-in'; }
    img.style.cursor = 'zoom-in';
    img.addEventListener('click', function(e){
      if (zoomed){ unzoom(); return; }
      var r = img.getBoundingClientRect();
      img.style.transformOrigin = ((e.clientX - r.left) / r.width * 100).toFixed(1) + '% ' + ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%';
      img.style.transform = 'scale(2.2)'; img.style.cursor = 'zoom-out'; zoomed = true;
    });
    function paint(){
      var it = items[idx]; unzoom();
      img.style.opacity = '0';
      img.onload = function(){ img.style.opacity = '1'; };
      img.src = imgCdn(it.url, 'full');
      img.alt = it.label + ' — pełny rozmiar';
      lb.querySelector('#lb-cap').textContent = it.label;
      if (nav) lb.querySelector('#lb-count').textContent = (idx + 1) + ' / ' + items.length;
      if (nav){ [idx - 1, idx + 1].forEach(function(i){ var n = items[(i + items.length) % items.length]; if (n){ var pre = new Image(); pre.src = imgCdn(n.url, 'full'); } }); }
    }
    function step(d){ idx = (idx + d + items.length) % items.length; paint(); }
    function close(){ lb.remove(); document.removeEventListener('keydown', onKey); }
    function onKey(e){ if (e.key === 'Escape') close(); else if (nav && e.key === 'ArrowLeft') step(-1); else if (nav && e.key === 'ArrowRight') step(1); }
    lb.addEventListener('click', function(e){ if (e.target === lb) close(); });
    lb.querySelector('#lb-close').addEventListener('click', close);
    if (nav){ lb.querySelector('#lb-prev').addEventListener('click', function(){ step(-1); }); lb.querySelector('#lb-next').addEventListener('click', function(){ step(1); }); }
    document.addEventListener('keydown', onKey);
    paint();
    lb.querySelector('#lb-close').focus();
  }

  if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(sid)){ fail(); return; }

  // Podgląd ADMINA: panel TN Aplikacje otwiera tę stronę z #admin=<JWT> w hashu.
  // Wtedy wołamy 'admin_get' (ungated, widzi niedomknięte projekty) zamiast 'public'.
  // Token czytamy raz i USUWAMY z adresu (replaceState), zostawiając ew. kotwicę sekcji.
  var adminTok = '';
  (function(){
    var h = location.hash || '';
    var m = h.match(/[#&]admin=([^&]+)/);
    if (m){
      adminTok = decodeURIComponent(m[1]);
      var rest = h.replace(/[#&]admin=[^&]+/, '').replace(/^#/, '');
      try { history.replaceState(null, '', location.pathname + location.search + (rest ? '#' + rest : '')); } catch(e){}
    }
  })();

  var fetchHeaders = { 'Content-Type': 'application/json' };
  if (adminTok) fetchHeaders['Authorization'] = 'Bearer ' + adminTok;
  fetch(ENDPOINT, { method: 'POST', headers: fetchHeaders, body: JSON.stringify({ sessionId: sid, action: adminTok ? 'admin_get' : 'public' }) })
    .then(function(r){ if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
    .then(function(d){
      if (!d || !d.projekt) throw new Error('brak');
      mapState(d.projekt);
      loading.classList.add('ro-hidden');
      app.classList.remove('ro-hidden');
      renderAll();
      if (adminTok){
        var ab = document.createElement('div');
        ab.textContent = 'Podgląd administratora';
        ab.style.cssText = 'position:fixed;left:12px;bottom:12px;z-index:9999;font:600 11px/1 Geist,system-ui,sans-serif;letter-spacing:.02em;color:#ededed;background:rgba(10,10,10,.92);border:1px solid #2e2e2e;border-radius:8px;padding:7px 11px;backdrop-filter:blur(6px);pointer-events:none;';
        document.body.appendChild(ab);
      }
      var h = (location.hash || '').replace('#', '');
      if (h){ var sEl = document.getElementById('sec-' + h); if (sEl) setTimeout(function(){ sEl.scrollIntoView(); }, 80); }
    })
    .catch(fail);
})();
</script>
</body>
</html>
